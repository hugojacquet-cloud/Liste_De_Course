<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; background: #14171C; }
  #root { min-height: 100vh; }
  #boot-error { display:none; color:#F5F3EE; font-family:-apple-system,sans-serif; padding:24px; max-width:480px; margin:0 auto; }
</style>
<script>
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => navigator.serviceWorker.register('sw.js'));
}
window.addEventListener('error', function (e) {
  var el = document.getElementById('boot-error');
  var root = document.getElementById('root');
  if (root && !root.hasChildNodes() && el) {
    el.style.display = 'block';
    el.querySelector('#boot-error-msg').textContent = (e && e.message) || 'Erreur inconnue';
  }
});
</script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.3.1/umd/react.production.min.js" crossorigin></script>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js" crossorigin></script>
</head>

<div id="root"></div>

</div>

function Icon({ size = 16, color = "currentColor", strokeWidth = 2, style, children }) {
  return (
    <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color}
      strokeWidth={strokeWidth} strokeLinecap="round" strokeLinejoin="round" style={style}>
      {children}
    </svg>
  );
}

// Affiche l'icône d'un produit : un emoji texte, ou une image importée localement (data URL).
function IconGlyph({ icon, size = 20, style }) {
  if (typeof icon === "string" && icon.startsWith("data:image")) {
    return <img src={icon} alt="" style={{ width: size, height: size, objectFit: "contain", borderRadius: 4, display: "inline-block", verticalAlign: "middle", ...style }} />;
  }
  return <span style={{ fontSize: size, lineHeight: 1, ...style }}>{icon}</span>;
}

// Normalise pour une recherche insensible aux accents / ligatures (ex: "boeuf" trouve "bœuf")
function normalize(str) {
  return String(str)
    .toLowerCase()
    .replace(/œ/g, "oe")
    .replace(/æ/g, "ae")
    .normalize("NFD")
    .replace(/[\u0300-\u036f]/g, "");
}

// Un produit correspond à la recherche si son nom OU l'un de ses sous-produits/variétés correspond
// (ex : taper "patates" trouve "Pomme de terre" si "Patates" est enregistré comme sous-produit).
function productMatchesQuery(product, normalizedQuery) {
  if (normalize(product.name).includes(normalizedQuery)) return true;
  return (product.variants || []).some((v) => normalize(v.name).includes(normalizedQuery));
}

// --- Prix -------------------------------------------------------------------

function formatEuro(n) {
  return `${n.toFixed(2).replace(".", ",")} €`;
}

// Libellé court affiché sur une tuile produit : "1,76 €/paquet" et/ou "4,99 €/kg"
function formatProductPrice(product) {
  const parts = [];
  if (product.priceUnit != null && product.priceUnit !== "") parts.push(`${formatEuro(Number(product.priceUnit))}/paquet`);
  if (product.priceKg != null && product.priceKg !== "") parts.push(`${formatEuro(Number(product.priceKg))}/kg`);
  return parts.length ? parts.join(" · ") : null;
}

// Estime le coût d'un article de la liste : prix au kg × qty si l'unité choisie est "kg",
// prix à l'unité × qty si l'unité choisie est "paquet". Renvoie null si le prix correspondant est inconnu.
function estimateItemPrice(item, product) {
  if (!product) return null;
  if (item.unit === "kg") {
    if (product.priceKg == null || product.priceKg === "") return null;
    const p = Number(product.priceKg);
    return Number.isNaN(p) ? null : item.qty * p;
  }
  if (item.unit === "paquet") {
    if (product.priceUnit == null || product.priceUnit === "") return null;
    const p = Number(product.priceUnit);
    return Number.isNaN(p) ? null : item.qty * p;
  }
  return null;
}

// Estime le coût total d'une recette (somme des ingrédients dont le prix est connu et l'unité compatible)
function estimateRecipeTotal(ingredients, products) {
  let total = 0;
  let hasAny = false;
  (ingredients || []).forEach((item) => {
    const p = products.find((pr) => pr.id === item.productId);
    const est = estimateItemPrice(item, p);
    if (est != null) { total += est; hasAny = true; }
  });
  return hasAny ? total : null;
}

function ItemCard({ item, product, onEdit, onQuickTap, small }) {
  const timer = useRef(null);
  const longPressed = useRef(false);
  const c = catInfo(product.cat);
  const startPress = () => {
    longPressed.current = false;
    timer.current = setTimeout(() => { longPressed.current = true; onEdit(); }, 480);
  };
  const clearPress = () => { if (timer.current) { clearTimeout(timer.current); timer.current = null; } };
  const handleClick = () => {
    if (longPressed.current) { longPressed.current = false; return; }
    if (onQuickTap) onQuickTap();
  };

  return (
    <div
      onPointerDown={startPress}
      onPointerUp={clearPress}
      onPointerLeave={clearPress}
      onPointerCancel={clearPress}
      onClick={handleClick}
      onContextMenu={(e) => e.preventDefault()}
      style={{ background: c.tint, border: `1px solid ${c.accent}33`, borderRadius: 16, padding: small ? "12px 6px 9px" : "16px 8px 12px", display: "flex", flexDirection: "column", alignItems: "center", gap: 6, minHeight: small ? 78 : 96, userSelect: "none", cursor: "pointer" }}
    >
      <span style={{ fontSize: small ? 21 : 26 }}><IconGlyph icon={product.icon} size={small ? 21 : 26} /></span>
      <span style={{ fontSize: small ? 11 : 12.5, fontWeight: 600, textAlign: "center", lineHeight: 1.25, color: "#F0EEE8" }}>
        {product.name}
        {item.note && <span style={{ color: c.accent }}> · {item.note}</span>}
      </span>
      <span style={{ fontSize: 10.5, color: "#6B9B5E", fontWeight: 700 }}>{item.qty} {item.unit}</span>
      {(() => {
        const est = estimateItemPrice(item, product);
        const priceText = est != null ? formatEuro(est) : formatProductPrice(product);
        return priceText ? <span style={{ fontSize: 10.5, color: "#F5F3EE", fontWeight: 600 }}>{priceText}</span> : null;
      })()}
    </div>
  );
}

  const [priceKg, setPriceKg] = useState(product?.priceKg != null ? String(product.priceKg).replace(".", ",") : "");
  const [variants, setVariants] = useState(product?.variants ?? []);
  const [variantsOpen, setVariantsOpen] = useState(false);
  const c = catInfo(cat) || CATEGORIES[0];
  const isEdit = mode === "edit";

  const addVariant = () => {
    setVariants((v) => [...v, { id: `v-${Date.now()}`, name: "" }]);
    setVariantsOpen(true);
  };
  const updateVariant = (id, name) => setVariants((v) => v.map((x) => (x.id === id ? { ...x, name } : x)));
  const removeVariant = (id) => setVariants((v) => v.filter((x) => x.id !== id));

  return (
    <div
      onClick={onClose}
      style={{ position: "fixed", inset: 0, background: "rgba(10,12,15,0.6)", display: "flex", alignItems: "flex-end", justifyContent: "center", zIndex: 70 }}
    >
      <div
        onClick={(e) => e.stopPropagation()}
        style={{ width: "100%", maxWidth: 480, maxHeight: "85vh", display: "flex", flexDirection: "column", background: "#1E232B", borderTop: "1px solid #2A303A", borderRadius: "20px 20px 0 0" }}
      >
        <div style={{ overflowY: "auto", padding: "20px 20px 20px" }}>
        <div style={{ display: "flex", alignItems: "center", gap: 12, marginBottom: 20 }}>
          <span style={{ width: 44, height: 44, borderRadius: 12, background: c.accent + "26", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 24, flexShrink: 0 }}>
            <IconGlyph icon={icon} size={24} />
          </span>
          <div style={{ fontSize: 17, fontWeight: 700 }}>{isEdit ? "Modifier l'article" : "Nouvel article"}</div>
          <button onClick={onClose} style={{ marginLeft: "auto", background: "#2A303A", border: "none", borderRadius: "50%", width: 30, height: 30, color: "#9CA3AF", cursor: "pointer", display: "flex", alignItems: "center", justifyContent: "center" }}>
            <X size={15} />
          </button>
        </div>

        <label style={{ fontSize: 12.5, fontWeight: 600, color: "#8B93A1", textTransform: "uppercase", letterSpacing: "0.04em" }}>Nom</label>
        <input
          value={name}
          onChange={(e) => setName(e.target.value)}
          placeholder="ex : Sauce chimichurri"
          style={{ width: "100%", marginTop: 8, marginBottom: 20, background: "#14171C", border: "1px solid #2A303A", borderRadius: 10, color: "#F5F3EE", fontSize: 15, padding: "11px 12px", outline: "none", fontFamily: "inherit" }}
        />

        <label style={{ fontSize: 12.5, fontWeight: 600, color: "#8B93A1", textTransform: "uppercase", letterSpacing: "0.04em" }}>Rayon</label>
        <div style={{ position: "relative", margin: "8px 0 20px" }}>
          <select
            value={cat}
            onChange={(e) => setCat(e.target.value)}
            style={{ width: "100%", appearance: "none", background: "#14171C", border: `1px solid ${c.accent}55`, borderRadius: 10, color: "#F5F3EE", fontSize: 14.5, fontWeight: 600, padding: "12px 36px 12px 12px", outline: "none", fontFamily: "inherit", cursor: "pointer" }}
          >
            {CATEGORIES.map((cc) => (
              <option key={cc.key} value={cc.key} style={{ background: "#1E232B", color: "#F5F3EE" }}>
                {cc.label}
              </option>
            ))}
          </select>
          <ChevronLeft size={16} color="#8B93A1" style={{ position: "absolute", right: 12, top: "50%", transform: "translateY(-50%) rotate(-90deg)", pointerEvents: "none" }} />
        </div>

        <div style={{ display: "flex", alignItems: "baseline", justifyContent: "space-between" }}>
          <label style={{ fontSize: 12.5, fontWeight: 600, color: "#8B93A1", textTransform: "uppercase", letterSpacing: "0.04em" }}>Icône</label>
          <button
            onClick={() => iconImportRef.current?.click()}
            style={{ display: "flex", alignItems: "center", gap: 4, background: "none", border: "none", color: "#8B93A1", fontSize: 12, fontWeight: 600, cursor: "pointer", padding: 0 }}
          >
            <Plus size={12} /> Ajouter icône
          </button>
          <input
            ref={iconImportRef}
            type="file"
            accept="image/*"
            style={{ display: "none" }}
            onChange={(e) => {
              const file = e.target.files?.[0];
              if (file) onAddCustomIcon(file, (dataUrl) => setIcon(dataUrl));
              e.target.value = "";
            }}
          />
        </div>
        <div style={{ display: "grid", gridTemplateColumns: "repeat(8, 1fr)", gap: 6, margin: "8px 0 22px", maxHeight: 180, overflowY: "auto", background: "#14171C", border: "1px solid #2A303A", borderRadius: 10, padding: 8 }}>
          {customIcons.map((ic, i) => (
            <div key={"custom-" + i} style={{ position: "relative" }}>
              <button onClick={() => setIcon(ic)} style={{ width: "100%", fontSize: 18, padding: "6px 0", borderRadius: 8, border: `1px solid ${icon === ic ? c.accent : "transparent"}`, background: icon === ic ? c.accent + "26" : "transparent", cursor: "pointer", display: "flex", alignItems: "center", justifyContent: "center" }}>
                <IconGlyph icon={ic} size={18} />
              </button>
              <button
                onClick={(e) => {
                  e.stopPropagation();
                  onDeleteCustomIcon(ic);
                  if (icon === ic) setIcon(ALL_ICONS[0]);
                }}
                title="Supprimer cette icône"
                style={{ position: "absolute", top: -5, right: -5, width: 16, height: 16, borderRadius: "50%", background: "#C4574A", border: "1px solid #14171C", color: "#fff", display: "flex", alignItems: "center", justifyContent: "center", cursor: "pointer", padding: 0 }}
              >
                <X size={9} strokeWidth={3} />
              </button>
            </div>
          ))}
          {ALL_ICONS.map((ic, i) => (
            <button key={ic + i} onClick={() => setIcon(ic)} style={{ fontSize: 18, padding: "6px 0", borderRadius: 8, border: `1px solid ${icon === ic ? c.accent : "transparent"}`, background: icon === ic ? c.accent + "26" : "transparent", cursor: "pointer", display: "flex", alignItems: "center", justifyContent: "center" }}>
              <IconGlyph icon={ic} size={18} />
            </button>
          ))}
        </div>

        <label style={{ fontSize: 12.5, fontWeight: 600, color: "#8B93A1", textTransform: "uppercase", letterSpacing: "0.04em" }}>Prix (facultatif, les deux peuvent être renseignés)</label>
        <div style={{ display: "flex", gap: 10, margin: "8px 0 20px" }}>
          <div style={{ flex: 1 }}>
            <div style={{ fontSize: 11.5, color: "#6B7280", fontWeight: 600, marginBottom: 6 }}>À l'unité / au paquet</div>
            <div style={{ position: "relative" }}>
              <input
                type="text"
                inputMode="decimal"
                value={priceUnit}
                onChange={(e) => setPriceUnit(e.target.value.replace(/[^0-9,.]/g, ""))}
                placeholder="0,00"
                style={{ width: "100%", background: "#14171C", border: "1px solid #2A303A", borderRadius: 10, color: "#F5F3EE", fontSize: 15, padding: "11px 32px 11px 12px", outline: "none", fontFamily: "inherit" }}
              />
              <span style={{ position: "absolute", right: 12, top: "50%", transform: "translateY(-50%)", color: "#6B7280", fontSize: 14 }}>€</span>
            </div>
          </div>
          <div style={{ flex: 1 }}>
            <div style={{ fontSize: 11.5, color: "#6B7280", fontWeight: 600, marginBottom: 6 }}>Au kg</div>
            <div style={{ position: "relative" }}>
              <input
                type="text"
                inputMode="decimal"
                value={priceKg}
                onChange={(e) => setPriceKg(e.target.value.replace(/[^0-9,.]/g, ""))}
                placeholder="0,00"
                style={{ width: "100%", background: "#14171C", border: "1px solid #2A303A", borderRadius: 10, color: "#F5F3EE", fontSize: 15, padding: "11px 32px 11px 12px", outline: "none", fontFamily: "inherit" }}
              />
              <span style={{ position: "absolute", right: 12, top: "50%", transform: "translateY(-50%)", color: "#6B7280", fontSize: 14 }}>€</span>
            </div>
          </div>
        </div>

        <div style={{ border: "1px solid #2A303A", borderRadius: 10, marginBottom: 22, overflow: "hidden" }}>
          <button
            onClick={() => setVariantsOpen((o) => !o)}
            style={{ width: "100%", display: "flex", alignItems: "center", justifyContent: "space-between", padding: "12px 14px", background: "#14171C", border: "none", cursor: "pointer", color: "#F5F3EE" }}
          >
            <span style={{ fontSize: 13, fontWeight: 600 }}>
              Sous-produits de cette famille{variants.length > 0 ? ` (${variants.length})` : ""}
            </span>
            <ChevronLeft size={15} color="#8B93A1" style={{ transform: `rotate(${variantsOpen ? 90 : -90}deg)`, transition: "transform 0.15s" }} />
          </button>
          {variantsOpen && (
            <div style={{ padding: "12px 14px", background: "#1A1F27" }}>
              <p style={{ fontSize: 12, color: "#6B7280", margin: "0 0 12px", lineHeight: 1.4 }}>
                Utile pour reconnaître des variétés du même produit sur un ticket de caisse (ex : "Rouge", "Vert", "Jaune" pour un poivron).
              </p>
              {variants.map((v) => (
                <div key={v.id} style={{ display: "flex", gap: 8, marginBottom: 8 }}>
                  <input
                    value={v.name}
                    onChange={(e) => updateVariant(v.id, e.target.value)}
                    placeholder="ex : Vert"
                    style={{ flex: 1, background: "#14171C", border: "1px solid #2A303A", borderRadius: 8, color: "#F5F3EE", fontSize: 14, padding: "9px 10px", outline: "none", fontFamily: "inherit" }}
                  />
                  <button onClick={() => removeVariant(v.id)} style={{ width: 34, height: 34, borderRadius: 8, border: "1px solid #2A303A", background: "transparent", color: "#8B93A1", cursor: "pointer", display: "flex", alignItems: "center", justifyContent: "center", flexShrink: 0 }}>
                    <X size={14} />
                  </button>
                </div>
              ))}
              <button
                onClick={addVariant}
                style={{ display: "flex", alignItems: "center", gap: 6, marginTop: 4, padding: "9px 12px", borderRadius: 8, border: "1px dashed #3A4150", background: "transparent", color: "#9CA3AF", fontWeight: 600, fontSize: 13, cursor: "pointer" }}
              >
                <Plus size={14} /> Ajouter un sous-produit
              </button>
            </div>
          )}
        </div>

        </div>

        <div style={{ display: "flex", gap: 10, padding: "14px 20px", borderTop: "1px solid #2A303A", flexShrink: 0, background: "#1E232B" }}>
          {isEdit && onDelete && (
            <button onClick={onDelete} style={{ padding: "13px 18px", borderRadius: 12, border: "1px solid #C4574A55", background: "transparent", color: "#C4574A", fontWeight: 600, fontSize: 14, cursor: "pointer" }}>
              Supprimer
            </button>
          )}
          <button
            disabled={!name.trim()}
            onClick={() => {
              const nUnit = priceUnit.trim().replace(",", ".");
              const nKg = priceKg.trim().replace(",", ".");
              onSave({
                name: name.trim(),
                icon,
                cat,
                priceUnit: nUnit ? Number(nUnit) : null,
                priceKg: nKg ? Number(nKg) : null,
                variants: variants.map((v) => ({ id: v.id, name: v.name.trim() })).filter((v) => v.name),
              });
            }}
            style={{ flex: 1, padding: "13px 18px", borderRadius: 12, border: "none", background: !name.trim() ? "#2A303A" : c.accent, color: !name.trim() ? "#5B6270" : "#14171C", fontWeight: 700, fontSize: 14.5, cursor: !name.trim() ? "default" : "pointer" }}
          >
            {isEdit ? "Enregistrer" : "Créer l'article"}
          </button>
        </div>
      </div>
    </div>
  );
}

// Tuile produit de l'onglet "Tous les produits" : appui court = ajouter à la liste, appui long = éditer
function ProductTile({ product, cat, inList, onTap, onLongPress }) {
  const timer = useRef(null);
  const longPressed = useRef(false);
  const start = () => {
    longPressed.current = false;
    timer.current = setTimeout(() => { longPressed.current = true; onLongPress(); }, 480);
  };
  const clear = () => { if (timer.current) { clearTimeout(timer.current); timer.current = null; } };
  const handleClick = () => {
    if (longPressed.current) { longPressed.current = false; return; }
    onTap();
  };

  return (
    <button
      onPointerDown={start}
      onPointerUp={clear}
      onPointerLeave={clear}
      onPointerCancel={clear}
      onClick={handleClick}
      onContextMenu={(e) => e.preventDefault()}
      style={{ background: inList ? "#1B2A1C" : cat.tint, border: `1px solid ${inList ? "#6B9B5E" : cat.accent + "33"}`, borderRadius: 14, padding: "14px 6px 12px", display: "flex", flexDirection: "column", alignItems: "center", gap: 6, cursor: "pointer", userSelect: "none" }}
    >
      <span style={{ fontSize: 25 }}><IconGlyph icon={product.icon} size={25} /></span>
      <span style={{ fontSize: 12.5, fontWeight: 600, textAlign: "center", lineHeight: 1.25, color: inList ? "#8FCB7E" : "#F0EEE8" }}>{product.name}</span>
      {formatProductPrice(product) && (
        <span style={{ fontSize: 10.5, fontWeight: 700, color: inList ? "#6B9B5E" : cat.accent }}>{formatProductPrice(product)}</span>
      )}
    </button>
  );
}

// --- Éditeur de recette ------------------------------------------------------

function RecipeEditor({ draft, onCancel, onSave, products }) {
  const [name, setName] = useState(draft?.name ?? "");
  const [ingredients, setIngredients] = useState(draft?.ingredients ?? []);
  const [steps, setSteps] = useState(draft?.steps ?? []);
  const [stepInput, setStepInput] = useState("");
  const [query, setQuery] = useState("");
  const [modalProduct, setModalProduct] = useState(null);
  const [editingIngId, setEditingIngId] = useState(null);

  const addStep = () => {
    if (!stepInput.trim()) return;
    setSteps((s) => [...s, stepInput.trim()]);
    setStepInput("");
  };
  const updateStep = (idx, val) => setSteps((s) => s.map((st, i) => (i === idx ? val : st)));
  const removeStep = (idx) => setSteps((s) => s.filter((_, i) => i !== idx));
  const moveStep = (idx, dir) => {
    setSteps((s) => {
      const arr = [...s];
      const target = dir === "up" ? idx - 1 : idx + 1;
      if (target < 0 || target >= arr.length) return arr;
      [arr[idx], arr[target]] = [arr[target], arr[idx]];
      return arr;
    });
  };

  const results = useMemo(() => {
    const q = normalize(query.trim());
    if (!q) return [];
    return products.filter((p) => productMatchesQuery(p, q)).slice(0, 7);
  }, [query, products]);

  const openAdd = (product) => { setModalProduct(product); setEditingIngId(null); setQuery(""); };
  const openEdit = (ingId) => {
    const entry = ingredients.find((i) => i.ingId === ingId);
    if (!entry) return;
    setModalProduct(products.find((p) => p.id === entry.productId));
    setEditingIngId(ingId);
  };
  const confirm = ({ qty, unit, note }) => {
    if (editingIngId) {
      setIngredients((l) => l.map((it) => (it.ingId === editingIngId ? { ...it, qty, unit, note } : it)));
    } else {
      setIngredients((l) => [...l, { ingId: `${modalProduct.id}-${Date.now()}`, productId: modalProduct.id, qty, unit, note }]);
    }
    setModalProduct(null);
    setEditingIngId(null);
  };
  const remove = () => {
    setIngredients((l) => l.filter((it) => it.ingId !== editingIngId));
    setModalProduct(null);
    setEditingIngId(null);
  };
  const removeIngredient = (ingId) => setIngredients((l) => l.filter((it) => it.ingId !== ingId));

  return (
    <div>
      <div style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 20 }}>
        <button onClick={onCancel} style={{ background: "#1E232B", border: "1px solid #2A303A", borderRadius: 10, width: 34, height: 34, display: "flex", alignItems: "center", justifyContent: "center", color: "#9CA3AF", cursor: "pointer" }}>
          <ChevronLeft size={18} />
        </button>
        <h1 style={{ fontFamily: "'Fraunces', serif", fontWeight: 600, fontSize: 22, margin: 0 }}>
          {draft?.id ? "Modifier la recette" : "Nouvelle recette"}
        </h1>
      </div>

      <label style={{ fontSize: 12.5, fontWeight: 600, color: "#8B93A1", textTransform: "uppercase", letterSpacing: "0.04em" }}>Nom de la recette</label>
      <input
        value={name}
        onChange={(e) => setName(e.target.value)}
        placeholder="ex : Ratatouille maison"
        style={{ width: "100%", marginTop: 8, marginBottom: 22, background: "#1E232B", border: "1px solid #2A303A", borderRadius: 12, color: "#F5F3EE", fontSize: 15, padding: "12px 14px", outline: "none", fontFamily: "inherit" }}
      />

      <div style={{ display: "flex", alignItems: "baseline", justifyContent: "space-between" }}>
        <label style={{ fontSize: 12.5, fontWeight: 600, color: "#8B93A1", textTransform: "uppercase", letterSpacing: "0.04em" }}>Ingrédients</label>
        {(() => {
          const total = estimateRecipeTotal(ingredients, products);
          return total != null ? <span style={{ fontSize: 13, fontWeight: 700, color: "#F5F3EE" }}>≈ {formatEuro(total)}</span> : null;
        })()}
      </div>
      <div style={{ position: "relative", margin: "8px 0 18px" }}>
        <div style={{ display: "flex", alignItems: "center", background: "#1E232B", border: "1px solid #2A303A", borderRadius: 14, padding: "12px 14px", gap: 10 }}>
          <Search size={18} color="#6B7280" strokeWidth={2.2} />
          <input
            value={query}
            onChange={(e) => setQuery(e.target.value)}
            placeholder="Chercher un ingrédient…"
            style={{ background: "transparent", border: "none", outline: "none", color: "#F5F3EE", fontSize: 15, width: "100%", fontFamily: "inherit" }}
            onKeyDown={(e) => { if (e.key === "Enter" && results.length > 0) openAdd(results[0]); }}
          />
        </div>
        {results.length > 0 && (
          <div style={{ position: "absolute", top: "calc(100% + 8px)", left: 0, right: 0, background: "#1E232B", border: "1px solid #2A303A", borderRadius: 14, overflow: "hidden", zIndex: 20, boxShadow: "0 12px 28px rgba(0,0,0,0.35)", maxHeight: 300, overflowY: "auto" }}>
            {results.map((p, i) => {
              const c = catInfo(p.cat);
              return (
                <button key={p.id} onClick={() => openAdd(p)} style={{ display: "flex", alignItems: "center", gap: 12, width: "100%", padding: "11px 14px", background: "transparent", border: "none", borderBottom: i < results.length - 1 ? "1px solid #262B34" : "none", cursor: "pointer", textAlign: "left", color: "#F5F3EE" }}>
                  <span style={{ width: 32, height: 32, borderRadius: 9, background: c.accent + "26", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 16, flexShrink: 0 }}><IconGlyph icon={p.icon} size={16} /></span>
                  <span style={{ flex: 1, fontSize: 14, fontWeight: 500 }}>{p.name}</span>
                  {formatProductPrice(p) && (
                    <span style={{ fontSize: 11, color: c.accent, fontWeight: 600 }}>{formatProductPrice(p)}</span>
                  )}
                  <Plus size={16} color="#6B7280" />
                </button>
              );
            })}
          </div>
        )}
      </div>

      {ingredients.length === 0 ? (
        <p style={{ color: "#5B6270", fontSize: 13.5, textAlign: "center", padding: "20px 0" }}>
          Ajoutez des ingrédients avec la recherche ci-dessus.
        </p>
      ) : (
        <div style={{ display: "grid", gridTemplateColumns: "repeat(3, 1fr)", gap: 10, marginBottom: 28 }}>
          {ingredients.map((item) => {
            const product = products.find((p) => p.id === item.productId);
            if (!product) return null;
            return <ItemCard key={item.ingId} item={item} product={product} onEdit={() => openEdit(item.ingId)} onQuickTap={() => removeIngredient(item.ingId)} />;
          })}
        </div>
      )}

      <label style={{ fontSize: 12.5, fontWeight: 600, color: "#8B93A1", textTransform: "uppercase", letterSpacing: "0.04em" }}>Étapes de réalisation</label>

      {steps.length === 0 ? (
        <p style={{ color: "#5B6270", fontSize: 13.5, padding: "10px 0 4px" }}>Aucune étape pour l'instant.</p>
      ) : (
        <div style={{ display: "flex", flexDirection: "column", gap: 8, margin: "10px 0 4px" }}>
          {steps.map((step, idx) => (
            <div key={idx} style={{ display: "flex", gap: 10, alignItems: "flex-start", background: "#1E232B", border: "1px solid #2A303A", borderRadius: 12, padding: "10px 12px" }}>
              <span style={{ width: 22, height: 22, borderRadius: "50%", background: "#2A303A", color: "#9CA3AF", fontSize: 11.5, fontWeight: 700, display: "flex", alignItems: "center", justifyContent: "center", flexShrink: 0, marginTop: 2 }}>
                {idx + 1}
              </span>
              <textarea
                value={step}
                onChange={(e) => updateStep(idx, e.target.value)}
                rows={2}
                style={{ flex: 1, background: "transparent", border: "none", outline: "none", color: "#F5F3EE", fontSize: 14, fontFamily: "inherit", resize: "vertical", lineHeight: 1.4 }}
              />
              <div style={{ display: "flex", flexDirection: "column", gap: 4, flexShrink: 0 }}>
                <button onClick={() => moveStep(idx, "up")} disabled={idx === 0} style={{ background: "none", border: "none", color: idx === 0 ? "#3A4150" : "#8B93A1", cursor: idx === 0 ? "default" : "pointer", fontSize: 12, padding: 2 }}>▲</button>
                <button onClick={() => moveStep(idx, "down")} disabled={idx === steps.length - 1} style={{ background: "none", border: "none", color: idx === steps.length - 1 ? "#3A4150" : "#8B93A1", cursor: idx === steps.length - 1 ? "default" : "pointer", fontSize: 12, padding: 2 }}>▼</button>
                <button onClick={() => removeStep(idx)} style={{ background: "none", border: "none", color: "#C4574A", cursor: "pointer", fontSize: 13, padding: 2 }}>
                  <X size={13} />
                </button>
              </div>
            </div>
          ))}
        </div>
      )}

      <div style={{ display: "flex", gap: 8, marginBottom: 28, marginTop: 4 }}>
        <textarea
          value={stepInput}
          onChange={(e) => setStepInput(e.target.value)}
          placeholder="Décrire l'étape suivante…"
          rows={2}
          style={{ flex: 1, background: "#1E232B", border: "1px solid #2A303A", borderRadius: 12, color: "#F5F3EE", fontSize: 14, padding: "10px 12px", outline: "none", fontFamily: "inherit", resize: "vertical" }}
          onKeyDown={(e) => { if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); addStep(); } }}
        />
        <button
          onClick={addStep}
          disabled={!stepInput.trim()}
          style={{ alignSelf: "flex-start", padding: "10px 14px", borderRadius: 10, border: "none", background: stepInput.trim() ? "#2A303A" : "#1E232B", color: stepInput.trim() ? "#F5F3EE" : "#5B6270", cursor: stepInput.trim() ? "pointer" : "default", display: "flex", alignItems: "center", gap: 4, fontSize: 13, fontWeight: 600 }}
        >
          <Plus size={14} /> Ajouter
        </button>
      </div>

      <button
        disabled={!name.trim() || ingredients.length === 0}
        onClick={() => onSave({ id: draft?.id ?? `recipe-${Date.now()}`, name: name.trim(), ingredients, steps })}
        style={{
          width: "100%",
          padding: "14px 18px",
          borderRadius: 12,
          border: "none",
          background: !name.trim() || ingredients.length === 0 ? "#2A303A" : "#F5F3EE",
          color: !name.trim() || ingredients.length === 0 ? "#5B6270" : "#14171C",
          fontWeight: 700,
          fontSize: 15,
          cursor: !name.trim() || ingredients.length === 0 ? "default" : "pointer",
        }}
      >
        Enregistrer la recette
      </button>

      {modalProduct && (
        <ItemModal
          product={modalProduct}
          initial={editingIngId ? ingredients.find((i) => i.ingId === editingIngId) : null}
          onClose={() => { setModalProduct(null); setEditingIngId(null); }}
          onConfirm={confirm}
          onDelete={editingIngId ? remove : null}
        />
      )}
    </div>
  );
}

// --- Carte recette (vue liste) -----------------------------------------------

function RecipeCard({ recipe, onOpen, onAddToList, onLongPress, products }) {
  const [added, setAdded] = useState(false);
  const preview = recipe.ingredients.slice(0, 5);
  const total = estimateRecipeTotal(recipe.ingredients, products);
  const timer = useRef(null);
  const longPressed = useRef(false);
  const start = () => {
    longPressed.current = false;
    timer.current = setTimeout(() => { longPressed.current = true; onLongPress(); }, 480);
  };
  const clear = () => { if (timer.current) { clearTimeout(timer.current); timer.current = null; } };
  const handleClick = () => {
    if (longPressed.current) { longPressed.current = false; return; }
    onOpen();
  };

  return (
    <div style={{ background: "#1E232B", border: "1px solid #2A303A", borderRadius: 16, padding: 16, marginBottom: 14 }}>
      <div
        onPointerDown={start}
        onPointerUp={clear}
        onPointerLeave={clear}
        onPointerCancel={clear}
        onClick={handleClick}
        onContextMenu={(e) => e.preventDefault()}
        style={{ cursor: "pointer", userSelect: "none" }}
      >
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", marginBottom: 10 }}>
          <div>
            <h3 style={{ fontSize: 16, fontWeight: 700, margin: 0 }}>{recipe.name}</h3>
            {total != null && (
              <span style={{ fontSize: 12.5, fontWeight: 700, color: "#6B9B5E" }}>≈ {formatEuro(total)}</span>
            )}
          </div>
          <span style={{ fontSize: 12, color: "#6B7280", fontWeight: 600, whiteSpace: "nowrap", marginLeft: 10 }}>
            {recipe.ingredients.length} ingrédient{recipe.ingredients.length > 1 ? "s" : ""}
            {recipe.steps?.length > 0 ? ` · ${recipe.steps.length} étape${recipe.steps.length > 1 ? "s" : ""}` : ""}
          </span>
        </div>
        <div style={{ display: "flex", gap: 6, flexWrap: "wrap" }}>
          {preview.map((item) => {
            const p = products.find((pr) => pr.id === item.productId);
            if (!p) return null;
            return (
              <span key={item.ingId} style={{ width: 30, height: 30, borderRadius: 8, background: catInfo(p.cat).accent + "26", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 15 }}>
                <IconGlyph icon={p.icon} size={15} />
              </span>
            );
          })}
          {recipe.ingredients.length > 5 && (
            <span style={{ width: 30, height: 30, borderRadius: 8, background: "#2A303A", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 11, color: "#8B93A1", fontWeight: 700 }}>
              +{recipe.ingredients.length - 5}
            </span>
          )}
        </div>
      </div>

      <button
        onClick={() => { onAddToList(recipe); setAdded(true); setTimeout(() => setAdded(false), 1400); }}
        style={{
          marginTop: 14,
          width: "100%",
          padding: "11px 14px",
          borderRadius: 10,
          border: "none",
          background: added ? "#6B9B5E" : "#2A303A",
          color: added ? "#14171C" : "#F5F3EE",
          fontWeight: 700,
          fontSize: 13.5,
          cursor: "pointer",
          display: "flex",
          alignItems: "center",
          justifyContent: "center",
          gap: 6,
          transition: "background 0.15s",
        }}
      >
        {added ? (<><Check size={15} /> Ajouté à la liste</>) : "Ajouter la recette à la liste"}
      </button>
    </div>
  );
}

// --- App -------------------------------------------------------------------

function App({ initialData, remoteData, remoteVersion, onDataChange, householdName, optionsOpen, onCloseOptions }) {
  const [tab, setTab] = useState("liste");
  const [query, setQuery] = useState("");
  const [catalogQuery, setCatalogQuery] = useState("");
  const [list, setList] = useState(() => initialData?.list ?? []);
  const [modalProduct, setModalProduct] = useState(null);
  const [editingListId, setEditingListId] = useState(null);
  const [recipes, setRecipes] = useState(() => initialData?.recipes ?? []);
  const [recipeEditing, setRecipeEditing] = useState(null); // null | {} | recipe object
  const [collapsedCats, setCollapsedCats] = useState(() => {
    const init = {};
    CATEGORIES.forEach((c) => { init[c.key] = true; }); // rayons repliés par défaut dans "Tous les produits"
    return init;
  });
  const [customProducts, setCustomProducts] = useState(() => initialData?.customProducts ?? []); // articles créés par l'utilisateur
  const [productOverrides, setProductOverrides] = useState(() => initialData?.productOverrides ?? {}); // { [id]: {name, icon, cat, priceUnit, priceKg} } pour les articles de base modifiés
  const [deletedProductIds, setDeletedProductIds] = useState(() => initialData?.deletedProductIds ?? []); // ids d'articles (de base) supprimés
  const [customIcons, setCustomIcons] = useState(() => initialData?.customIcons ?? []); // icônes/emoji perso importés (data URLs)
  const [productModal, setProductModal] = useState(null); // null | {mode:'create'} | {mode:'edit', product}
  const priceImportRef = useRef(null);
  const inputRef = useRef(null);
  const lastAppliedRemoteVersion = useRef(0);

  // Pousse les changements locaux vers le parent (qui synchronise avec Supabase).
  // skipNextPush évite de renvoyer un état qu'on vient tout juste de recevoir d'un autre
  // utilisateur (sinon : boucle infinie de synchro entre les foyers connectés).
  const skipNextPush = useRef(false);
  useEffect(() => {
    if (skipNextPush.current) { skipNextPush.current = false; return; }
    if (onDataChange) onDataChange({ list, recipes, customProducts, productOverrides, deletedProductIds, customIcons });
  }, [list, recipes, customProducts, productOverrides, deletedProductIds, customIcons]);

  // Applique les changements reçus en temps réel d'un autre utilisateur du foyer
  useEffect(() => {
    if (!remoteData || remoteVersion === lastAppliedRemoteVersion.current) return;
    lastAppliedRemoteVersion.current = remoteVersion;
    skipNextPush.current = true;
    setList(remoteData.list ?? []);
    setRecipes(remoteData.recipes ?? []);
    setCustomProducts(remoteData.customProducts ?? []);
    setProductOverrides(remoteData.productOverrides ?? {});
    setDeletedProductIds(remoteData.deletedProductIds ?? []);
    setCustomIcons(remoteData.customIcons ?? []);
  }, [remoteVersion]);

  const toggleCatCollapsed = (key) => setCollapsedCats((c) => ({ ...c, [key]: !c[key] }));

  // Génère et télécharge une sauvegarde de tous les prix actuellement connus (utile pour archiver, pas pour synchroniser :
  // les prix vivent désormais uniquement dans productOverrides/customProducts, synchronisés en direct via Supabase).
  const exportPrices = () => {
    const out = {};
    products.forEach((p) => {
      const hasUnit = p.priceUnit != null && p.priceUnit !== "";
      const hasKg = p.priceKg != null && p.priceKg !== "";
      if (hasUnit || hasKg) {
        out[p.id] = {
          priceUnit: hasUnit ? Number(p.priceUnit) : null,
          priceKg: hasKg ? Number(p.priceKg) : null,
          updatedAt: new Date().toISOString().slice(0, 10),
        };
      }
    });
    const blob = new Blob([JSON.stringify(out, null, 2)], { type: "application/json" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = "prix.json";
    a.click();
    URL.revokeObjectURL(url);
  };

  // Importe un fichier de prix (ancien ou nouveau format) et l'applique comme overrides.
  // Import ponctuel : une fois fait, ces prix vivent dans productOverrides et se synchronisent
  // normalement avec le reste du foyer, sans dépendre d'un fichier séparé.
  const importPrices = (file) => {
    const reader = new FileReader();
    reader.onload = (e) => {
      let data;
      try { data = JSON.parse(e.target.result); } catch (err) { return; }
      setProductOverrides((prev) => {
        const next = { ...prev };
        Object.keys(data || {}).forEach((id) => {
          const entry = data[id];
          if (!entry) return;
          const priced = entry.priceKg !== undefined || typeof entry.priceUnit === "number"
            ? entry
            : entry.price != null
              ? (entry.priceUnit === "kg" ? { priceKg: entry.price } : { priceUnit: entry.price })
              : null;
          if (!priced) return;
          next[id] = { ...(next[id] || {}), ...priced };
        });
        return next;
      });
    };
    reader.readAsText(file);
  };

  // Base + articles personnalisés, avec overrides manuels (prix, nom, icône, rayon) et suppressions appliqués.
  const products = useMemo(() => {
    const applyOverride = (p) => (productOverrides[p.id] ? { ...p, ...productOverrides[p.id] } : p);
    const base = PRODUCTS.filter((p) => !deletedProductIds.includes(p.id)).map(applyOverride);
    const customs = customProducts.filter((p) => !deletedProductIds.includes(p.id)).map(applyOverride);
    return [...base, ...customs];
  }, [customProducts, productOverrides, deletedProductIds]);

  const addCustomProduct = ({ name, icon, cat, priceUnit, priceKg, variants }) => {
    const p = { id: `custom-${Date.now()}`, name, icon, cat, priceUnit: priceUnit ?? null, priceKg: priceKg ?? null, variants: variants ?? [] };
    setCustomProducts((l) => [...l, p]);
    return p;
  };
  const editProduct = (id, patch) => {
    if (id.startsWith("custom-")) {
      setCustomProducts((l) => l.map((p) => (p.id === id ? { ...p, ...patch } : p)));
    } else {
      setProductOverrides((o) => ({ ...o, [id]: { ...(o[id] || {}), ...patch } }));
    }
  };
  const deleteProduct = (id) => {
    if (id.startsWith("custom-")) {
      setCustomProducts((l) => l.filter((p) => p.id !== id));
    } else {
      setDeletedProductIds((ids) => [...ids, id]);
    }
  };

  const openNewProductModal = () => setProductModal({ mode: "create" });
  const openEditProductModal = (product) => setProductModal({ mode: "edit", product });
  const closeProductModal = () => setProductModal(null);
  // Importe une image locale comme icône perso : redimensionnée en 64x64 pour rester légère
  // (stockée en base64, synchronisée avec le reste des données du foyer), puis ajoutée à la bibliothèque.
  const addCustomIcon = (file, onReady) => {
    const reader = new FileReader();
    reader.onload = (e) => {
      const img = new Image();
      img.onload = () => {
        const size = 64;
        const canvas = document.createElement("canvas");
        canvas.width = size;
        canvas.height = size;
        const ctx = canvas.getContext("2d");
        const scale = Math.min(size / img.width, size / img.height);
        const w = img.width * scale;
        const h = img.height * scale;
        ctx.drawImage(img, (size - w) / 2, (size - h) / 2, w, h);
        const dataUrl = canvas.toDataURL("image/png");
        setCustomIcons((list) => (list.includes(dataUrl) ? list : [dataUrl, ...list]));
        if (onReady) onReady(dataUrl);
      };
      img.src = e.target.result;
    };
    reader.readAsDataURL(file);
  };

  const deleteCustomIcon = (dataUrl) => setCustomIcons((list) => list.filter((i) => i !== dataUrl));

  const saveProductModal = ({ name, icon, cat, priceUnit, priceKg, variants }) => {
    if (productModal.mode === "create") addCustomProduct({ name, icon, cat, priceUnit, priceKg, variants });
    else editProduct(productModal.product.id, { name, icon, cat, priceUnit, priceKg, variants });
    closeProductModal();
  };
  const deleteFromProductModal = () => {
    deleteProduct(productModal.product.id);
    closeProductModal();
  };

  const results = useMemo(() => {
    const q = normalize(query.trim());
    if (!q) return [];
    return products.filter((p) => productMatchesQuery(p, q)).slice(0, 7);
  }, [query, products]);

  const addCustomFromSearch = () => {
    const trimmed = query.trim();
    if (!trimmed) return;
    const p = addCustomProduct({ name: trimmed, icon: "📦", cat: "autre" });
    openAddModal(p);
  };

  const grouped = useMemo(() => {
    const map = {};
    list.forEach((item) => {
      const p = products.find((pr) => pr.id === item.productId);
      if (!p) return;
      if (!map[p.cat]) map[p.cat] = [];
      map[p.cat].push({ item, product: p });
    });
    return CATEGORIES.filter((c) => map[c.key]).map((c) => ({ ...c, entries: map[c.key] }));
  }, [list, products]);

  const allGrouped = useMemo(
    () => CATEGORIES.map((c) => ({
      ...c,
      products: products.filter((p) => p.cat === c.key).slice().sort((a, b) => a.name.localeCompare(b.name, "fr", { sensitivity: "base" })),
    })),
    [products]
  );
  const catalogFiltered = useMemo(() => {
    const q = normalize(catalogQuery.trim());
    if (!q) return [];
    return products.filter((p) => productMatchesQuery(p, q)).slice().sort((a, b) => a.name.localeCompare(b.name, "fr", { sensitivity: "base" }));
  }, [catalogQuery, products]);
  const listedProductIds = useMemo(() => new Set(list.map((i) => i.productId)), [list]);

  const openAddModal = (product) => { setModalProduct(product); setEditingListId(null); setQuery(""); };
  const openEditModal = (listId) => {
    const entry = list.find((l) => l.listId === listId);
    if (!entry) return;
    setModalProduct(products.find((p) => p.id === entry.productId));
    setEditingListId(listId);
  };
  const removeFromList = (listId) => setList((l) => l.filter((it) => it.listId !== listId));
  const confirmModal = ({ qty, unit, note }) => {
    if (editingListId) {
      setList((l) => l.map((it) => (it.listId === editingListId ? { ...it, qty, unit, note } : it)));
    } else {
      setList((l) => [...l, { listId: `${modalProduct.id}-${Date.now()}`, productId: modalProduct.id, qty, unit, note }]);
    }
    setModalProduct(null);
    setEditingListId(null);
    inputRef.current?.focus();
  };
  const deleteFromModal = () => {
    setList((l) => l.filter((it) => it.listId !== editingListId));
    setModalProduct(null);
    setEditingListId(null);
  };

  const addRecipeToList = (recipe) => {
    const now = Date.now();
    const newEntries = recipe.ingredients.map((ing, i) => ({
      listId: `${ing.productId}-${now}-${i}`,
      productId: ing.productId,
      qty: ing.qty,
      unit: ing.unit,
      note: ing.note,
    }));
    setList((l) => [...l, ...newEntries]);
  };

  const saveRecipe = (recipe) => {
    setRecipes((r) => {
      const exists = r.some((x) => x.id === recipe.id);
      return exists ? r.map((x) => (x.id === recipe.id ? recipe : x)) : [...r, recipe];
    });
    setRecipeEditing(null);
  };
  const [confirmDeleteRecipe, setConfirmDeleteRecipe] = useState(null); // recette en attente de confirmation de suppression
  const deleteRecipe = (id) => {
    setRecipes((r) => r.filter((x) => x.id !== id));
    setConfirmDeleteRecipe(null);
  };

  const totalCount = list.length;

  const estimatedTotal = useMemo(() => {
    let total = 0;
    let hasAny = false;
    list.forEach((item) => {
      const p = products.find((pr) => pr.id === item.productId);
      const est = estimateItemPrice(item, p);
      if (est != null) { total += est; hasAny = true; }
    });
    return hasAny ? total : null;
  }, [list, products]);

  return (
    <div style={{ fontFamily: "'Inter', system-ui, sans-serif", background: "#14171C", minHeight: "100vh", color: "#F5F3EE", display: "flex", justifyContent: "center" }}>
      <style>{`
        @import url('https://fonts.googleapis.com/css2?family=Fraunces:wght@500;600;700&family=Inter:wght@400;500;600;700&display=swap');
        * { box-sizing: border-box; }
        input::placeholder { color: #6B7280; }
        input[type=number]::-webkit-inner-spin-button, input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
        .grow-in { animation: growIn 0.2s ease-out; }
        @keyframes growIn { from { opacity:0; transform: translateY(6px) } to { opacity:1; transform: translateY(0) } }
        @media (prefers-reduced-motion: reduce) { .grow-in { animation: none; } }
      `}</style>

      <div style={{ width: "100%", maxWidth: 480, padding: "26px 18px 100px" }}>
        {!(tab === "recettes" && recipeEditing) && (
          <header style={{ marginBottom: 18 }}>
            <div style={{ display: "flex", alignItems: "center", gap: 10, color: "#8B93A1", fontSize: 13, fontWeight: 600, letterSpacing: "0.06em", textTransform: "uppercase", marginBottom: 4 }}>
              <ShoppingBasket size={16} strokeWidth={2.2} />
              {householdName || "Foyer"}
            </div>
            <h1 style={{ fontFamily: "'Fraunces', serif", fontWeight: 600, fontSize: 30, margin: 0, letterSpacing: "-0.01em" }}>
              {tab === "liste" ? "Ma liste" : tab === "tous" ? "Tous les produits" : "Recettes"}
            </h1>
            {tab === "liste" && (
              <p style={{ color: "#6B7280", fontSize: 14, margin: "4px 0 0" }}>
                {totalCount === 0
                  ? "Aucun article pour l'instant"
                  : `${totalCount} article${totalCount > 1 ? "s" : ""} dans ${grouped.length} rayon${grouped.length > 1 ? "s" : ""}`}
              </p>
            )}
            {tab === "liste" && estimatedTotal != null && (
              <p style={{ fontSize: 26, fontWeight: 800, margin: "6px 0 0", color: estimatedTotal < 70 ? "#6B9B5E" : "#C4574A" }}>
                ≈ {formatEuro(estimatedTotal)}
              </p>
            )}
            {tab === "recettes" && (
              <p style={{ color: "#6B7280", fontSize: 14, margin: "4px 0 0" }}>
                {recipes.length === 0 ? "Aucune recette enregistrée" : `${recipes.length} recette${recipes.length > 1 ? "s" : ""}`}
              </p>
            )}
          </header>

        {!(tab === "recettes" && recipeEditing) && (
          <div style={{ display: "flex", gap: 6, background: "#1E232B", border: "1px solid #2A303A", borderRadius: 12, padding: 4, marginBottom: 22 }}>
            {[
              { key: "liste", label: "Ma liste", icon: ListChecks },
              { key: "tous", label: "Tous les produits", icon: Grid3x3 },
              { key: "recettes", label: "Recettes", icon: BookOpen },
            ].map((t) => (
              <button
                key={t.key}
                onClick={() => setTab(t.key)}
                style={{ flex: 1, display: "flex", alignItems: "center", justifyContent: "center", gap: 5, padding: "9px 6px", borderRadius: 9, border: "none", background: tab === t.key ? "#2A303A" : "transparent", color: tab === t.key ? "#F5F3EE" : "#6B7280", fontWeight: 600, fontSize: 12, cursor: "pointer" }}
              >
                <t.icon size={14} />
                {t.label}
              </button>
            ))}
          </div>
        )}

        {tab === "liste" && (
          <div style={{ position: "relative", marginBottom: 26 }}>
            <div style={{ display: "flex", alignItems: "center", background: "#1E232B", border: "1px solid #2A303A", borderRadius: 14, padding: "12px 14px", gap: 10 }}>
              <Search size={18} color="#6B7280" strokeWidth={2.2} />
              <input
                ref={inputRef}
                value={query}
                onChange={(e) => setQuery(e.target.value)}
                placeholder="Chercher un produit…"
                style={{ background: "transparent", border: "none", outline: "none", color: "#F5F3EE", fontSize: 15, width: "100%", fontFamily: "inherit" }}
                onKeyDown={(e) => { if (e.key === "Enter" && results.length > 0) openAddModal(results[0]); }}
              />
              {query && (
                <button onClick={() => setQuery("")} style={{ background: "none", border: "none", color: "#6B7280", cursor: "pointer", display: "flex", padding: 2 }} aria-label="Effacer">
                  <X size={16} />
                </button>
              )}
            </div>
            {results.length > 0 && (
              <div className="grow-in" style={{ position: "absolute", top: "calc(100% + 8px)", left: 0, right: 0, background: "#1E232B", border: "1px solid #2A303A", borderRadius: 14, overflow: "hidden", zIndex: 10, boxShadow: "0 12px 28px rgba(0,0,0,0.35)", maxHeight: 320, overflowY: "auto" }}>
                {results.map((p, i) => {
                  const c = catInfo(p.cat);
                  return (
                    <button key={p.id} onClick={() => openAddModal(p)} style={{ display: "flex", alignItems: "center", gap: 12, width: "100%", padding: "11px 14px", background: "transparent", border: "none", borderBottom: i < results.length - 1 ? "1px solid #262B34" : "none", cursor: "pointer", textAlign: "left", color: "#F5F3EE" }}>
                      <span style={{ width: 34, height: 34, borderRadius: 9, background: c.accent + "26", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 17, flexShrink: 0 }}><IconGlyph icon={p.icon} size={17} /></span>
                      <span style={{ flex: 1, fontSize: 14.5, fontWeight: 500 }}>{p.name}</span>
                      <span style={{ display: "flex", flexDirection: "column", alignItems: "flex-end", gap: 2 }}>
                        <span style={{ fontSize: 10.5, color: c.accent, fontWeight: 600 }}>{c.label}</span>
                        {formatProductPrice(p) && (
                          <span style={{ fontSize: 11, color: "#F5F3EE", fontWeight: 700 }}>{formatProductPrice(p)}</span>
                        )}
                      </span>
                      <Plus size={16} color="#6B7280" />
                    </button>
                  );
                })}
              </div>
            )}
            {query && results.length === 0 && (
              <div className="grow-in" style={{ position: "absolute", top: "calc(100% + 8px)", left: 0, right: 0, background: "#1E232B", border: "1px solid #2A303A", borderRadius: 14, padding: "14px", zIndex: 10 }}>

                <button

                  style={{ width: "100%", display: "flex", alignItems: "center", justifyContent: "center", gap: 6, padding: "10px 12px", borderRadius: 10, border: "1px dashed #3A4150", background: "transparent", color: "#9CA3AF", fontWeight: 600, fontSize: 13, cursor: "pointer" }}
                >
                  <Plus size={14} /> Ajouter « {query} » comme article personnalisé
                </button>
              </div>
            )}
          </div>
        )}

        {tab === "liste" &&
          (grouped.length === 0 ? (
            <div style={{ textAlign: "center", padding: "48px 16px", color: "#4B5563" }}>
              <div style={{ fontSize: 38, marginBottom: 10 }}>🧺</div>
              <p style={{ fontSize: 14, margin: 0, lineHeight: 1.5 }}>Cherchez un produit ci-dessus pour<br />commencer votre liste.</p>
            </div>
          ) : (
            grouped.map((cat) => (
              <section key={cat.key} style={{ marginBottom: 26 }}>
                <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 12 }}>

function LoginScreen({ onLoginExisting, onLoginNew, loading, error, initialCode }) {
  const [email, setEmail] = useState("");

  const labelStyle = { fontSize: 12.5, fontWeight: 600, color: "#8B93A1", textTransform: "uppercase", letterSpacing: "0.04em", display: "block", marginBottom: 6 };

  const submitExisting = async () => { await onLoginExisting({ email }); };
  const submitNew = async () => {
    const ok = await onLoginNew({ email, pseudo, code });
    if (ok) setSent(true);
  };

  if (sent) {
    return (
      <div style={{ fontFamily: "'Inter', system-ui, sans-serif", background: "#14171C", minHeight: "100vh", color: "#F5F3EE", display: "flex", alignItems: "center", justifyContent: "center", padding: 20 }}>
        <div style={{ width: "100%", maxWidth: 380, textAlign: "center" }}>
          <div style={{ fontSize: 40, marginBottom: 14 }}>📬</div>
          <h1 style={{ fontFamily: "'Fraunces', serif", fontWeight: 600, fontSize: 22, margin: "0 0 10px" }}>Vérifie ta boîte mail</h1>
          <p style={{ color: "#8B93A1", fontSize: 14, lineHeight: 1.6, margin: "0 0 22px" }}>
            On a envoyé un lien de connexion à <strong style={{ color: "#F5F3EE" }}>{email}</strong>. Ouvre-le pour finaliser la création de ton compte — ensuite, une simple adresse email suffira pour te reconnecter.
          </p>
          <button
            onClick={() => setSent(false)}
            style={{ background: "none", border: "none", color: "#6B9B5E", fontWeight: 600, fontSize: 13.5, cursor: "pointer" }}
          >
            Mauvaise adresse ? Recommencer
          </button>
        </div>
      </div>
    );
  }

  return (
    <div style={{ fontFamily: "'Inter', system-ui, sans-serif", background: "#14171C", minHeight: "100vh", color: "#F5F3EE", display: "flex", alignItems: "center", justifyContent: "center", padding: 20 }}>
      <div style={{ width: "100%", maxWidth: 380 }}>
        <div style={{ textAlign: "center", marginBottom: 28 }}>
          <div style={{ fontSize: 40, marginBottom: 10 }}>🧺</div>
          <h1 style={{ fontFamily: "'Fraunces', serif", fontWeight: 600, fontSize: 26, margin: 0 }}>Liste de Courses</h1>
          <p style={{ color: "#6B7280", fontSize: 13.5, margin: "6px 0 0" }}>Connecte-toi pour accéder à ton foyer</p>
        </div>

        <label style={labelStyle}>Email</label>
        <input style={inputStyle} type="email" autoComplete="username" value={email} onChange={(e) => setEmail(e.target.value)}
          onKeyDown={(e) => { if (e.key === "Enter") submitExisting(); }} placeholder="ton@email.com" />

        {error && <p style={{ color: "#C4574A", fontSize: 13, margin: "-4px 0 14px" }}>{error}</p>}

        <button
          disabled={loading || !email}
          onClick={submitExisting}
          style={{ width: "100%", padding: "15px 18px", borderRadius: 12, border: "none", background: loading || !email ? "#2A303A" : "#6B9B5E", color: loading || !email ? "#5B6270" : "#14171C", fontWeight: 700, fontSize: 16, cursor: loading || !email ? "default" : "pointer" }}
        >
          {loading ? "Connexion…" : "Connexion"}
        </button>
        <p style={{ color: "#4B5563", fontSize: 11.5, textAlign: "center", margin: "10px 0 0", lineHeight: 1.4 }}>
          Déjà un compte ? Ton email suffit, aucun email de vérification n'est renvoyé.
        </p>

        <div style={{ display: "flex", alignItems: "center", gap: 12, margin: "26px 0 18px" }}>
          <div style={{ flex: 1, height: 1, background: "#2A303A" }} />
          <span style={{ fontSize: 12, color: "#5B6270", fontWeight: 600, whiteSpace: "nowrap" }}>Nouvel utilisateur ?</span>
          <div style={{ flex: 1, height: 1, background: "#2A303A" }} />
        </div>

        {!newUserMode ? (
          <button
            onClick={() => setNewUserMode(true)}
            style={{ width: "100%", padding: "13px 18px", borderRadius: 12, border: "1px solid #2A303A", background: "transparent", color: "#F5F3EE", fontWeight: 600, fontSize: 14, cursor: "pointer" }}
          >
            Recevoir un lien de connexion
          </button>
        ) : (
          <>
            <label style={labelStyle}>Mon pseudo est</label>
            <input style={inputStyle} type="text" value={pseudo} onChange={(e) => setPseudo(e.target.value)}
              onKeyDown={(e) => { if (e.key === "Enter") submitNew(); }} placeholder="ex : Marie" />

            <label style={labelStyle}>Code foyer (facultatif)</label>
            <input style={inputStyle} type="text" value={code} onChange={(e) => setCode(e.target.value)}
              onKeyDown={(e) => { if (e.key === "Enter") submitNew(); }} placeholder="Colle ici un code reçu pour rejoindre un foyer" />

            <button
              disabled={loading || !email}
              onClick={submitNew}
              style={{ width: "100%", padding: "13px 18px", borderRadius: 12, border: "1px solid #2A303A", background: "transparent", color: loading || !email ? "#5B6270" : "#F5F3EE", fontWeight: 600, fontSize: 14, cursor: loading || !email ? "default" : "pointer" }}
            >
              {loading ? "Envoi…" : "Recevoir mon lien de connexion"}
            </button>
          </>
        )}
      </div>
    </div>
  );
}
