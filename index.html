<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; background: #FBF7EA; }
  #root { min-height: 100vh; }
  #boot-error { display:none; color:#23262E; font-family:-apple-system,sans-serif; padding:24px; max-width:480px; margin:0 auto; }
</style>
<script>
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => navigator.serviceWorker.register('sw.js'));
}
window.addEventListener('error', function (e) {
  var el = document.getElementById('boot-error');
  var root = document.getElementById('root');
  if (root && !root.hasChildNodes() && el) {
    el.style.display = 'block';
    el.querySelector('#boot-error-msg').textContent = (e && e.message) || 'Erreur inconnue';
  }
});
</script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.3.1/umd/react.production.min.js" crossorigin></script>

<div id="root"></div>
<div id="boot-error">

  <p style="opacity:.6;font-size:.8em" id="boot-error-msg"></p>
</div>

// navigateur, pour pouvoir la déclencher plus tard depuis le bouton dans Options.
// Sur iOS, cet événement n'existe pas du tout (Apple ne l'expose pas) — géré séparément.
let deferredInstallPrompt = null;
window.addEventListener("beforeinstallprompt", (e) => {
  e.preventDefault();
  deferredInstallPrompt = e;
});

  return (
    <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color}
      strokeWidth={strokeWidth} strokeLinecap="round" strokeLinejoin="round" style={style}>
      {children}
    </svg>

}

// Affiche l'icône d'un produit : un emoji texte, ou une image importée localement (data URL).
function IconGlyph({ icon, size = 20, style }) {
  if (typeof icon === "string" && icon.startsWith("data:image")) {
    return <img src={icon} alt="" style={{ width: size, height: size, objectFit: "contain", borderRadius: 4, display: "inline-block", verticalAlign: "middle", ...style }} />;
  }
  return <span style={{ fontSize: size, lineHeight: 1, ...style }}>{icon}</span>;

// Normalise pour une recherche insensible aux accents / ligatures (ex: "boeuf" trouve "bœuf")
function normalize(str) {
  return String(str)
    .toLowerCase()
    .replace(/œ/g, "oe")
    .replace(/æ/g, "ae")
    .normalize("NFD")
    .replace(/[\u0300-\u036f]/g, "");
}

// Un produit correspond à la recherche si son nom OU l'un de ses sous-produits/variétés correspond
// (ex : taper "patates" trouve "Pomme de terre" si "Patates" est enregistré comme sous-produit).
function productMatchesQuery(product, normalizedQuery) {
  if (normalize(product.name).includes(normalizedQuery)) return true;
  return (product.variants || []).some((v) => normalize(v.name).includes(normalizedQuery));
}

const DEFAULT_PALETTE = { primary: "#FBF7EA", accent: "#4E9D5B" };

function hexToRgb(hex) {
  const h = hex.replace("#", "");
  const full = h.length === 3 ? h.split("").map((c) => c + c).join("") : h;
  const bigint = parseInt(full, 16) || 0;
  return [(bigint >> 16) & 255, (bigint >> 8) & 255, bigint & 255];
}
function rgbToHex([r, g, b]) {
  const clamp = (v) => Math.max(0, Math.min(255, Math.round(v)));
  return "#" + [r, g, b].map((v) => clamp(v).toString(16).padStart(2, "0")).join("");
}
function mixColor(hex, target, amount) {
  const [r, g, b] = hexToRgb(hex);
  const [tr, tg, tb] = target;
  return rgbToHex([r + (tr - r) * amount, g + (tg - g) * amount, b + (tb - b) * amount]);
}
const lightenColor = (hex, amount) => mixColor(hex, [255, 255, 255], amount);
const darkenColor = (hex, amount) => mixColor(hex, [0, 0, 0], amount);
function hexToRgba(hex, alpha) {
  const [r, g, b] = hexToRgb(hex);
  return `rgba(${r}, ${g}, ${b}, ${alpha})`;
}

// --- Prix -------------------------------------------------------------------

function formatEuro(n) {
  return `${n.toFixed(2).replace(".", ",")} €`;
}

// Libellé court affiché sur une tuile produit : "1,76 €/paquet" et/ou "4,99 €/kg"
function formatProductPrice(product) {
  const parts = [];
  if (product.priceUnit != null && product.priceUnit !== "") parts.push(`${formatEuro(Number(product.priceUnit))}/paquet`);
  if (product.priceKg != null && product.priceKg !== "") parts.push(`${formatEuro(Number(product.priceKg))}/kg`);
  return parts.length ? parts.join(" · ") : null;
}

// Estime le coût d'un article de la liste : prix au kg × qty si l'unité choisie est "kg",
// prix à l'unité × qty si l'unité choisie est "paquet". Renvoie null si le prix correspondant est inconnu.
function estimateItemPrice(item, product) {
  if (!product) return null;
  if (item.unit === "kg") {
    if (product.priceKg == null || product.priceKg === "") return null;
    const p = Number(product.priceKg);
    return Number.isNaN(p) ? null : item.qty * p;
  }
  if (item.unit === "paquet") {
    if (product.priceUnit != null && product.priceUnit !== "") {
      const p = Number(product.priceUnit);
      return Number.isNaN(p) ? null : item.qty * p;
    }
    // Pas de prix à l'unité connu : si un poids par article et un prix au kg sont renseignés,
    // on estime le prix à partir de ces deux valeurs (ex : tomate à 5 €/kg, article de 100 g → 0,50 €/article).
    if (product.priceKg != null && product.priceKg !== "" && product.weight != null && product.weight !== "") {
      const pk = Number(product.priceKg);
      const w = Number(product.weight);
      if (!Number.isNaN(pk) && !Number.isNaN(w) && w > 0) return item.qty * pk * (w / 1000);
    }
    return null;
  }
  return null;
}

// Estime le coût total d'une recette (somme des ingrédients dont le prix est connu et l'unité compatible)
function estimateRecipeTotal(ingredients, products) {
  let total = 0;
  let hasAny = false;
  (ingredients || []).forEach((item) => {
    const p = products.find((pr) => pr.id === item.productId);
    const est = estimateItemPrice(item, p);
    if (est != null) { total += est; hasAny = true; }
  });
  return hasAny ? total : null;
}

// Tables standard EAN-13 / EAN-8 (norme GS1) — permettent de reconstruire un vrai code-barres
// scannable à partir des chiffres imprimés sous le code-barres.
const EAN_L = { "0": "0001101", "1": "0011001", "2": "0010011", "3": "0111101", "4": "0100011", "5": "0110001", "6": "0101111", "7": "0111011", "8": "0110111", "9": "0001011" };
const EAN_G = { "0": "0100111", "1": "0110011", "2": "0011011", "3": "0100001", "4": "0011101", "5": "0111001", "6": "0000101", "7": "0010001", "8": "0001001", "9": "0010111" };
const EAN_R = { "0": "1110010", "1": "1100110", "2": "1101100", "3": "1000010", "4": "1011100", "5": "1001110", "6": "1010000", "7": "1000100", "8": "1001000", "9": "1110100" };
const EAN_PARITY = { "0": "LLLLLL", "1": "LLGLGG", "2": "LLGGLG", "3": "LLGGGL", "4": "LGLLGG", "5": "LGGLLG", "6": "LGGGLL", "7": "LGLGLG", "8": "LGLGGL", "9": "LGGLGL" };

function ean13CheckDigit(d12) {
  let sum = 0;
  for (let i = 0; i < 12; i++) sum += (i % 2 === 0 ? 1 : 3) * Number(d12[i]);
  const mod = sum % 10;
  return mod === 0 ? 0 : 10 - mod;
}
function ean8CheckDigit(d7) {
  let sum = 0;
  for (let i = 0; i < 7; i++) sum += (i % 2 === 0 ? 3 : 1) * Number(d7[i]);
  const mod = sum % 10;
  return mod === 0 ? 0 : 10 - mod;
}
function encodeEAN13(digits13) {
  const parity = EAN_PARITY[digits13[0]];
  let bin = "101";
  for (let i = 1; i <= 6; i++) bin += (parity[i - 1] === "L" ? EAN_L : EAN_G)[digits13[i]];
  bin += "01010";
  for (let i = 7; i <= 12; i++) bin += EAN_R[digits13[i]];
  bin += "101";
  return bin;
}
function encodeEAN8(digits8) {
  let bin = "101";
  for (let i = 0; i < 4; i++) bin += EAN_L[digits8[i]];
  bin += "01010";
  for (let i = 4; i < 8; i++) bin += EAN_R[digits8[i]];
  bin += "101";
  return bin;
}

// Table standard Code 128 (norme ISO/IEC 15417) — utilisée pour les codes numériques de
// longueur non standard (ni 7/8, ni 12/13 chiffres), très courante sur les cartes de fidélité
// type Intermarché. Chaque valeur (0-106) correspond à un motif de largeurs de barres/blancs :
// lettre majuscule = barre, minuscule = blanc, la lettre indiquant la largeur (a=1..d=4 modules).
const C128_PATTERNS = {
  "0":"BaBbBb","1":"BbBaBb","2":"BbBbBa","3":"AbAbBc","4":"AbAcBb","5":"AcAbBb",
  "6":"AbBbAc","7":"AbBcAb","8":"AcBbAb","9":"BbAbAc","10":"BbAcAb","11":"BcAbAb",
  "12":"AaBbCb","13":"AbBaCb","14":"AbBbCa","15":"AaCbBb","16":"AbCaBb","17":"AbCbBa",
  "18":"BbCbAa","19":"BbAaCb","20":"BbAbCa","21":"BaCbAb","22":"BbCaAb","23":"CaBaCa",
  "24":"CaAbBb","25":"CbAaBb","26":"CbAbBa","27":"CaBbAb","28":"CbBaAb","29":"CbBbAa",
  "30":"BaBaBc","31":"BaBcBa","32":"BcBaBa","33":"AaAcBc","34":"AcAaBc","35":"AcAcBa",
  "36":"AaBcAc","37":"AcBaAc","38":"AcBcAa","39":"BaAcAc","40":"BcAaAc","41":"BcAcAa",
  "42":"AaBaCc","43":"AaBcCa","44":"AcBaCa","45":"AaCaBc","46":"AaCcBa","47":"AcCaBa",
  "48":"CaCaBa","49":"BaAcCa","50":"BcAaCa","51":"BaCaAc","52":"BaCcAa","53":"BaCaCa",
  "54":"CaAaBc","55":"CaAcBa","56":"CcAaBa","57":"CaBaAc","58":"CaBcAa","59":"CcBaAa",
  "60":"CaDaAa","61":"BbAdAa","62":"DcAaAa","63":"AaAbBd","64":"AaAdBb","65":"AbAaBd",
  "66":"AbAdBa","67":"AdAaBb","68":"AdAbBa","69":"AaBbAd","70":"AaBdAb","71":"AbBaAd",
  "72":"AbBdAa","73":"AdBaAb","74":"AdBbAa","75":"BdAbAa","76":"BbAaAd","77":"DaCaAa",
  "78":"BdAaAb","79":"AcDaAa","80":"AaAbDb","81":"AbAaDb","82":"AbAbDa","83":"AaDbAb",
  "84":"AbDaAb","85":"AbDbAa","86":"DaAbAb","87":"DbAaAb","88":"DbAbAa","89":"BaBaDa",
  "90":"BaDaBa","91":"DaBaBa","92":"AaAaDc","93":"AaAcDa","94":"AcAaDa","95":"AaDaAc",
  "96":"AaDcAa","97":"DaAaAc","98":"DaAcAa","99":"AaCaDa","100":"AaDaCa","101":"CaAaDa",
  "102":"DaAaCa","103":"BaAdAb","104":"BaAbAd","105":"BaAbCb","106":"BcCaAaB",
};
function c128Decompose(values) {
  return values.map((v) => {
    const pat = C128_PATTERNS[String(v)];
    let bin = "";
    for (const ch of pat) {
      const isBar = ch === ch.toUpperCase();
      const width = ch.toLowerCase().charCodeAt(0) - 96; // a=1, b=2, c=3, d=4 modules
      bin += (isBar ? "1" : "0").repeat(width);
    }
    return bin;
  }).join("");
}
// Encode une suite de chiffres en Code 128 Set C (2 chiffres par symbole, le plus compact —
// c'est le format qu'utilisent la plupart des cartes de fidélité à code numérique long). Si le
// nombre de chiffres est impair, les chiffres pleins passent en Set C et le dernier bascule en
// Set B, exactement comme le font les générateurs de codes-barres standards.
function encodeCode128Numeric(digitsStr) {
  const START_C = 105, TO_B = 100, STOP = 106;
  const symbols = [];
  if (digitsStr.length % 2 === 0) {
    for (let i = 0; i < digitsStr.length; i += 2) symbols.push(Number(digitsStr.slice(i, i + 2)));
  } else {
    const evenPart = digitsStr.slice(0, -1);
    const lastDigit = digitsStr.slice(-1);
    for (let i = 0; i < evenPart.length; i += 2) symbols.push(Number(evenPart.slice(i, i + 2)));
    symbols.push(TO_B);
    symbols.push(16 + Number(lastDigit)); // valeur Set B d'un chiffre '0'-'9' = 16 + chiffre
  }
  const values = [START_C, ...symbols];
  let checksum = values[0];
  for (let i = 1; i < values.length; i++) checksum += i * values[i];
  checksum = checksum % 103;
  return c128Decompose([...values, checksum, STOP]);
}

// Normalise n'importe quelle suite de chiffres entrée à la main en un code-barres affichable :
// EAN-8/EAN-13 pour les longueurs standard (avec calcul automatique de la clé de contrôle),
// et Code 128 pour toute autre longueur — sans jamais tronquer le code, quelle que soit sa taille.
function normalizeBarcode(raw) {
  let digits = String(raw || "").replace(/\D/g, "");
  if (!digits) return null;
  if (digits.length === 7) digits += String(ean8CheckDigit(digits));
  if (digits.length === 8) return { digits, bin: encodeEAN8(digits) };
  if (digits.length === 12) digits += String(ean13CheckDigit(digits));
  if (digits.length === 13) return { digits, bin: encodeEAN13(digits) };
  return { digits, bin: encodeCode128Numeric(digits) };
}

// Rendu SVG du code-barres à partir de la chaîne de modules binaires (barres = "1", blancs = "0")
function BarcodeSvg({ code, height = 100 }) {
  const encoded = useMemo(() => normalizeBarcode(code), [code]);
  if (!encoded) return null;
  const n = encoded.bin.length;
  return (
    <svg viewBox={`0 0 ${n} 100`} preserveAspectRatio="none" style={{ width: "100%", height, display: "block" }}>
      <rect x={0} y={0} width={n} height={100} fill="#FFFFFF" />
      {encoded.bin.split("").map((b, i) => (b === "1" ? <rect key={i} x={i} y={0} width={1} height={100} fill="#14171C" /> : null))}
    </svg>
  );
}

// --- Carte produit (avec appui long pour édition) ---------------------------

function ItemCard({ item, product, onEdit, onQuickTap, small }) {
  const timer = useRef(null);
  const longPressed = useRef(false);
  const c = catInfo(product.cat);
  const bought = !!item.bought;
  const startPress = () => {
    longPressed.current = false;
    timer.current = setTimeout(() => { longPressed.current = true; onEdit(); }, 480);
  };
  const clearPress = () => { if (timer.current) { clearTimeout(timer.current); timer.current = null; } };
  const handleClick = () => {
    if (longPressed.current) { longPressed.current = false; return; }
    if (onQuickTap) onQuickTap();
  };

  return (
    <div
      onPointerDown={startPress}
      onPointerUp={clearPress}
      onPointerLeave={clearPress}
      onPointerCancel={clearPress}
      onClick={handleClick}
      onContextMenu={(e) => e.preventDefault()}
      style={{ background: bought ? "#EFEDE2" : c.tint, border: `1px solid ${bought ? "var(--color-primary-border)" : c.accent + "33"}`, borderRadius: 16, padding: small ? "12px 6px 9px" : "16px 8px 12px", display: "flex", flexDirection: "column", alignItems: "center", gap: 6, minHeight: small ? 78 : 96, userSelect: "none", cursor: "pointer", opacity: bought ? 0.55 : 1 }}
    >
      {item.fromRecipe && (
        <span style={{ display: "flex", alignItems: "center", gap: 3, maxWidth: "100%", color: bought ? "#A8A695" : "var(--color-accent-dark)", marginBottom: -2 }}>
          <BookOpen size={9} strokeWidth={2.4} style={{ flexShrink: 0 }} />
          <span style={{ fontSize: 8.5, fontWeight: 700, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap", textTransform: "uppercase", letterSpacing: "0.02em" }}>{item.fromRecipe}</span>
        </span>
      )}
      <span style={{ fontSize: small ? 21 : 26, filter: bought ? "grayscale(1)" : "none" }}><IconGlyph icon={product.icon} size={small ? 21 : 26} /></span>
      <span style={{ fontSize: small ? 11 : 12.5, fontWeight: 600, textAlign: "center", lineHeight: 1.25, color: bought ? "#9A9887" : "#23262E", textDecoration: bought ? "line-through" : "none" }}>
        {product.name}
        {item.note && <span style={{ color: bought ? "#9A9887" : c.accent }}> · {item.note}</span>}
      </span>
      <span style={{ fontSize: 10.5, color: bought ? "#A8A695" : "var(--color-accent)", fontWeight: 700 }}>{item.qty} {item.unit}</span>
      {(() => {
        const est = estimateItemPrice(item, product);
        const priceText = est != null ? formatEuro(est) : formatProductPrice(product);
        return priceText ? <span style={{ fontSize: 10.5, color: bought ? "#A8A695" : "#23262E", fontWeight: 600 }}>{priceText}</span> : null;
      })()}
    </div>
  );
}

          Utile si l'article est vendu au kg mais ajouté à la liste à l'unité (ex : tomate à 5,00 €/kg, article de 100 g → un article ≈ 0,50 €). Laisse vide si non concerné.
        </p>

        <div style={{ border: "1px solid var(--color-primary-border)", borderRadius: 10, marginBottom: 22, overflow: "hidden" }}>
          <button
            onClick={() => setVariantsOpen((o) => !o)}
            style={{ width: "100%", display: "flex", alignItems: "center", justifyContent: "space-between", padding: "12px 14px", background: "var(--color-primary)", border: "none", cursor: "pointer", color: "#23262E" }}
          >
            <span style={{ fontSize: 13, fontWeight: 600 }}>
              Sous-produits de cette famille{variants.length > 0 ? ` (${variants.length})` : ""}
            </span>
            <ChevronLeft size={15} color="#9A9887" style={{ transform: `rotate(${variantsOpen ? 90 : -90}deg)`, transition: "transform 0.15s" }} />
          </button>
          {variantsOpen && (
            <div style={{ padding: "12px 14px", background: "#F5F1E4" }}>
              <p style={{ fontSize: 12, color: "#ADAB98", margin: "0 0 12px", lineHeight: 1.4 }}>
                Utile pour reconnaître des variétés du même produit sur un ticket de caisse (ex : "Rouge", "Vert", "Jaune" pour un poivron).
              </p>
              {variants.map((v) => (
                <div key={v.id} style={{ display: "flex", gap: 8, marginBottom: 8 }}>
                  <input
                    value={v.name}
                    onChange={(e) => updateVariant(v.id, e.target.value)}
                    placeholder="ex : Vert"
                    style={{ flex: 1, background: "var(--color-primary)", border: "1px solid var(--color-primary-border)", borderRadius: 8, color: "#23262E", fontSize: 14, padding: "9px 10px", outline: "none", fontFamily: "inherit" }}
                  />
                  <button onClick={() => removeVariant(v.id)} style={{ width: 34, height: 34, borderRadius: 8, border: "1px solid var(--color-primary-border)", background: "transparent", color: "#9A9887", cursor: "pointer", display: "flex", alignItems: "center", justifyContent: "center", flexShrink: 0 }}>
                    <X size={14} />
                  </button>
                </div>
              ))}
              <button
                onClick={addVariant}
                style={{ display: "flex", alignItems: "center", gap: 6, marginTop: 4, padding: "9px 12px", borderRadius: 8, border: "1px dashed #D8CFB0", background: "transparent", color: "#7A7968", fontWeight: 600, fontSize: 13, cursor: "pointer" }}
              >
                <Plus size={14} /> Ajouter un sous-produit
              </button>
            </div>
          )}
        </div>

        </div>

        <div style={{ display: "flex", gap: 10, padding: "14px 20px", borderTop: "1px solid var(--color-primary-border)", flexShrink: 0, background: "#FFFFFF" }}>
          {isEdit && onDelete && !confirmDelete && (
            <button onClick={() => setConfirmDelete(true)} style={{ padding: "13px 18px", borderRadius: 12, border: "1px solid #C4574A55", background: "transparent", color: "#C4574A", fontWeight: 600, fontSize: 14, cursor: "pointer" }}>
              Supprimer
            </button>
          )}
          {isEdit && onDelete && confirmDelete && (
            <>
              <button onClick={() => setConfirmDelete(false)} style={{ padding: "13px 14px", borderRadius: 12, border: "1px solid var(--color-primary-border)", background: "transparent", color: "#23262E", fontWeight: 600, fontSize: 13.5, cursor: "pointer" }}>
                Annuler
              </button>
              <button onClick={onDelete} style={{ padding: "13px 14px", borderRadius: 12, border: "none", background: "#C4574A", color: "#FFFFFF", fontWeight: 700, fontSize: 13.5, cursor: "pointer" }}>
                Confirmer la suppression
              </button>
            </>
          )}
          {!confirmDelete && (
          <button
            disabled={!name.trim()}
            onClick={() => {
              const nUnit = priceUnit.trim().replace(",", ".");
              const nKg = priceKg.trim().replace(",", ".");
              const nWeight = weight.trim().replace(",", ".");
              onSave({
                name: name.trim(),
                icon,
                cat,
                priceUnit: nUnit ? Number(nUnit) : null,
                priceKg: nKg ? Number(nKg) : null,
                weight: nWeight ? Number(nWeight) : null,
                variants: variants.map((v) => ({ id: v.id, name: v.name.trim() })).filter((v) => v.name),
              });
            }}
            style={{ flex: 1, padding: "13px 18px", borderRadius: 12, border: "none", background: !name.trim() ? "var(--color-primary-border)" : c.accent, color: !name.trim() ? "#A8A695" : "var(--color-primary)", fontWeight: 700, fontSize: 14.5, cursor: !name.trim() ? "default" : "pointer" }}
          >
            {isEdit ? "Enregistrer" : "Créer l'article"}
          </button>
          )}
        </div>
      </div>
    </div>
  );
}

// Tuile produit de l'onglet "Tous les produits" : appui court = ajouter à la liste, appui long = éditer
function ProductTile({ product, cat, inList, onTap, onLongPress }) {
  const timer = useRef(null);
  const longPressed = useRef(false);
  const start = () => {
    longPressed.current = false;
    timer.current = setTimeout(() => { longPressed.current = true; onLongPress(); }, 480);
  };
  const clear = () => { if (timer.current) { clearTimeout(timer.current); timer.current = null; } };
  const handleClick = () => {
    if (longPressed.current) { longPressed.current = false; return; }
    onTap();
  };

  return (
    <button
      onPointerDown={start}
      onPointerUp={clear}
      onPointerLeave={clear}
      onPointerCancel={clear}
      onClick={handleClick}
      onContextMenu={(e) => e.preventDefault()}
      style={{ background: inList ? "var(--color-accent-tint)" : cat.tint, border: `1px solid ${inList ? "var(--color-accent)" : cat.accent + "33"}`, borderRadius: 14, padding: "14px 6px 12px", display: "flex", flexDirection: "column", alignItems: "center", gap: 6, cursor: "pointer", userSelect: "none" }}
    >
      <span style={{ fontSize: 25 }}><IconGlyph icon={product.icon} size={25} /></span>
      <span style={{ fontSize: 12.5, fontWeight: 600, textAlign: "center", lineHeight: 1.25, color: inList ? "var(--color-accent-dark)" : "#23262E" }}>{product.name}</span>
      {formatProductPrice(product) && (
        <span style={{ fontSize: 10.5, fontWeight: 700, color: inList ? "var(--color-accent)" : cat.accent }}>{formatProductPrice(product)}</span>
      )}
    </button>
  );
}

// --- Éditeur de recette ------------------------------------------------------

function RecipeEditor({ draft, onCancel, onSave, products }) {
  const [name, setName] = useState(draft?.name ?? "");
  const [servings, setServings] = useState(draft?.servings ?? 4);
  const [ingredients, setIngredients] = useState(draft?.ingredients ?? []);
  const [steps, setSteps] = useState(draft?.steps ?? []);
  const [stepInput, setStepInput] = useState("");
  const [query, setQuery] = useState("");
  const [modalProduct, setModalProduct] = useState(null);
  const [editingIngId, setEditingIngId] = useState(null);
  const [undoState, setUndoState] = useState(null); // { items: [...] } — ingrédients supprimés récemment, restaurables
  const undoTimer = useRef(null);

  const addStep = () => {
    if (!stepInput.trim()) return;
    setSteps((s) => [...s, stepInput.trim()]);
    setStepInput("");
  };
  const updateStep = (idx, val) => setSteps((s) => s.map((st, i) => (i === idx ? val : st)));
  const removeStep = (idx) => setSteps((s) => s.filter((_, i) => i !== idx));
  const moveStep = (idx, dir) => {
    setSteps((s) => {
      const arr = [...s];
      const target = dir === "up" ? idx - 1 : idx + 1;
      if (target < 0 || target >= arr.length) return arr;
      [arr[idx], arr[target]] = [arr[target], arr[idx]];
      return arr;
    });
  };

  const results = useMemo(() => {
    const q = normalize(query.trim());
    if (!q) return [];
    return products.filter((p) => productMatchesQuery(p, q)).slice(0, 7);
  }, [query, products]);

  const openAdd = (product) => { setModalProduct(product); setEditingIngId(null); setQuery(""); };
  const openEdit = (ingId) => {
    const entry = ingredients.find((i) => i.ingId === ingId);
    if (!entry) return;
    setModalProduct(products.find((p) => p.id === entry.productId));
    setEditingIngId(ingId);
  };
  const confirm = ({ qty, unit, note }) => {
    if (editingIngId) {
      setIngredients((l) => l.map((it) => (it.ingId === editingIngId ? { ...it, qty, unit, note } : it)));
    } else {
      setIngredients((l) => [...l, { ingId: `${modalProduct.id}-${Date.now()}`, productId: modalProduct.id, qty, unit, note }]);
    }
    setModalProduct(null);
    setEditingIngId(null);
  };
  const showUndo = (items) => {
    if (undoTimer.current) clearTimeout(undoTimer.current);
    setUndoState({ items });
    undoTimer.current = setTimeout(() => setUndoState(null), 4000);
  };
  const restoreUndo = () => {
    if (!undoState) return;
    setIngredients((l) => [...l, ...undoState.items]);
    if (undoTimer.current) clearTimeout(undoTimer.current);
    setUndoState(null);
  };
  const remove = () => {
    const removed = ingredients.find((it) => it.ingId === editingIngId);
    setIngredients((l) => l.filter((it) => it.ingId !== editingIngId));
    setModalProduct(null);
    setEditingIngId(null);
    if (removed) showUndo([removed]);
  };
  const removeIngredient = (ingId) => {
    const removed = ingredients.find((it) => it.ingId === ingId);
    setIngredients((l) => l.filter((it) => it.ingId !== ingId));
    if (removed) showUndo([removed]);
  };

  return (
    <div>
      <div style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 20 }}>
        <button onClick={onCancel} style={{ background: "#FFFFFF", border: "1px solid var(--color-primary-border)", borderRadius: 10, width: 34, height: 34, display: "flex", alignItems: "center", justifyContent: "center", color: "#7A7968", cursor: "pointer" }}>
          <ChevronLeft size={18} />
        </button>
        <h1 style={{ fontFamily: "'Fraunces', serif", fontWeight: 600, fontSize: 22, margin: 0 }}>
          {draft?.id ? "Modifier la recette" : "Nouvelle recette"}
        </h1>
      </div>

      <label style={{ fontSize: 12.5, fontWeight: 600, color: "#9A9887", textTransform: "uppercase", letterSpacing: "0.04em" }}>Nom de la recette</label>
      <input
        value={name}
        onChange={(e) => setName(e.target.value)}
        placeholder="ex : Ratatouille maison"
        style={{ width: "100%", marginTop: 8, marginBottom: 22, background: "#FFFFFF", border: "1px solid var(--color-primary-border)", borderRadius: 12, color: "#23262E", fontSize: 15, padding: "12px 14px", outline: "none", fontFamily: "inherit" }}
      />

      <label style={{ fontSize: 12.5, fontWeight: 600, color: "#9A9887", textTransform: "uppercase", letterSpacing: "0.04em" }}>Nombre de personnes</label>
      <div style={{ display: "flex", alignItems: "center", gap: 12, margin: "8px 0 22px" }}>
        <button onClick={() => setServings((s) => Math.max(1, s - 1))} style={stepperBtn}>
          <Minus size={16} />
        </button>
        <span style={{ fontSize: 17, fontWeight: 700, minWidth: 26, textAlign: "center" }}>{servings}</span>
        <button onClick={() => setServings((s) => s + 1)} style={stepperBtn}>
          <Plus size={16} />
        </button>
      </div>

      <div style={{ display: "flex", alignItems: "baseline", justifyContent: "space-between" }}>
        <label style={{ fontSize: 12.5, fontWeight: 600, color: "#9A9887", textTransform: "uppercase", letterSpacing: "0.04em" }}>Ingrédients</label>
        {(() => {
          const total = estimateRecipeTotal(ingredients, products);
          return total != null ? <span style={{ fontSize: 13, fontWeight: 700, color: "#23262E" }}>≈ {formatEuro(total)}</span> : null;
        })()}
      </div>
      <div style={{ position: "relative", margin: "8px 0 18px" }}>
        <div style={{ display: "flex", alignItems: "center", background: "#FFFFFF", border: "none", borderRadius: 18, padding: "14px 16px", gap: 10, boxShadow: "0 4px 14px rgba(35,38,46,0.06)" }}>
          <Search size={18} color="#ADAB98" strokeWidth={2.2} />
          <input
            value={query}
            onChange={(e) => setQuery(e.target.value)}
            placeholder="Chercher un ingrédient…"
            style={{ background: "transparent", border: "none", outline: "none", color: "#23262E", fontSize: 15, width: "100%", fontFamily: "inherit" }}
            onKeyDown={(e) => { if (e.key === "Enter" && results.length > 0) openAdd(results[0]); }}
          />
        </div>
        {results.length > 0 && (
          <div style={{ position: "absolute", top: "calc(100% + 8px)", left: 0, right: 0, background: "#FFFFFF", border: "1px solid var(--color-primary-border)", borderRadius: 14, overflow: "hidden", zIndex: 20, boxShadow: "0 12px 28px rgba(0,0,0,0.35)", maxHeight: 300, overflowY: "auto" }}>
            {results.map((p, i) => {
              const c = catInfo(p.cat);
              return (
                <button key={p.id} onClick={() => openAdd(p)} style={{ display: "flex", alignItems: "center", gap: 12, width: "100%", padding: "11px 14px", background: "transparent", border: "none", borderBottom: i < results.length - 1 ? "1px solid var(--color-primary-border)" : "none", cursor: "pointer", textAlign: "left", color: "#23262E" }}>
                  <span style={{ width: 32, height: 32, borderRadius: 9, background: c.accent + "26", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 16, flexShrink: 0 }}><IconGlyph icon={p.icon} size={16} /></span>
                  <span style={{ flex: 1, fontSize: 14, fontWeight: 500 }}>{p.name}</span>
                  {formatProductPrice(p) && (
                    <span style={{ fontSize: 11, color: c.accent, fontWeight: 600 }}>{formatProductPrice(p)}</span>
                  )}
                  <Plus size={16} color="#ADAB98" />
                </button>
              );
            })}
          </div>
        )}
      </div>

      {ingredients.length === 0 ? (
        <p style={{ color: "#A8A695", fontSize: 13.5, textAlign: "center", padding: "20px 0" }}>
          Ajoutez des ingrédients avec la recherche ci-dessus.
        </p>
      ) : (
        <div style={{ display: "grid", gridTemplateColumns: "repeat(3, 1fr)", gap: 10, marginBottom: 28 }}>
          {ingredients.map((item) => {
            const product = products.find((p) => p.id === item.productId);
            if (!product) return null;
            return <ItemCard key={item.ingId} item={item} product={product} onEdit={() => openEdit(item.ingId)} onQuickTap={() => removeIngredient(item.ingId)} />;
          })}
        </div>
      )}

      <label style={{ fontSize: 12.5, fontWeight: 600, color: "#9A9887", textTransform: "uppercase", letterSpacing: "0.04em" }}>Étapes de réalisation</label>

      {steps.length === 0 ? (
        <p style={{ color: "#A8A695", fontSize: 13.5, padding: "10px 0 4px" }}>Aucune étape pour l'instant.</p>
      ) : (
        <div style={{ display: "flex", flexDirection: "column", gap: 8, margin: "10px 0 4px" }}>
          {steps.map((step, idx) => (
            <div key={idx} style={{ display: "flex", gap: 10, alignItems: "flex-start", background: "#FFFFFF", border: "1px solid var(--color-primary-border)", borderRadius: 12, padding: "10px 12px" }}>
              <span style={{ width: 22, height: 22, borderRadius: "50%", background: "var(--color-primary-border)", color: "#7A7968", fontSize: 11.5, fontWeight: 700, display: "flex", alignItems: "center", justifyContent: "center", flexShrink: 0, marginTop: 2 }}>
                {idx + 1}
              </span>
              <textarea
                value={step}
                onChange={(e) => updateStep(idx, e.target.value)}
                rows={2}
                style={{ flex: 1, background: "transparent", border: "none", outline: "none", color: "#23262E", fontSize: 14, fontFamily: "inherit", resize: "vertical", lineHeight: 1.4 }}
              />
              <div style={{ display: "flex", flexDirection: "column", gap: 4, flexShrink: 0 }}>
                <button onClick={() => moveStep(idx, "up")} disabled={idx === 0} style={{ background: "none", border: "none", color: idx === 0 ? "#D8CFB0" : "#9A9887", cursor: idx === 0 ? "default" : "pointer", fontSize: 12, padding: 2 }}>▲</button>
                <button onClick={() => moveStep(idx, "down")} disabled={idx === steps.length - 1} style={{ background: "none", border: "none", color: idx === steps.length - 1 ? "#D8CFB0" : "#9A9887", cursor: idx === steps.length - 1 ? "default" : "pointer", fontSize: 12, padding: 2 }}>▼</button>
                <button onClick={() => removeStep(idx)} style={{ background: "none", border: "none", color: "#C4574A", cursor: "pointer", fontSize: 13, padding: 2 }}>
                  <X size={13} />
                </button>
              </div>
            </div>
          ))}
        </div>
      )}

      <div style={{ display: "flex", gap: 8, marginBottom: 28, marginTop: 4 }}>
        <textarea
          value={stepInput}
          onChange={(e) => setStepInput(e.target.value)}
          placeholder="Décrire l'étape suivante…"
          rows={2}
          style={{ flex: 1, background: "#FFFFFF", border: "1px solid var(--color-primary-border)", borderRadius: 12, color: "#23262E", fontSize: 14, padding: "10px 12px", outline: "none", fontFamily: "inherit", resize: "vertical" }}
          onKeyDown={(e) => { if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); addStep(); } }}
        />
        <button
          onClick={addStep}
          disabled={!stepInput.trim()}
          style={{ alignSelf: "flex-start", padding: "10px 14px", borderRadius: 10, border: "none", background: stepInput.trim() ? "var(--color-primary-border)" : "#FFFFFF", color: stepInput.trim() ? "#23262E" : "#A8A695", cursor: stepInput.trim() ? "pointer" : "default", display: "flex", alignItems: "center", gap: 4, fontSize: 13, fontWeight: 600 }}
        >
          <Plus size={14} /> Ajouter
        </button>
      </div>

      <button
        disabled={!name.trim() || ingredients.length === 0}
        onClick={() => onSave({ id: draft?.id ?? `recipe-${Date.now()}`, name: name.trim(), servings, ingredients, steps })}
        style={{
          width: "100%",
          padding: "14px 18px",
          borderRadius: 12,
          border: "none",
          background: !name.trim() || ingredients.length === 0 ? "var(--color-primary-border)" : "var(--color-accent)",
          color: !name.trim() || ingredients.length === 0 ? "#A8A695" : "#FFFFFF",
          fontWeight: 700,
          fontSize: 15,
          cursor: !name.trim() || ingredients.length === 0 ? "default" : "pointer",
        }}
      >
        Enregistrer la recette
      </button>

      {modalProduct && (
        <ItemModal
          product={modalProduct}
          initial={editingIngId ? ingredients.find((i) => i.ingId === editingIngId) : null}
          onClose={() => { setModalProduct(null); setEditingIngId(null); }}
          onConfirm={confirm}
          onDelete={editingIngId ? remove : null}
        />
      )}

      {undoState && (
        <div style={{ position: "fixed", left: 0, right: 0, bottom: 18, display: "flex", justifyContent: "center", zIndex: 100, padding: "0 18px" }}>
          <div style={{ display: "flex", alignItems: "center", gap: 14, background: "#FFFFFF", border: "1px solid #D8CFB0", borderRadius: 14, padding: "12px 16px", boxShadow: "0 12px 28px rgba(0,0,0,0.4)", maxWidth: 440, width: "100%" }}>
            <span style={{ fontSize: 13.5, color: "#23262E", flex: 1 }}>
              {undoState.items.length > 1 ? `${undoState.items.length} ingrédients supprimés` : "Ingrédient supprimé"}
            </span>
            <button
              onClick={restoreUndo}
              style={{ background: "none", border: "none", color: "var(--color-accent)", fontWeight: 700, fontSize: 13.5, cursor: "pointer", whiteSpace: "nowrap" }}
            >
              Annuler
            </button>
          </div>
        </div>
      )}
    </div>
  );
}

// --- Carte recette (vue liste) -----------------------------------------------

function RecipeCard({ recipe, onOpen, onOpenAddModal, onLongPress, products }) {
  const preview = recipe.ingredients.slice(0, 5);
  const total = estimateRecipeTotal(recipe.ingredients, products);
  const timer = useRef(null);
  const longPressed = useRef(false);
  const start = () => {
    longPressed.current = false;
    timer.current = setTimeout(() => { longPressed.current = true; onLongPress(); }, 480);
  };
  const clear = () => { if (timer.current) { clearTimeout(timer.current); timer.current = null; } };
  const handleClick = () => {
    if (longPressed.current) { longPressed.current = false; return; }
    onOpen();
  };

  return (
    <div style={{ background: "#FFFFFF", border: "1px solid var(--color-primary-border)", borderRadius: 16, padding: 16, marginBottom: 14 }}>
      <div
        onPointerDown={start}
        onPointerUp={clear}
        onPointerLeave={clear}
        onPointerCancel={clear}
        onClick={handleClick}
        onContextMenu={(e) => e.preventDefault()}
        style={{ cursor: "pointer", userSelect: "none" }}
      >
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", marginBottom: 10, gap: 10 }}>
          <div style={{ flex: 1, minWidth: 0 }}>
            <h3 style={{ fontSize: 16, fontWeight: 700, margin: 0 }}>{recipe.name}</h3>
            <span style={{ fontSize: 12, color: "#ADAB98", fontWeight: 600 }}>
              {recipe.ingredients.length} ingrédient{recipe.ingredients.length > 1 ? "s" : ""}
              {recipe.steps?.length > 0 ? ` · ${recipe.steps.length} étape${recipe.steps.length > 1 ? "s" : ""}` : ""}
            </span>
          </div>
          {total != null && (
            <span style={{ fontFamily: "'Fraunces', serif", fontSize: 19, fontWeight: 700, color: "var(--color-accent)", whiteSpace: "nowrap", flexShrink: 0 }}>
              <span style={{ opacity: 0.6, fontSize: 14 }}>≈</span> {formatEuro(total)}
            </span>
          )}
        </div>
        <div style={{ display: "flex", gap: 6, flexWrap: "wrap" }}>
          {preview.map((item) => {
            const p = products.find((pr) => pr.id === item.productId);
            if (!p) return null;
            return (
              <span key={item.ingId} style={{ width: 30, height: 30, borderRadius: 8, background: catInfo(p.cat).accent + "26", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 15 }}>
                <IconGlyph icon={p.icon} size={15} />
              </span>
            );
          })}
          {recipe.ingredients.length > 5 && (
            <span style={{ width: 30, height: 30, borderRadius: 8, background: "var(--color-primary-border)", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 11, color: "#9A9887", fontWeight: 700 }}>
              +{recipe.ingredients.length - 5}
            </span>
          )}
        </div>
      </div>

      <button
        onClick={() => onOpenAddModal(recipe)}
        style={{
          marginTop: 14,
          width: "100%",
          padding: "11px 14px",
          borderRadius: 10,
          border: "none",
          background: "var(--color-primary-border)",
          color: "#23262E",
          fontWeight: 700,
          fontSize: 13.5,
          cursor: "pointer",
          display: "flex",
          alignItems: "center",
          justifyContent: "center",
          gap: 6,
          transition: "background 0.15s",
        }}
      >
        Ajouter la recette à la liste
      </button>
    </div>
  );
}

// --- Sélection des ingrédients à ajouter -----------------------------------

function AddRecipeToListModal({ recipe, products, onClose, onConfirmSelection, onAddAll }) {
  const [selected, setSelected] = useState(() => new Set(recipe.ingredients.map((i) => i.ingId)));
  const baseServings = recipe.servings || 4;
  const [servings, setServings] = useState(baseServings);
  const scale = servings / baseServings;
  const scaledQty = (qty) => {
    const v = qty * scale;
    return Math.round(v * 100) / 100;
  };
  const toggle = (ingId) => {
    setSelected((s) => {
      const next = new Set(s);
      next.has(ingId) ? next.delete(ingId) : next.add(ingId);
      return next;
    });
  };

  return (
    <div
      onClick={onClose}
      style={{ position: "fixed", inset: 0, background: "rgba(10,12,15,0.6)", display: "flex", alignItems: "flex-end", justifyContent: "center", zIndex: 60 }}
    >
      <div
        onClick={(e) => e.stopPropagation()}
        style={{ width: "100%", maxWidth: 480, maxHeight: "85vh", display: "flex", flexDirection: "column", background: "#FFFFFF", borderTop: "1px solid var(--color-primary-border)", borderRadius: "20px 20px 0 0" }}
      >
        <div style={{ padding: "20px 20px 4px", display: "flex", alignItems: "center", justifyContent: "space-between" }}>
          <div>
            <div style={{ fontSize: 17, fontWeight: 700 }}>{recipe.name}</div>
            <div style={{ fontSize: 12.5, color: "#9A9887", marginTop: 2 }}>
              {selected.size} / {recipe.ingredients.length} ingrédient{recipe.ingredients.length > 1 ? "s" : ""} sélectionné{selected.size > 1 ? "s" : ""}
            </div>
          </div>
          <button
            onClick={onClose}
            style={{ background: "var(--color-primary-border)", border: "none", borderRadius: "50%", width: 30, height: 30, color: "#7A7968", cursor: "pointer", display: "flex", alignItems: "center", justifyContent: "center", flexShrink: 0 }}
          >
            <X size={15} />
          </button>
        </div>

        <div style={{ padding: "14px 20px 4px", display: "flex", alignItems: "center", gap: 12 }}>
          <span style={{ fontSize: 12.5, fontWeight: 600, color: "#9A9887", textTransform: "uppercase", letterSpacing: "0.04em" }}>Nombre de personnes</span>
          <div style={{ display: "flex", alignItems: "center", gap: 8, marginLeft: "auto" }}>
            <button onClick={() => setServings((s) => Math.max(1, s - 1))} style={{ width: 30, height: 30, borderRadius: 8, border: "1px solid var(--color-primary-border)", background: "var(--color-primary)", color: "#23262E", display: "flex", alignItems: "center", justifyContent: "center", cursor: "pointer", flexShrink: 0 }}>
              <Minus size={13} />
            </button>
            <span style={{ fontSize: 15, fontWeight: 700, minWidth: 20, textAlign: "center" }}>{servings}</span>
            <button onClick={() => setServings((s) => s + 1)} style={{ width: 30, height: 30, borderRadius: 8, border: "1px solid var(--color-primary-border)", background: "var(--color-primary)", color: "#23262E", display: "flex", alignItems: "center", justifyContent: "center", cursor: "pointer", flexShrink: 0 }}>
              <Plus size={13} />
            </button>
          </div>
        </div>

        <div style={{ overflowY: "auto", padding: "14px 20px 4px" }}>
          {recipe.ingredients.map((item) => {
            const p = products.find((pr) => pr.id === item.productId);
            if (!p) return null;
            const c = catInfo(p.cat);
            const isSelected = selected.has(item.ingId);
            return (
              <button
                key={item.ingId}
                onClick={() => toggle(item.ingId)}
                style={{
                  width: "100%",
                  display: "flex",
                  alignItems: "center",
                  gap: 12,
                  padding: "10px 10px",
                  marginBottom: 6,
                  borderRadius: 12,
                  border: `1px solid ${isSelected ? c.accent : "var(--color-primary-border)"}`,
                  background: isSelected ? c.accent + "1A" : "transparent",
                  cursor: "pointer",
                  textAlign: "left",
                }}
              >
                <span style={{ width: 32, height: 32, borderRadius: 9, background: c.accent + "26", display: "flex", alignItems: "center", justifyContent: "center", flexShrink: 0 }}>
                  <IconGlyph icon={p.icon} size={16} />
                </span>
                <span style={{ flex: 1 }}>
                  <div style={{ fontSize: 14, fontWeight: 500, color: "#23262E" }}>
                    {p.name}{item.note && <span style={{ color: c.accent }}> · {item.note}</span>}
                  </div>
                  <div style={{ fontSize: 11.5, color: "#9A9887" }}>{scaledQty(item.qty)} {item.unit}</div>
                </span>
                <span
                  style={{
                    width: 22, height: 22, borderRadius: 7, flexShrink: 0,
                    border: `1.5px solid ${isSelected ? c.accent : "#D8CFB0"}`,
                    background: isSelected ? c.accent : "transparent",
                    display: "flex", alignItems: "center", justifyContent: "center",
                  }}
                >
                  {isSelected && <Check size={13} color="var(--color-primary)" strokeWidth={3} />}
                </span>
              </button>
            );
          })}
        </div>

        <div style={{ padding: "14px 20px", borderTop: "1px solid var(--color-primary-border)", flexShrink: 0, background: "#FFFFFF" }}>
          <button
            disabled={selected.size === 0}
            onClick={() => onConfirmSelection(recipe, [...selected], scale)}
            style={{ width: "100%", padding: "13px 18px", borderRadius: 12, border: "none", background: selected.size === 0 ? "var(--color-primary-border)" : "var(--color-accent)", color: selected.size === 0 ? "#A8A695" : "var(--color-primary)", fontWeight: 700, fontSize: 14.5, cursor: selected.size === 0 ? "default" : "pointer", marginBottom: 12 }}
          >
            Ajouter la sélection
          </button>

          <div style={{ display: "flex", alignItems: "center", gap: 10, margin: "0 0 12px" }}>
            <div style={{ flex: 1, height: 1, background: "var(--color-primary-border)" }} />
            <span style={{ fontSize: 11, color: "#A8A695", fontWeight: 600 }}>ou</span>
            <div style={{ flex: 1, height: 1, background: "var(--color-primary-border)" }} />
          </div>

          <button
            onClick={() => onAddAll(recipe, scale)}
            style={{ width: "100%", padding: "12px 18px", borderRadius: 12, border: "1px solid var(--color-primary-border)", background: "transparent", color: "#23262E", fontWeight: 600, fontSize: 13.5, cursor: "pointer" }}
          >
            Tout ajouter
          </button>
        </div>
      </div>
    </div>
  );
}

function ListSwitcherModal({ lists, activeListId, onClose, onSelect, onCreate, onRename, onDelete, itemCounts }) {
  const [creating, setCreating] = useState(false);
  const [newName, setNewName] = useState("");

  const startRename = (l) => { setRenamingId(l.id); setRenameValue(l.name); };

    if (renamingId) onRename(renamingId, renameValue);
    setRenamingId(null);
  };

  return (
    <div
      onClick={onClose}
      style={{ position: "fixed", inset: 0, background: "rgba(10,12,15,0.6)", display: "flex", alignItems: "flex-end", justifyContent: "center", zIndex: 90 }}

      <div
        onClick={(e) => e.stopPropagation()}

      >
        <div style={{ padding: "20px 20px 4px", display: "flex", alignItems: "center", justifyContent: "space-between" }}>
          <div style={{ fontSize: 17, fontWeight: 700 }}>Mes listes</div>
          <button onClick={onClose} style={{ background: "var(--color-primary-border)", border: "none", borderRadius: "50%", width: 30, height: 30, color: "#7A7968", cursor: "pointer", display: "flex", alignItems: "center", justifyContent: "center" }}>
            <X size={15} />
          </button>
        </div>

        <div style={{ overflowY: "auto", padding: "14px 20px 20px" }}>
          {lists.map((l) => (
            <div
              key={l.id}
              style={{
                display: "flex", alignItems: "center", gap: 10, padding: "12px 12px", marginBottom: 8, borderRadius: 12,
                border: `1px solid ${l.id === activeListId ? "var(--color-accent)" : "var(--color-primary-border)"}`,
                background: l.id === activeListId ? "var(--color-accent-a1a)" : "transparent",
              }}
            >
              {renamingId === l.id ? (
                <input
                  autoFocus
                  value={renameValue}
                  onChange={(e) => setRenameValue(e.target.value)}
                  onKeyDown={(e) => { if (e.key === "Enter") saveRename(); if (e.key === "Escape") setRenamingId(null); }}
                  onBlur={saveRename}
                  style={{ flex: 1, background: "var(--color-primary)", border: "1px solid var(--color-primary-border)", borderRadius: 8, color: "#23262E", fontSize: 14.5, padding: "8px 10px", outline: "none", fontFamily: "inherit" }}
                />
              ) : (
                <button onClick={() => onSelect(l.id)} style={{ flex: 1, textAlign: "left", background: "none", border: "none", cursor: "pointer", padding: 0 }}>
                  <div style={{ fontSize: 14.5, fontWeight: 600, color: "#23262E" }}>
                    {l.id === activeListId && "✓ "}{l.name}
                  </div>
                  <div style={{ fontSize: 11.5, color: "#9A9887", marginTop: 2 }}>
                    {itemCounts[l.id] || 0} article{(itemCounts[l.id] || 0) > 1 ? "s" : ""} restant{(itemCounts[l.id] || 0) > 1 ? "s" : ""}
                  </div>
                </button>
              )}
              <button onClick={() => startRename(l)} title="Renommer" style={{ width: 30, height: 30, borderRadius: 8, border: "1px solid var(--color-primary-border)", background: "transparent", color: "#9A9887", cursor: "pointer", display: "flex", alignItems: "center", justifyContent: "center", flexShrink: 0 }}>
                ✏️
              </button>
              {lists.length > 1 && (
                <button onClick={() => setConfirmDeleteId(l.id)} title="Supprimer cette liste" style={{ width: 30, height: 30, borderRadius: 8, border: "1px solid #C4574A55", background: "transparent", color: "#C4574A", cursor: "pointer", display: "flex", alignItems: "center", justifyContent: "center", flexShrink: 0 }}>
                  <X size={13} />
                </button>
              )}
            </div>
          ))}

          {creating ? (
            <div style={{ display: "flex", gap: 8, marginTop: 6 }}>
              <input
                autoFocus
                value={newName}
                onChange={(e) => setNewName(e.target.value)}
                onKeyDown={(e) => { if (e.key === "Enter" && newName.trim()) { onCreate(newName); setNewName(""); setCreating(false); } }}
                placeholder="ex : Apéro, BBQ…"
                style={{ flex: 1, background: "var(--color-primary)", border: "1px solid var(--color-primary-border)", borderRadius: 10, color: "#23262E", fontSize: 14.5, padding: "11px 12px", outline: "none", fontFamily: "inherit" }}
              />
              <button
                disabled={!newName.trim()}
                onClick={() => { onCreate(newName); setNewName(""); setCreating(false); }}
                style={{ padding: "0 16px", borderRadius: 10, border: "none", background: newName.trim() ? "var(--color-accent)" : "var(--color-primary-border)", color: newName.trim() ? "var(--color-primary)" : "#A8A695", fontWeight: 700, fontSize: 14, cursor: newName.trim() ? "pointer" : "default" }}
              >
                OK
              </button>
            </div>
          ) : (
            <button
              onClick={() => setCreating(true)}
              style={{ width: "100%", padding: "12px 16px", borderRadius: 12, border: "1px dashed #D8CFB0", background: "transparent", color: "#7A7968", fontWeight: 600, fontSize: 13.5, cursor: "pointer", display: "flex", alignItems: "center", justifyContent: "center", gap: 8, marginTop: 4 }}
            >
              <Plus size={14} /> Nouvelle liste

          )}

      </div>

      {confirmDeleteId && (
        <div
          onClick={(e) => { e.stopPropagation(); setConfirmDeleteId(null); }}

            <div style={{ fontSize: 17, fontWeight: 700, marginBottom: 10 }}>🗑️ Supprimer cette liste ?</div>
            <p style={{ fontSize: 14, color: "#7A7968", margin: "0 0 20px", lineHeight: 1.5 }}>
              Tous ses articles seront supprimés définitivement. Cette action est irréversible.
            </p>
            <div style={{ display: "flex", gap: 10 }}>
              <button onClick={() => setConfirmDeleteId(null)} style={{ flex: 1, padding: "13px 18px", borderRadius: 12, border: "1px solid var(--color-primary-border)", background: "transparent", color: "#23262E", fontWeight: 600, fontSize: 14, cursor: "pointer" }}>
                Annuler
              </button>
              <button
                onClick={() => { onDelete(confirmDeleteId); setConfirmDeleteId(null); }}
                style={{ flex: 1, padding: "13px 18px", borderRadius: 12, border: "none", background: "#C4574A", color: "var(--color-primary)", fontWeight: 700, fontSize: 14.5, cursor: "pointer" }}
              >
                Supprimer
              </button>
            </div>
          </div>
        </div>
      )}
    </div>
  );

          )}
          <button
            disabled={!name.trim() || !code.trim()}
            onClick={() => onSave({ name: name.trim(), code: code.trim() })}
            style={{ flex: 1, padding: "13px 18px", borderRadius: 12, border: "none", background: !name.trim() || !code.trim() ? "var(--color-primary-border)" : "var(--color-accent)", color: !name.trim() || !code.trim() ? "#A8A695" : "var(--color-primary)", fontWeight: 700, fontSize: 14.5, cursor: !name.trim() || !code.trim() ? "default" : "pointer" }}
          >
            {isEdit ? "Enregistrer" : "Ajouter la carte"}
          </button>
        </div>
      </div>
    </div>
  );
}

function App({ initialData, remoteData, remoteVersion, onDataChange, householdName, optionsOpen, onCloseOptions }) {
  const [tab, setTab] = useState("liste");
  const [query, setQuery] = useState("");
  const [catalogQuery, setCatalogQuery] = useState("");
  const [lists, setLists] = useState(() => initialData?.lists ?? [{ id: "default", name: "Ma liste" }]);
  const [activeListId, setActiveListId] = useState(() => initialData?.activeListId ?? (initialData?.lists?.[0]?.id ?? "default"));
  const [showListSwitcher, setShowListSwitcher] = useState(false);
  const [list, setList] = useState(() => initialData?.list ?? []);
  const [confirmClearBought, setConfirmClearBought] = useState(false);
  const [undoState, setUndoState] = useState(null); // { items: [...] } — articles supprimés récemment, restaurables
  const undoTimer = useRef(null);
  const [modalProduct, setModalProduct] = useState(null);
  const [editingListId, setEditingListId] = useState(null);
  const [recipes, setRecipes] = useState(() => initialData?.recipes ?? []);
  const [recipeEditing, setRecipeEditing] = useState(null); // null | {} | recipe object
  const [collapsedCats, setCollapsedCats] = useState(() => {
    const init = {};
    CATEGORIES.forEach((c) => { init[c.key] = true; }); // rayons repliés par défaut dans "Tous les produits"
    return init;
  });
  const [customProducts, setCustomProducts] = useState(() => initialData?.customProducts ?? []); // articles créés par l'utilisateur
  const [productOverrides, setProductOverrides] = useState(() => initialData?.productOverrides ?? {}); // { [id]: {name, icon, cat, priceUnit, priceKg} } pour les articles de base modifiés
  const [deletedProductIds, setDeletedProductIds] = useState(() => initialData?.deletedProductIds ?? []); // ids d'articles (de base) supprimés
  const [customIcons, setCustomIcons] = useState(() => initialData?.customIcons ?? []); // icônes/emoji perso importés (data URLs)
  // Ordre des rayons dans "Tous les produits" (et donc dans "Ma liste") — personnalisable, partagé avec le foyer.
  const [categoryOrder, setCategoryOrder] = useState(() => {
    const stored = initialData?.categoryOrder ?? [];
    const known = new Set(CATEGORIES.map((c) => c.key));
    const filtered = stored.filter((k) => known.has(k));
    const missing = CATEGORIES.map((c) => c.key).filter((k) => !filtered.includes(k));
    return [...filtered, ...missing];
  });
  const [showCategoryOrder, setShowCategoryOrder] = useState(false);
  const moveCategory = (key, dir) => {
    setCategoryOrder((order) => {
      const arr = [...order];
      const idx = arr.indexOf(key);
      const target = dir === "up" ? idx - 1 : idx + 1;
      if (idx === -1 || target < 0 || target >= arr.length) return arr;
      [arr[idx], arr[target]] = [arr[target], arr[idx]];
      return arr;
    });
  };
  const [productModal, setProductModal] = useState(null); // null | {mode:'create'} | {mode:'edit', product}
  const [loyaltyCards, setLoyaltyCards] = useState(() => initialData?.loyaltyCards ?? []); // cartes de fidélité { id, name, code, color }
  const [showCardsManager, setShowCardsManager] = useState(false);
  const [cardModal, setCardModal] = useState(null); // null | {mode:'create'} | {mode:'edit', card}
  const [viewingCard, setViewingCard] = useState(null); // carte affichée en grand (code-barres)
  const [showIosHelp, setShowIosHelp] = useState(false);
  const [androidInstalled, setAndroidInstalled] = useState(false);

  // Palette de couleurs — réglage purement local à cet appareil/utilisateur, jamais synchronisé
  // avec le foyer (contrairement à tout le reste de l'état de l'app).
  const [palette, setPalette] = useState(() => {
    try { return JSON.parse(localStorage.getItem("courses_active_palette")) || DEFAULT_PALETTE; } catch (e) { return DEFAULT_PALETTE; }
  });
  const [savedPalettes, setSavedPalettes] = useState(() => {
    try { return JSON.parse(localStorage.getItem("courses_saved_palettes")) || []; } catch (e) { return []; }
  });
  useEffect(() => {
    const root = document.documentElement;
    root.style.setProperty("--color-primary", palette.primary);
    root.style.setProperty("--color-accent", palette.accent);
    root.style.setProperty("--color-accent-dark", darkenColor(palette.accent, 0.18));
    root.style.setProperty("--color-accent-tint", lightenColor(palette.accent, 0.85));
    root.style.setProperty("--color-accent-a1a", hexToRgba(palette.accent, 0.1));
    root.style.setProperty("--color-accent-a26", hexToRgba(palette.accent, 0.15));
    root.style.setProperty("--color-accent-a55", hexToRgba(palette.accent, 0.33));
    root.style.setProperty("--color-primary-border", darkenColor(palette.primary, 0.08));
    document.body.style.background = palette.primary;
    const meta = document.querySelector('meta[name="theme-color"]');
    if (meta) meta.setAttribute("content", palette.primary);
    try { localStorage.setItem("courses_active_palette", JSON.stringify(palette)); } catch (e) {}
  }, [palette]);
  const savePalette = (name) => {
    const entry = { id: `pal-${Date.now()}`, name: name.trim() || "Palette", primary: palette.primary, accent: palette.accent };
    setSavedPalettes((list) => {
      const next = [...list, entry];
      try { localStorage.setItem("courses_saved_palettes", JSON.stringify(next)); } catch (e) {}
      return next;
    });
  };
  const applySavedPalette = (p) => setPalette({ primary: p.primary, accent: p.accent });
  const deleteSavedPalette = (id) => {
    setSavedPalettes((list) => {
      const next = list.filter((p) => p.id !== id);
      try { localStorage.setItem("courses_saved_palettes", JSON.stringify(next)); } catch (e) {}
      return next;
    });
  };
  const resetPalette = () => setPalette(DEFAULT_PALETTE);

  const installAndroid = async () => {
    if (!deferredInstallPrompt) return;
    deferredInstallPrompt.prompt();
    const { outcome } = await deferredInstallPrompt.userChoice;
    if (outcome === "accepted") setAndroidInstalled(true);
    deferredInstallPrompt = null;
  };
  const priceImportRef = useRef(null);
  const inputRef = useRef(null);
  const lastAppliedRemoteVersion = useRef(0);

  // Pousse les changements locaux vers le parent (qui synchronise avec Supabase).
  // skipNextPush évite de renvoyer un état qu'on vient tout juste de recevoir d'un autre
  // utilisateur (sinon : boucle infinie de synchro entre les foyers connectés).
  const skipNextPush = useRef(false);

  // Nettoyage ponctuel au chargement : si un article personnalisé a été depuis intégré au catalogue
  // de base (même id), on le retire réellement de customProducts au lieu de juste le masquer —
  // la synchro normale (ci-dessous) répercute ce nettoyage sur Supabase, sans données orphelines.
  useEffect(() => {
    const baseIds = new Set(PRODUCTS.map((p) => p.id));
    setCustomProducts((l) => {
      const cleaned = l.filter((p) => !baseIds.has(p.id));
      return cleaned.length === l.length ? l : cleaned;
    });
  }, []);

  useEffect(() => {
    if (skipNextPush.current) { skipNextPush.current = false; return; }
    if (onDataChange) onDataChange({ list, recipes, customProducts, productOverrides, deletedProductIds, customIcons, lists, activeListId, loyaltyCards, categoryOrder });
  }, [list, recipes, customProducts, productOverrides, deletedProductIds, customIcons, lists, activeListId, loyaltyCards, categoryOrder]);

  // Applique les changements reçus en temps réel d'un autre utilisateur du foyer
  useEffect(() => {
    if (!remoteData || remoteVersion === lastAppliedRemoteVersion.current) return;
    lastAppliedRemoteVersion.current = remoteVersion;
    skipNextPush.current = true;
    setList(remoteData.list ?? []);
    setRecipes(remoteData.recipes ?? []);
    setCustomProducts(remoteData.customProducts ?? []);
    setProductOverrides(remoteData.productOverrides ?? {});
    setDeletedProductIds(remoteData.deletedProductIds ?? []);
    setCustomIcons(remoteData.customIcons ?? []);
    setLoyaltyCards(remoteData.loyaltyCards ?? []);
    setLists(remoteData.lists?.length ? remoteData.lists : [{ id: "default", name: "Ma liste" }]);
    setActiveListId(remoteData.activeListId ?? remoteData.lists?.[0]?.id ?? "default");
    const knownKeys = new Set(CATEGORIES.map((c) => c.key));
    const storedOrder = (remoteData.categoryOrder ?? []).filter((k) => knownKeys.has(k));
    const missingKeys = CATEGORIES.map((c) => c.key).filter((k) => !storedOrder.includes(k));
    setCategoryOrder([...storedOrder, ...missingKeys]);
  }, [remoteVersion]);


  const toggleCatCollapsed = (key) => setCollapsedCats((c) => ({ ...c, [key]: !c[key] }));

  // Génère et télécharge une sauvegarde de tous les prix actuellement connus (utile pour archiver, pas pour synchroniser :
  // les prix vivent désormais uniquement dans productOverrides/customProducts, synchronisés en direct via Supabase).
  const exportPrices = () => {
    const out = {};
    products.forEach((p) => {
      const hasUnit = p.priceUnit != null && p.priceUnit !== "";
      const hasKg = p.priceKg != null && p.priceKg !== "";
      if (hasUnit || hasKg) {
        out[p.id] = {
          priceUnit: hasUnit ? Number(p.priceUnit) : null,
          priceKg: hasKg ? Number(p.priceKg) : null,
          updatedAt: new Date().toISOString().slice(0, 10),
        };
      }
    });
    const blob = new Blob([JSON.stringify(out, null, 2)], { type: "application/json" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = "prix.json";
    a.click();
    URL.revokeObjectURL(url);
  };

  // Exporte la liste des articles personnalisés (id/nom/icône/rayon/variantes — sans les prix ni
  // les recettes) : utile pour faire relire/intégrer ces articles dans le catalogue de base.
  const exportCustomProducts = () => {
    const out = customProducts.map((p) => ({
      id: p.id,
      name: p.name,
      icon: p.icon,
      cat: p.cat,
      weight: p.weight ?? null,
      variants: p.variants ?? [],
    }));
    const blob = new Blob([JSON.stringify(out, null, 2)], { type: "application/json" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = "articles_personnalises.json";
    a.click();
    URL.revokeObjectURL(url);
  };

  // Importe un fichier de prix (ancien ou nouveau format) et l'applique comme overrides.
  // Import ponctuel : une fois fait, ces prix vivent dans productOverrides et se synchronisent
  // normalement avec le reste du foyer, sans dépendre d'un fichier séparé.
  const importPrices = (file) => {
    const reader = new FileReader();
    reader.onload = (e) => {
      let data;
      try { data = JSON.parse(e.target.result); } catch (err) { return; }
      const customIds = new Set(customProducts.map((p) => p.id));
      const forCustom = {};
      const forBase = {};
      Object.keys(data || {}).forEach((id) => {
        const entry = data[id];
        if (!entry) return;
        const priced = entry.priceKg !== undefined || typeof entry.priceUnit === "number"
          ? entry
          : entry.price != null
            ? (entry.priceUnit === "kg" ? { priceKg: entry.price } : { priceUnit: entry.price })
            : null;
        if (!priced) return;
        // On se base sur l'appartenance réelle à customProducts, pas sur le préfixe de l'id : un
        // article personnalisé intégré depuis au catalogue de base garde son id d'origine (souvent
        // "custom-...") mais doit désormais recevoir son prix comme un article de base (override).
        if (customIds.has(id)) forCustom[id] = priced;
        else forBase[id] = priced;
      });
      // Articles personnalisés : le prix importé s'applique directement sur l'article, jamais via
      // un override — sinon il pourrait un jour masquer une modification faite depuis l'appli
      // (c'est exactement ce qui causait le bug "le prix ne s'enregistre pas").
      if (Object.keys(forCustom).length) {
        setCustomProducts((l) => l.map((p) => (forCustom[p.id] ? { ...p, ...forCustom[p.id] } : p)));
        setProductOverrides((prev) => {
          const next = { ...prev };
          Object.keys(forCustom).forEach((id) => { delete next[id]; });
          return next;
        });
      }
      // Articles du catalogue de base : comportement inchangé, prix appliqué en override.
      if (Object.keys(forBase).length) {
        setProductOverrides((prev) => {
          const next = { ...prev };
          Object.keys(forBase).forEach((id) => { next[id] = { ...(next[id] || {}), ...forBase[id] }; });
          return next;
        });
      }
    };
    reader.readAsText(file);
  };

  // Base + articles personnalisés, avec overrides manuels (prix, nom, icône, rayon) et suppressions appliqués.
  const products = useMemo(() => {
    const applyOverride = (p) => (productOverrides[p.id] ? { ...p, ...productOverrides[p.id] } : p);
    const base = PRODUCTS.filter((p) => !deletedProductIds.includes(p.id)).map(applyOverride);
    const baseIds = new Set(PRODUCTS.map((p) => p.id));
    // Les articles personnalisés ne passent jamais par productOverrides : leur prix/nom/icône vivent
    // uniquement dans customProducts, pour éviter qu'un ancien override (ex : import de prix.json avec
    // un id personnalisé) ne masque silencieusement une modification faite depuis l'appli.
    // Si un article personnalisé partage désormais l'id d'un article du catalogue de base (ex : après
    // son intégration au catalogue), la version de base prend le dessus — évite tout doublon à l'écran.
    const customs = customProducts.filter((p) => !deletedProductIds.includes(p.id) && !baseIds.has(p.id));
    return [...base, ...customs];
  }, [customProducts, productOverrides, deletedProductIds]);

  const addCustomProduct = ({ name, icon, cat, priceUnit, priceKg, weight, variants }) => {
    const p = { id: `custom-${Date.now()}`, name, icon, cat, priceUnit: priceUnit ?? null, priceKg: priceKg ?? null, weight: weight ?? null, variants: variants ?? [] };
    setCustomProducts((l) => [...l, p]);
    return p;
  };
  const editProduct = (id, patch) => {
    // On se base sur l'appartenance réelle à customProducts, pas sur le préfixe de l'id : un article
    // personnalisé intégré au catalogue de base garde souvent son id "custom-..." d'origine mais doit
    // désormais être traité comme un article de base (override), sans quoi l'édition ne s'enregistre
    // plus (c'est exactement ce qui causait le bug "le prix ne s'enregistre pas").
    const isCustom = customProducts.some((p) => p.id === id);
    if (isCustom) {
      setCustomProducts((l) => l.map((p) => (p.id === id ? { ...p, ...patch } : p)));
      // Nettoie un éventuel override resté coincé sur cet id personnalisé (ex : ancien import de prix
      // ayant écrit dessus par erreur) — sinon il masquerait la modification qu'on vient de faire.
      setProductOverrides((o) => {
        if (!(id in o)) return o;
        const next = { ...o };
        delete next[id];
        return next;
      });
    } else {
      setProductOverrides((o) => ({ ...o, [id]: { ...(o[id] || {}), ...patch } }));
    }
  };
  const deleteProduct = (id) => {
    const isCustom = customProducts.some((p) => p.id === id);
    if (isCustom) {
      setCustomProducts((l) => l.filter((p) => p.id !== id));
    } else {
      setDeletedProductIds((ids) => [...ids, id]);
    }
  };

  const openNewProductModal = () => setProductModal({ mode: "create" });
  const openEditProductModal = (product) => setProductModal({ mode: "edit", product });
  const closeProductModal = () => setProductModal(null);
  // Importe une image locale comme icône perso : redimensionnée en 64x64 pour rester légère
  // (stockée en base64, synchronisée avec le reste des données du foyer), puis ajoutée à la bibliothèque.
  const addCustomIcon = (file, onReady) => {
    const reader = new FileReader();
    reader.onload = (e) => {
      const img = new Image();
      img.onload = () => {
        const size = 64;
        const canvas = document.createElement("canvas");
        canvas.width = size;
        canvas.height = size;
        const ctx = canvas.getContext("2d");
        const scale = Math.min(size / img.width, size / img.height);
        const w = img.width * scale;
        const h = img.height * scale;
        ctx.drawImage(img, (size - w) / 2, (size - h) / 2, w, h);
        const dataUrl = canvas.toDataURL("image/png");
        setCustomIcons((list) => (list.includes(dataUrl) ? list : [dataUrl, ...list]));
        if (onReady) onReady(dataUrl);
      };
      img.src = e.target.result;
    };
    reader.readAsDataURL(file);
  };

  const deleteCustomIcon = (dataUrl) => setCustomIcons((list) => list.filter((i) => i !== dataUrl));

  const saveProductModal = ({ name, icon, cat, priceUnit, priceKg, weight, variants }) => {
    if (productModal.mode === "create") addCustomProduct({ name, icon, cat, priceUnit, priceKg, weight, variants });
    else editProduct(productModal.product.id, { name, icon, cat, priceUnit, priceKg, weight, variants });
    closeProductModal();
  };
  const deleteFromProductModal = () => {
    deleteProduct(productModal.product.id);
    closeProductModal();
  };

  // Cartes de fidélité
  const addCard = ({ name, code }) => {
    const color = CARD_COLORS[loyaltyCards.length % CARD_COLORS.length];
    setLoyaltyCards((l) => [...l, { id: `card-${Date.now()}`, name, code: code.replace(/\D/g, ""), color }]);
  };
  const editCard = (id, patch) => setLoyaltyCards((l) => l.map((c) => (c.id === id ? { ...c, ...patch } : c)));
  const deleteCard = (id) => setLoyaltyCards((l) => l.filter((c) => c.id !== id));
  const openAddCardModal = () => setCardModal({ mode: "create" });
  const openEditCardModal = (card) => setCardModal({ mode: "edit", card });
  const closeCardModal = () => setCardModal(null);
  const saveCardModal = ({ name, code }) => {
    if (cardModal.mode === "create") addCard({ name, code });
    else editCard(cardModal.card.id, { name, code: code.replace(/\D/g, "") });
    closeCardModal();

  const deleteFromCardModal = () => {
    deleteCard(cardModal.card.id);
    closeCardModal();
  };

  const results = useMemo(() => {
    const q = normalize(query.trim());
    if (!q) return [];
    return products.filter((p) => productMatchesQuery(p, q)).slice(0, 7);
  }, [query, products]);

  const addCustomFromSearch = () => {
    const trimmed = query.trim();
    if (!trimmed) return;
    const p = addCustomProduct({ name: trimmed, icon: "📦", cat: "autre" });
    openAddModal(p);
  };

  const visibleList = useMemo(
    () => list.filter((it) => (it.group || lists[0]?.id) === activeListId),
    [list, lists, activeListId]
  );
  const orderedCategoryKeys = useMemo(() => {
    const known = new Set(CATEGORIES.map((c) => c.key));
    const filtered = categoryOrder.filter((k) => known.has(k));
    const missing = CATEGORIES.map((c) => c.key).filter((k) => !filtered.includes(k));
    return [...filtered, ...missing];
  }, [categoryOrder]);

  const grouped = useMemo(() => {
    const map = {};
    visibleList.forEach((item) => {
      if (item.bought) return;
      const p = products.find((pr) => pr.id === item.productId);
      if (!p) return;
      if (!map[p.cat]) map[p.cat] = [];
      map[p.cat].push({ item, product: p });
    });
    return orderedCategoryKeys.map((k) => catInfo(k)).filter((c) => map[c.key]).map((c) => ({ ...c, entries: map[c.key] }));
  }, [visibleList, products, orderedCategoryKeys]);
  const boughtItems = useMemo(() => {
    return visibleList
      .filter((item) => item.bought)
      .map((item) => ({ item, product: products.find((pr) => pr.id === item.productId) }))
      .filter((x) => x.product)
      .sort((a, b) => a.product.name.localeCompare(b.product.name, "fr", { sensitivity: "base" }));
  }, [visibleList, products]);

  const allGrouped = useMemo(
    () => orderedCategoryKeys.map((k) => catInfo(k)).map((c) => ({
      ...c,
      products: products.filter((p) => p.cat === c.key).slice().sort((a, b) => a.name.localeCompare(b.name, "fr", { sensitivity: "base" })),
    })),
    [products, orderedCategoryKeys]
  );
  const catalogFiltered = useMemo(() => {
    const q = normalize(catalogQuery.trim());
    if (!q) return [];
    return products.filter((p) => productMatchesQuery(p, q)).slice().sort((a, b) => a.name.localeCompare(b.name, "fr", { sensitivity: "base" }));
  }, [catalogQuery, products]);
  const listedProductIds = useMemo(() => new Set(visibleList.map((i) => i.productId)), [visibleList]);

  const openAddModal = (product) => { setModalProduct(product); setEditingListId(null); setQuery(""); };
  const openEditModal = (listId) => {
    const entry = list.find((l) => l.listId === listId);
    if (!entry) return;
    setModalProduct(products.find((p) => p.id === entry.productId));
    setEditingListId(listId);
  };
  const removeFromList = (listId) => setList((l) => l.filter((it) => it.listId !== listId));

  // Annulation : garde une copie des articles supprimés pendant 4s, restaurable via le bandeau.
  const showUndo = (items) => {
    if (undoTimer.current) clearTimeout(undoTimer.current);
    setUndoState({ items });
    undoTimer.current = setTimeout(() => setUndoState(null), 4000);
  };
  const restoreUndo = () => {
    if (!undoState) return;
    setList((l) => [...l, ...undoState.items]);
    if (undoTimer.current) clearTimeout(undoTimer.current);
    setUndoState(null);
  };

  const toggleBought = (listId) => setList((l) => l.map((it) => (it.listId === listId ? { ...it, bought: !it.bought } : it)));
  const clearBought = () => {
    const removed = list.filter((it) => it.bought && (it.group || lists[0]?.id) === activeListId);
    setList((l) => l.filter((it) => !(it.bought && (it.group || lists[0]?.id) === activeListId)));
    setConfirmClearBought(false);
    if (removed.length) showUndo(removed);
  };

  // Listes multiples
  const createList = (name) => {
    const id = `list-${Date.now()}`;
    setLists((l) => [...l, { id, name: name.trim() || "Nouvelle liste" }]);
    setActiveListId(id);
  };
  const renameList = (id, name) => setLists((l) => l.map((x) => (x.id === id ? { ...x, name: name.trim() || x.name } : x)));
  const deleteList = (id) => {
    if (lists.length <= 1) return; // toujours garder au moins une liste
    setLists((l) => l.filter((x) => x.id !== id));
    setList((l) => l.filter((it) => (it.group || lists[0]?.id) !== id)); // supprime aussi ses articles

  const confirmModal = ({ qty, unit, note }) => {

      setList((l) => l.map((it) => (it.listId === editingListId ? { ...it, qty, unit, note } : it)));

    setEditingListId(null);
    inputRef.current?.focus();

  const deleteFromModal = () => {
    const removed = list.find((it) => it.listId === editingListId);
    setList((l) => l.filter((it) => it.listId !== editingListId));

    setEditingListId(null);

    setList((l) => [...l, ...newEntries]);

  const remainingItems = useMemo(() => visibleList.filter((it) => !it.bought), [visibleList]);

  const estimatedTotal = useMemo(() => {

    visibleList.forEach((item) => {

        style={{ position: "fixed", right: -60, bottom: -52, width: 225, opacity: 0.7, pointerEvents: "none", zIndex: -1 }}

                  style={{ display: "flex", alignItems: "center", gap: 5, background: "var(--color-accent-tint)", border: "none", borderRadius: 999, padding: "9px 14px", color: "var(--color-accent-dark)", fontWeight: 700, fontSize: 13, cursor: "pointer", flexShrink: 0, marginTop: 5 }}
                >
                  <ListChecks size={13} /> Listes
                  <ChevronLeft size={13} style={{ transform: "rotate(-90deg)" }} />
                </button>
              )}
            </div>
            {tab === "liste" && (
              <p style={{ color: "#ADAB98", fontSize: 14, margin: "6px 0 0" }}>
                {totalCount === 0
                  ? "Aucun article pour l'instant"
                  : `${totalCount} article${totalCount > 1 ? "s" : ""} dans ${grouped.length} rayon${grouped.length > 1 ? "s" : ""}`}
              </p>
            )}
            {tab === "liste" && estimatedTotal != null && (
              <p style={{ fontFamily: "'Fraunces', serif", fontSize: 28, fontWeight: 700, margin: "6px 0 0", color: estimatedTotal < 70 ? "var(--color-accent)" : "#D9614F" }}>
                <span style={{ opacity: 0.6, fontSize: 20 }}>≈</span> {formatEuro(estimatedTotal)}
              </p>
            )}
            {tab === "recettes" && (
              <p style={{ color: "#ADAB98", fontSize: 14, margin: "4px 0 0" }}>
                {recipes.length === 0 ? "Aucune recette enregistrée" : `${recipes.length} recette${recipes.length > 1 ? "s" : ""}`}
              </p>
            )}
          </header>
        )}

        {!(tab === "recettes" && recipeEditing) && (
          <div style={{ display: "flex", gap: 4, background: "#FFFFFF", border: "none", borderRadius: 18, padding: 6, marginBottom: 22, boxShadow: "0 4px 14px rgba(35,38,46,0.06)" }}>
            {[
              { key: "liste", label: "Ma liste", icon: ListChecks },
              { key: "tous", label: "Tous les produits", icon: Grid3x3 },
              { key: "recettes", label: "Recettes", icon: BookOpen },

              <button
