              >
                <t.icon size={14} />
                {t.label}
              </button>
            ))}
          </div>
        )}

        {tab === "liste" && (
          <div style={{ position: "relative", marginBottom: 26 }}>
            <div style={{ display: "flex", alignItems: "center", background: "#FFFFFF", border: "none", borderRadius: 18, padding: "14px 16px", gap: 10, boxShadow: "0 4px 14px rgba(35,38,46,0.06)" }}>
              <Search size={18} color="#ADAB98" strokeWidth={2.2} />
              <input
                ref={inputRef}
                value={query}
                onChange={(e) => setQuery(e.target.value)}
                placeholder="Chercher un produit…"
                style={{ background: "transparent", border: "none", outline: "none", color: "#23262E", fontSize: 15, width: "100%", fontFamily: "inherit" }}
                onKeyDown={(e) => { if (e.key === "Enter" && results.length > 0) openAddModal(results[0]); }}
              />
              {query && (
                <button onClick={() => setQuery("")} style={{ background: "none", border: "none", color: "#ADAB98", cursor: "pointer", display: "flex", padding: 2 }} aria-label="Effacer">
                  <X size={16} />
                </button>
              )}
            </div>
            {results.length > 0 && (
              <div className="grow-in" style={{ position: "absolute", top: "calc(100% + 8px)", left: 0, right: 0, background: "#FFFFFF", border: "1px solid var(--color-primary-border)", borderRadius: 14, overflow: "hidden", zIndex: 10, boxShadow: "0 12px 28px rgba(0,0,0,0.35)", maxHeight: 320, overflowY: "auto" }}>
                {results.map((p, i) => {
                  const c = catInfo(p.cat);
                  return (
                    <button key={p.id} onClick={() => openAddModal(p)} style={{ display: "flex", alignItems: "center", gap: 12, width: "100%", padding: "11px 14px", background: "transparent", border: "none", borderBottom: i < results.length - 1 ? "1px solid var(--color-primary-border)" : "none", cursor: "pointer", textAlign: "left", color: "#23262E" }}>
                      <span style={{ width: 34, height: 34, borderRadius: 9, background: c.accent + "26", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 17, flexShrink: 0 }}><IconGlyph icon={p.icon} size={17} /></span>

                      <span style={{ display: "flex", flexDirection: "column", alignItems: "flex-end", gap: 2 }}>

                      <Plus size={16} color="#ADAB98" />
                    </button>

                })}
              </div>
            )}
            {query && results.length === 0 && (
              <div className="grow-in" style={{ position: "absolute", top: "calc(100% + 8px)", left: 0, right: 0, background: "#FFFFFF", border: "1px solid var(--color-primary-border)", borderRadius: 14, padding: "14px", zIndex: 10 }}>
                <p style={{ fontSize: 13.5, color: "#ADAB98", margin: "0 0 10px" }}>Aucun produit trouvé pour « {query} »</p>
                <button
                  onClick={addCustomFromSearch}
                  style={{ width: "100%", display: "flex", alignItems: "center", justifyContent: "center", gap: 6, padding: "10px 12px", borderRadius: 10, border: "1px dashed #D8CFB0", background: "transparent", color: "#7A7968", fontWeight: 600, fontSize: 13, cursor: "pointer" }}
                >
                  <Plus size={14} /> Ajouter « {query} » comme article personnalisé
                </button>
              </div>
            )}
          </div>

        {tab === "liste" &&
          (grouped.length === 0 && boughtItems.length === 0 ? (
            <div style={{ textAlign: "center", padding: "48px 16px", color: "#C9C3AE" }}>
              <div style={{ fontSize: 38, marginBottom: 10 }}>🧺</div>
              <p style={{ fontSize: 14, margin: 0, lineHeight: 1.5 }}>Cherchez un produit ci-dessus pour<br />commencer votre liste.</p>
            </div>
          ) : (
            grouped.map((cat) => (
              <section key={cat.key} style={{ marginBottom: 26 }}>
                <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 12 }}>
                  <span style={{ width: 9, height: 9, borderRadius: "50%", background: cat.accent, flexShrink: 0 }} />
                  <h2 style={{ fontSize: 15, fontWeight: 700, margin: 0, color: "#23262E" }}>{cat.label}</h2>
                  <span style={{ fontSize: 12, color: "#A8A695", fontWeight: 600 }}>{cat.entries.length}</span>
                </div>
                <div style={{ display: "grid", gridTemplateColumns: "repeat(3, 1fr)", gap: 10 }}>
                  {cat.entries.map(({ item, product }) => (
                    <ItemCard key={item.listId} item={item} product={product} onEdit={() => openEditModal(item.listId)} onQuickTap={() => toggleBought(item.listId)} />
                  ))}
                </div>
              </section>
            ))
          ))}

        {tab === "liste" && (
          <LoyaltyCardsSection
            cards={loyaltyCards}
            onOpenCard={(card) => setViewingCard(card)}
            onManage={() => setShowCardsManager(true)}
          />
        )}

        {tab === "liste" && boughtItems.length > 0 && (
          <section style={{ marginBottom: 26, marginTop: grouped.length === 0 ? 0 : 8 }}>
            <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 12 }}>
              <span style={{ width: 9, height: 9, borderRadius: "50%", background: "#C9C3AE", flexShrink: 0 }} />
              <h2 style={{ fontSize: 15, fontWeight: 700, margin: 0, color: "#9A9887" }}>Déjà acheté</h2>
              <span style={{ fontSize: 12, color: "#A8A695", fontWeight: 600 }}>{boughtItems.length}</span>
              <button
                onClick={() => setConfirmClearBought(true)}
                title="Vider les articles déjà achetés"
                style={{ marginLeft: "auto", width: 24, height: 24, borderRadius: "50%", border: "1px solid #C4574A55", background: "transparent", color: "#C4574A", cursor: "pointer", display: "flex", alignItems: "center", justifyContent: "center", padding: 0, flexShrink: 0 }}

              {boughtItems.map(({ item, product }) => (

            </div>

        {tab === "tous" && (

            <div style={{ display: "flex", gap: 8, marginBottom: 12 }}>
              <button
                onClick={openNewProductModal}
                style={{ flex: 1, padding: "13px 16px", borderRadius: 12, border: "1px dashed #D8CFB0", background: "transparent", color: "#7A7968", fontWeight: 600, fontSize: 14, cursor: "pointer", display: "flex", alignItems: "center", justifyContent: "center", gap: 8 }}
              >
                <Plus size={16} /> Nouvel article
              </button>
              <button
                onClick={() => setShowCategoryOrder(true)}
                title="Réorganiser les rayons"
                style={{ padding: "13px 14px", borderRadius: 12, border: "1px solid var(--color-primary-border)", background: "var(--color-primary)", color: "#7A7968", fontWeight: 600, fontSize: 14, cursor: "pointer", display: "flex", alignItems: "center", justifyContent: "center" }}

                ↕️

            <div style={{ display: "flex", alignItems: "center", background: "#FFFFFF", border: "none", borderRadius: 18, padding: "14px 16px", gap: 10, boxShadow: "0 4px 14px rgba(35,38,46,0.06)", marginBottom: 20 }}>

              <input
                value={catalogQuery}
                onChange={(e) => setCatalogQuery(e.target.value)}
                placeholder="Filtrer un produit du catalogue…"

              />
              {catalogQuery && (
                <button onClick={() => setCatalogQuery("")} style={{ background: "none", border: "none", color: "#ADAB98", cursor: "pointer", display: "flex", padding: 2 }} aria-label="Effacer">
                  <X size={16} />

                    const cat = catInfo(p.cat);
                    return (
                      <ProductTile key={p.id} product={p} cat={cat} inList={listedProductIds.has(p.id)} onTap={() => openAddModal(p)} onLongPress={() => openEditProductModal(p)} />

              allGrouped.map((cat) => {

                  <section key={cat.key} style={{ marginBottom: 26 }}>

                      <h2 style={{ fontSize: 19, fontWeight: 700, margin: 0, color: "#23262E" }}>{cat.label}</h2>

// --- Écran de connexion -----------------------------------------------------

function LoginScreen({ onLoginExisting, onLoginNew, loading, error }) {
  const [email, setEmail] = useState("");
  const [pseudo, setPseudo] = useState("");
  const [sent, setSent] = useState(false);
  const [newUserMode, setNewUserMode] = useState(false);

  const inputStyle = { width: "100%", background: "#FFFFFF", border: "1px solid var(--color-primary-border)", borderRadius: 12, color: "#23262E", fontSize: 15, padding: "13px 14px", outline: "none", fontFamily: "inherit", marginBottom: 14, boxSizing: "border-box" };
  const labelStyle = { fontSize: 12.5, fontWeight: 600, color: "#9A9887", textTransform: "uppercase", letterSpacing: "0.04em", display: "block", marginBottom: 6 };

  const submitExisting = async () => { await onLoginExisting({ email }); };
  const submitNew = async () => {
    const ok = await onLoginNew({ email, pseudo });
    if (ok) setSent(true);
  };

  if (sent) {
    return (
      <div style={{ fontFamily: "'Inter', system-ui, sans-serif", background: "var(--color-primary)", minHeight: "100vh", color: "#23262E", display: "flex", alignItems: "center", justifyContent: "center", padding: 20 }}>
        <div style={{ width: "100%", maxWidth: 380, textAlign: "center" }}>
          <div style={{ fontSize: 40, marginBottom: 14 }}>📬</div>
          <h1 style={{ fontFamily: "'Fraunces', serif", fontWeight: 600, fontSize: 22, margin: "0 0 10px" }}>Vérifie ta boîte mail</h1>
          <p style={{ color: "#9A9887", fontSize: 14, lineHeight: 1.6, margin: "0 0 22px" }}>
            On a envoyé un lien de connexion à <strong style={{ color: "#23262E" }}>{email}</strong>. Ouvre-le pour finaliser la création de ton compte — ensuite, une simple adresse email suffira pour te reconnecter.
          </p>
          <button
            onClick={() => setSent(false)}
            style={{ background: "none", border: "none", color: "var(--color-accent)", fontWeight: 600, fontSize: 13.5, cursor: "pointer" }}
          >
            Mauvaise adresse ? Recommencer
          </button>
        </div>
      </div>
    );
  }

  // Écran dédié "Nouvel utilisateur" — complètement séparé de la connexion classique
  if (newUserMode) {
    return (
      <div style={{ fontFamily: "'Inter', system-ui, sans-serif", background: "var(--color-primary)", minHeight: "100vh", color: "#23262E", display: "flex", alignItems: "center", justifyContent: "center", padding: 20, position: "relative", overflow: "hidden" }}>
        <img src="./lemon-deco.png" alt="" aria-hidden="true" style={{ position: "fixed", right: -30, bottom: -20, width: 260, opacity: 0.9, pointerEvents: "none", zIndex: 0 }} />
        <div style={{ width: "100%", maxWidth: 380, position: "relative", zIndex: 1 }}>
          <button
            onClick={() => setNewUserMode(false)}
            style={{ display: "flex", alignItems: "center", gap: 4, background: "none", border: "none", color: "#9A9887", fontWeight: 600, fontSize: 13.5, cursor: "pointer", padding: 0, marginBottom: 22 }}
          >
            <ChevronLeft size={16} /> Retour à la connexion
          </button>

          <div style={{ marginBottom: 26 }}>
            <div style={{ fontSize: 34, marginBottom: 8 }}>👋</div>
            <h1 style={{ fontFamily: "'Fraunces', serif", fontWeight: 600, fontSize: 25, margin: 0 }}>Créer ton compte</h1>
            <p style={{ color: "#ADAB98", fontSize: 13.5, margin: "6px 0 0", lineHeight: 1.5 }}>
              Un lien de connexion te sera envoyé par email, aucun mot de passe à créer.
            </p>
          </div>

          <label style={labelStyle}>Email</label>
          <input style={inputStyle} type="email" autoComplete="username" value={email} onChange={(e) => setEmail(e.target.value)}
            onKeyDown={(e) => { if (e.key === "Enter") submitNew(); }} placeholder="ton@email.com" />

          <label style={labelStyle}>Mon pseudo est</label>
          <input style={inputStyle} type="text" value={pseudo} onChange={(e) => setPseudo(e.target.value)}
            onKeyDown={(e) => { if (e.key === "Enter") submitNew(); }} placeholder="ex : Marie" />

          {error && <p style={{ color: "#C4574A", fontSize: 13, margin: "-4px 0 14px" }}>{error}</p>}

          <button
            disabled={loading || !email}
            onClick={submitNew}
            style={{ width: "100%", padding: "15px 18px", borderRadius: 12, border: "none", background: loading || !email ? "var(--color-primary-border)" : "var(--color-accent)", color: loading || !email ? "#A8A695" : "var(--color-primary)", fontWeight: 700, fontSize: 16, cursor: loading || !email ? "default" : "pointer" }}
          >
            {loading ? "Envoi…" : "Recevoir mon lien de connexion"}
          </button>
        </div>
      </div>
    );
  }

  // Écran de connexion classique — épuré, pour les utilisateurs qui ont déjà un compte
  return (
    <div style={{ fontFamily: "'Inter', system-ui, sans-serif", background: "var(--color-primary)", minHeight: "100vh", color: "#23262E", display: "flex", alignItems: "center", justifyContent: "center", padding: 20, position: "relative", overflow: "hidden" }}>
      <img
        src="./lemon-deco.png"

// --- Racine : gère l'auth, les foyers, le chargement et la synchro temps réel

function Root() {
  const [session, setSession] = useState(undefined); // undefined = vérification en cours, null = pas connecté
  const [loginLoading, setLoginLoading] = useState(false);
  const [loginError, setLoginError] = useState("");
  const [householdError, setHouseholdError] = useState("");
  const [myHouseholds, setMyHouseholds] = useState([]);
  const [currentHouseholdId, setCurrentHouseholdId] = useState(null);
  const [householdsReady, setHouseholdsReady] = useState(false);
  const [pseudo, setPseudo] = useState("");
  const [profiles, setProfiles] = useState([]);
  const [initialData, setInitialData] = useState(null);
  const [remoteData, setRemoteData] = useState(null);
  const [remoteVersion, setRemoteVersion] = useState(0);
  const [showAccount, setShowAccount] = useState(false);
  const [showFoyer, setShowFoyer] = useState(false);
  const [showOptions, setShowOptions] = useState(false);
  const saveTimer = useRef(null);

  useEffect(() => {
    sb.auth.getSession().then(({ data }) => setSession(data.session ?? null));
    const { data: sub } = sb.auth.onAuthStateChange((_event, s) => setSession(s));
    return () => sub.subscription.unsubscribe();
  }, []);

  const loadMyHouseholds = async (uid) => {
    const { data: memberships } = await sb.from("courses_household_members").select("household_id").eq("user_id", uid);
    const ids = (memberships || []).map((m) => m.household_id);
    if (!ids.length) { setMyHouseholds([]); return []; }
    const { data: households } = await sb.from("courses_households").select("id, name").in("id", ids);
    const list = (households || []).map((h) => ({ id: h.id, name: h.name || "Foyer" }));
    setMyHouseholds(list);
    return list;
  };

  const joinHousehold = async (uid, householdId) => {
    const { data: hh } = await sb.from("courses_households").select("id").eq("id", householdId).maybeSingle();
    if (!hh) return false;
    await sb.from("courses_household_members").insert({ household_id: householdId, user_id: uid });
    return true;
  };

  const refreshProfiles = async (householdId) => {
    if (!householdId) return;
    const { data: members } = await sb.from("courses_household_members").select("user_id").eq("household_id", householdId);
    const ids = (members || []).map((m) => m.user_id);
    if (!ids.length) { setProfiles([]); return; }
    const { data: rows } = await sb.from("courses_profiles").select("id, pseudo").in("id", ids).order("pseudo");
    setProfiles(rows || []);
  };

  // Détermine le foyer actif après connexion : lien d'invitation > foyer mémorisé > premier disponible
  useEffect(() => {
    if (!session) return;
    let cancelled = false;
    (async () => {
      const uid = session.user.id;
      const households = await loadMyHouseholds(uid);
      if (cancelled) return;
      if (!households.length) {
        setCurrentHouseholdId(null);
        setHouseholdsReady(true);
        return;
      }
      const stored = getStoredHouseholdId();
      const match = households.find((h) => h.id === stored);
      const active = match ? match.id : households[0].id;
      setStoredHouseholdId(active);
      setCurrentHouseholdId(active);
      setHouseholdsReady(true);
    })();
    return () => { cancelled = true; };
  }, [session?.user?.id]);

  // Pseudo global de l'utilisateur (indépendant du foyer)
  useEffect(() => {
    if (!session) return;
    (async () => {
      const { data: profileRow } = await sb.from("courses_profiles").select("pseudo").eq("id", session.user.id).maybeSingle();
      let finalPseudo = profileRow?.pseudo;
      if (!finalPseudo) {
        let pending = null;
        try { pending = localStorage.getItem("courses_pending_pseudo"); } catch (e) {}
        finalPseudo = pending || session.user.email.split("@")[0];
        await sb.from("courses_profiles").upsert({ id: session.user.id, pseudo: finalPseudo, updated_at: new Date().toISOString() });
        // Première connexion (compte tout juste créé via le lien magique) : on fixe le mot de
        // passe interne générique, pour que les connexions suivantes n'aient plus besoin d'email.
        await sb.auth.updateUser({ password: GENERIC_PASSWORD });
      }
      try { localStorage.removeItem("courses_pending_pseudo"); } catch (e) {}
      setPseudo(finalPseudo);
    })();
  }, [session?.user?.id]);

  // Chargement des données du foyer actif (avec repli hors-ligne sur le cache local si Supabase est injoignable)
  const [offline, setOffline] = useState(false);
  useEffect(() => {
    if (!session || !currentHouseholdId) return;
    let cancelled = false;
    setInitialData(null);
    setOffline(false);
    (async () => {
      try {
        const { data: dataRow, error } = await sb.from("courses_data").select("*").eq("household_id", currentHouseholdId).maybeSingle();
        if (error) throw error;
        if (!dataRow) {
          await sb.from("courses_data").insert({ household_id: currentHouseholdId });
          if (!cancelled) setInitialData(emptyData);
        } else if (!cancelled) {
          setInitialData(rowToData(dataRow));
        }
        await refreshProfiles(currentHouseholdId);
      } catch (e) {
        // Pas de réseau / Supabase injoignable : on retombe sur la dernière copie connue en local (lecture seule)
        if (cancelled) return;
        try {
          const cached = JSON.parse(localStorage.getItem("courses_cache_" + currentHouseholdId) || "null");
          setInitialData(cached || emptyData);
        } catch (e2) { setInitialData(emptyData); }
        setOffline(true);
      }
    })();
    return () => { cancelled = true; };
  }, [session?.user?.id, currentHouseholdId]);

  // Abonnement temps réel scopé au foyer actif
  useEffect(() => {
    if (!session || !currentHouseholdId) return;
    const channel = sb
      .channel("courses_sync_" + currentHouseholdId)
      .on("postgres_changes", { event: "UPDATE", schema: "public", table: "courses_data", filter: `household_id=eq.${currentHouseholdId}` }, (payload) => {
        if (payload.new.updated_by === session.user.id) return;
        setRemoteData(rowToData(payload.new));
        setRemoteVersion((v) => v + 1);
      })
      .on("postgres_changes", { event: "*", schema: "public", table: "courses_household_members", filter: `household_id=eq.${currentHouseholdId}` }, () => {
        refreshProfiles(currentHouseholdId);
      })
      .on("postgres_changes", { event: "UPDATE", schema: "public", table: "courses_households", filter: `id=eq.${currentHouseholdId}` }, (payload) => {
        setMyHouseholds((hs) => hs.map((h) => (h.id === payload.new.id ? { ...h, name: payload.new.name } : h)));
      })
      .subscribe();
    return () => { sb.removeChannel(channel); };
  }, [session?.user?.id, currentHouseholdId]);

  const GENERIC_PASSWORD = "123456"; // mot de passe interne unique à tous les comptes — évite de renvoyer un email à chaque connexion

  const handleLoginNew = async ({ email, pseudo: typedPseudo }) => {
    setLoginLoading(true);
    setLoginError("");
    // Le pseudo est tapé maintenant, mais ne servira qu'après que la personne ait cliqué
    // le lien reçu par email (nouvelle page, nouvel état JS) — on le garde de côté le temps
    // de cet aller-retour.
    try {
      if (typedPseudo && typedPseudo.trim()) localStorage.setItem("courses_pending_pseudo", typedPseudo.trim());
    } catch (e) {}
    const { error } = await sb.auth.signInWithOtp({
      email,
      options: { emailRedirectTo: window.location.origin + window.location.pathname },
    });
    setLoginLoading(false);
    if (error) {
      setLoginError(error.message || "Impossible d'envoyer le lien de connexion.");
      return false;
    }
    return true;
  };

  const handleLoginExisting = async ({ email }) => {
    setLoginLoading(true);
    setLoginError("");
    const { error } = await sb.auth.signInWithPassword({ email, password: GENERIC_PASSWORD });
    setLoginLoading(false);
    if (error) {
      setLoginError("Compte introuvable. Si c'est ta première connexion, utilise \"Nouvel utilisateur ?\" ci-dessous.");
      return false;
    }
    return true;
  };

  const handleCreateHousehold = async (name) => {
    if (!session) return false;
    const { data: hh, error } = await sb.from("courses_households").insert({ name: name || "Nouveau foyer" }).select().single();
    if (error) { setHouseholdError(error.message); return false; }
    await sb.from("courses_household_members").insert({ household_id: hh.id, user_id: session.user.id });
    await loadMyHouseholds(session.user.id);
    setStoredHouseholdId(hh.id);
    setCurrentHouseholdId(hh.id);
    setShowFoyer(false);
    return true;
  };

  const handleJoinHousehold = async (code) => {
    if (!session || !code) return false;
    const ok = await joinHousehold(session.user.id, code);
    if (!ok) { setHouseholdError("Code introuvable."); return false; }
    await loadMyHouseholds(session.user.id);
    setStoredHouseholdId(code);
    setCurrentHouseholdId(code);
    setShowFoyer(false);
    return true;
  };

  const handleSwitchHousehold = (id) => {
    setStoredHouseholdId(id);
    setCurrentHouseholdId(id);
    setShowFoyer(false);
  };

  const handleRenameHousehold = async (name) => {
    if (!name || !currentHouseholdId) return false;
    const { error } = await sb.from("courses_households").update({ name }).eq("id", currentHouseholdId);
    if (!error) setMyHouseholds((hs) => hs.map((h) => (h.id === currentHouseholdId ? { ...h, name } : h)));
    return !error;
  };

  // Supprime définitivement le foyer actif (cascade : membres + données + le foyer lui-même).
  // Bascule automatiquement sur un autre foyer restant, ou vers l'écran "créer/rejoindre" s'il n'en reste aucun.
  const handleDeleteHousehold = async () => {
    if (!currentHouseholdId) return false;
    const { error } = await sb.from("courses_households").delete().eq("id", currentHouseholdId);
    if (error) return false;
    try { localStorage.removeItem("courses_cache_" + currentHouseholdId); } catch (e) {}
    const remaining = myHouseholds.filter((h) => h.id !== currentHouseholdId);
    setMyHouseholds(remaining);
    if (remaining.length) {
      setStoredHouseholdId(remaining[0].id);
      setCurrentHouseholdId(remaining[0].id);
    } else {
      try { localStorage.removeItem("courses_active_household_id"); } catch (e) {}
      setCurrentHouseholdId(null);
    }
    setShowFoyer(false);
    return true;
  };

  const handleSavePseudo = async (newPseudo) => {
    if (!newPseudo || !session) return false;
    const { error } = await sb.from("courses_profiles").upsert({ id: session.user.id, pseudo: newPseudo, updated_at: new Date().toISOString() });
    if (!error) { setPseudo(newPseudo); refreshProfiles(currentHouseholdId); }
    return !error;
  };

  const handleLogout = async () => {
    await sb.auth.signOut();
    setInitialData(null);
    setRemoteData(null);
    setCurrentHouseholdId(null);
    setHouseholdsReady(false);
    setShowAccount(false);
  };

  const lastLocalData = useRef(null);

  const pushToSupabase = async (householdId, data, userId) => {
    return sb.from("courses_data").upsert({
      household_id: householdId,
      list: data.list,
      recipes: data.recipes,
      custom_products: data.customProducts,
      product_overrides: data.productOverrides,
      deleted_product_ids: data.deletedProductIds,
      custom_icons: data.customIcons,
      lists: data.lists,
      active_list_id: data.activeListId,
      loyalty_cards: data.loyaltyCards,
      category_order: data.categoryOrder,
      updated_at: new Date().toISOString(),
      updated_by: userId,
    }, { onConflict: "household_id" });
  };

  const handleDataChange = (data) => {
    if (!session || !currentHouseholdId) return;
    lastLocalData.current = data;
    // Cache local immédiat (lecture de secours hors-ligne) — indépendant de la synchro Supabase
    try { localStorage.setItem("courses_cache_" + currentHouseholdId, JSON.stringify(data)); } catch (e) {}
    if (saveTimer.current) clearTimeout(saveTimer.current);
    saveTimer.current = setTimeout(async () => {
      const { error } = await pushToSupabase(currentHouseholdId, data, session.user.id);
      setOffline(!!error);
    }, 350);
  };

  // Dès que la connexion revient, retente d'envoyer la dernière version locale connue
  useEffect(() => {
    const onOnline = async () => {
      if (!session || !currentHouseholdId || !lastLocalData.current) return;
      const { error } = await pushToSupabase(currentHouseholdId, lastLocalData.current, session.user.id);
      if (!error) setOffline(false);
    };
    window.addEventListener("online", onOnline);
    return () => window.removeEventListener("online", onOnline);
  }, [session?.user?.id, currentHouseholdId]);

  if (session === undefined) {
    return <div style={{ background: "var(--color-primary)", minHeight: "100vh" }} />;
  }
  if (session === null) {
    return <LoginScreen onLoginExisting={handleLoginExisting} onLoginNew={handleLoginNew} loading={loginLoading} error={loginError} />;
  }
  if (!householdsReady) {
    return <div style={{ background: "var(--color-primary)", minHeight: "100vh", color: "#ADAB98", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 14 }}>Chargement…</div>;
  }
  if (!currentHouseholdId) {
    return <HouseholdScreen onCreate={handleCreateHousehold} onJoin={handleJoinHousehold} error={householdError} />;
  }
  if (!initialData) {
    return <div style={{ background: "var(--color-primary)", minHeight: "100vh", color: "#ADAB98", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 14 }}>Chargement du foyer…</div>;
  }

  const currentHousehold = myHouseholds.find((h) => h.id === currentHouseholdId);

  return (
    <div style={{ background: "var(--color-primary)", minHeight: "100vh", color: "#23262E", position: "relative", zIndex: 0 }}>
      {offline && (
        <div style={{ background: "#FBEFDC", color: "#8A5A15", fontSize: 12.5, fontWeight: 600, textAlign: "center", padding: "8px 12px" }}>
          ⚠️ Hors-ligne — tes changements sont gardés sur cet appareil et seront envoyés dès que la connexion revient
        </div>
      )}

      {/* Bandeau à volants façon auvent de marché */}
      <div style={{ height: 40, backgroundImage: "url('data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAACuAAAADDCAYAAAB5ukX9AAAZCklEQVR4nO3cMa5jx3LHYUqAoFS7cKYFvMSJIq3Sq7CTlzgx4PRl3oIiZ4KhQA6IMeaOL8VT5OnT9e/+vg0McavrN0mR3/3bf/7LnzcI88//9LfZHwHK/v2//mP2R4AyvSWR3pJIb0mktyTSWxLpLYn0lkR6SyK9JZHekkhvSaS3JNJbEn0/+wMAAAAAAAAAAAAAQBIHuAAAAAAAAAAAAABQ4AAXAAAAAAAAAAAAAAoc4AIAAAAAAAAAAABAgQNcAAAAAAAAAAAAAChwgAsAAAAAAAAAAAAABQ5wAQAAAAAAAAAAAKDAAS4AAAAAAAAAAAAAFDjABQAAAAAAAAAAAIACB7gAAAAAAAAAAAAAUOAAFwAAAAAAAAAAAAAKHOACAAAAAAAAAAAAQIEDXAAAAAAAAAAAAAAocIALAAAAAAAAAAAAAAUOcAEAAAAAAAAAAACgwAEuAAAAAAAAAAAAABQ4wAUAAAAAAAAAAACAAge4AAAAAAAAAAAAAFDgABcAAAAAAAAAAAAAChzgAgAAAAAAAAAAAECBA1wAAAAAAAAAAAAAKHCACwAAAAAAAAAAAAAFDnABAAAAAAAAAAAAoMABLgAAAAAAAAAAAAAUOMAFAAAAAAAAAAAAgAIHuAAAAAAAAAAAAABQ4AAXAAAAAAAAAAAAAAoc4AIAAAAAAAAAAABAgQNcAAAAAAAAAAAAAChwgAsAAAAAAAAAAAAABQ5wAQAAAAAAAAAAAKDAAS4AAAAAAAAAAAAAFDjABQAAAAAAAAAAAIACB7gAAAAAAAAAAAAAUOAAFwAAAAAAAAAAAAAKHOACAAAAAAAAAAAAQIEDXAAAAAAAAAAAAAAocIALAAAAAAAAAAAAAAUOcAEAAAAAAAAAAACgwAEuAAAAAAAAAAAAABQ4wAUAAAAAAAAAAACAAge4AAAAAAAAAAAAAFDgABcAAAAAAAAAAAAAChzgAgAAAAAAAAAAAECBA1wAAAAAAAAAAAAAKHCACwAAAAAAAAAAAAAFDnABAAAAAAAAAAAAoMABLgAAAAAAAAAAAAAUOMAFAAAAAAAAAAAAgAIHuAAAAAAAAAAAAABQ4AAXAAAAAAAAAAAAAAoc4AIAAAAAAAAAAABAgQNcAAAAAAAAAAAAAChwgAsAAAAAAAAAAAAABQ5wAQAAAAAAAAAAAKDAAS4AAAAAAAAAAAAAFDjABQAAAAAAAAAAAIACB7gAAAAAAAAAAAAAUOAAFwAAAAAAAAAAAAAKHOACAAAAAAAAAAAAQIEDXAAAAAAAAAAAAAAocIALAAAAAAAAAAAAAAUOcAEAAAAAAAAAAACgwAEuAAAAAAAAAAAAABQ4wAUAAAAAAAAAAACAAge4AAAAAAAAAAAAAFDgABcAAAAAAAAAAAAAChzgAgAAAAAAAAAAAECBA1wAAAAAAAAAAAAAKHCACwAAAAAAAAAAAAAFDnABAAAAAAAAAAAAoMABLgAAAAAAAAAAAAAUOMAFAAAAAAAAAAAAgAIHuAAAAAAAAAAAAABQ4AAXAAAAAAAAAAAAAAoc4AIAAAAAAAAAAABAgQNcAAAAAAAAAAAAAChwgAsAAAAAAAAAAAAABQ5wAQAAAAAAAAAAAKDAAS4AAAAAAAAAAAAAFDjABQAAAAAAAAAAAIACB7gAAAAAAAAAAAAAUOAAFwAAAAAAAAAAAAAKHOACAAAAAAAAAAAAQIEDXAAAAAAAAAAAAAAocIALAAAAAAAAAAAAAAUOcAEAAAAAAAAAAACgwAEuAAAAAAAAAAAAABQ4wAUAAAAAAAAAAACAAge4AAAAAAAAAAAAAFDgABcAAAAAAAAAAAAAChzgAgAAAAAAAAAAAECBA1wAAAAAAAAAAAAAKHCACwA
