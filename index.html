<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; background: #14171C; }
  #root { min-height: 100vh; }
  #boot-error { display:none; color:#F5F3EE; font-family:-apple-system,sans-serif; padding:24px; max-width:480px; margin:0 auto; }
</style>
<script>
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => navigator.serviceWorker.register('sw.js'));
}
window.addEventListener('error', function (e) {
  var el = document.getElementById('boot-error');
  var root = document.getElementById('root');
  if (root && !root.hasChildNodes() && el) {
    el.style.display = 'block';
    el.querySelector('#boot-error-msg').textContent = (e && e.message) || 'Erreur inconnue';
  }
});
</script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.3.1/umd/react.production.min.js" crossorigin></script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.22.20/babel.min.js" crossorigin></script>
</head>

<div id="root"></div>

</div>

    <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color}

      {children}

// Normalise pour une recherche insensible aux accents / ligatures (ex: "boeuf" trouve "bœuf")
function normalize(str) {
  return String(str)
    .toLowerCase()
    .replace(/œ/g, "oe")
    .replace(/æ/g, "ae")
    .normalize("NFD")
    .replace(/[\u0300-\u036f]/g, "");
}

// --- Carte produit (avec appui long pour édition) ---------------------------

function ItemCard({ item, product, onEdit, onQuickTap, small }) {
  const timer = useRef(null);
  const longPressed = useRef(false);
  const c = catInfo(product.cat);
  const startPress = () => {
    longPressed.current = false;
    timer.current = setTimeout(() => { longPressed.current = true; onEdit(); }, 480);
  };
  const cancelPress = () => { if (timer.current) clearTimeout(timer.current); };
  const endPress = () => {
    cancelPress();
    if (!longPressed.current && onQuickTap) onQuickTap();
  };

  return (
    <div
      onPointerDown={startPress}
      onPointerUp={endPress}
      onPointerLeave={cancelPress}
      onContextMenu={(e) => e.preventDefault()}
      style={{ background: c.tint, border: `1px solid ${c.accent}33`, borderRadius: 16, padding: small ? "12px 6px 9px" : "16px 8px 12px", display: "flex", flexDirection: "column", alignItems: "center", gap: 6, minHeight: small ? 78 : 96, userSelect: "none", cursor: "pointer" }}
    >
      <span style={{ fontSize: small ? 21 : 26 }}>{product.icon}</span>
      <span style={{ fontSize: small ? 11 : 12.5, fontWeight: 600, textAlign: "center", lineHeight: 1.25, color: "#F0EEE8" }}>
        {product.name}
        {item.note && <span style={{ color: c.accent }}> · {item.note}</span>}
      </span>
      <span style={{ fontSize: 10.5, color: "#8B93A1", fontWeight: 600 }}>{item.qty} {item.unit}</span>
    </div>
  );
}

            onClick={() => onSave({ name: name.trim(), icon, cat })}
            style={{ flex: 1, padding: "13px 18px", borderRadius: 12, border: "none", background: !name.trim() ? "#2A303A" : c.accent, color: !name.trim() ? "#5B6270" : "#14171C", fontWeight: 700, fontSize: 14.5, cursor: !name.trim() ? "default" : "pointer" }}
          >
            {isEdit ? "Enregistrer" : "Créer l'article"}
          </button>
        </div>
      </div>
    </div>
  );
}

// Tuile produit de l'onglet "Tous les produits" : appui court = ajouter à la liste, appui long = éditer
function ProductTile({ product, cat, onTap, onLongPress }) {
  const timer = useRef(null);
  const longPressed = useRef(false);
  const start = () => {
    longPressed.current = false;
    timer.current = setTimeout(() => { longPressed.current = true; onLongPress(); }, 480);
  };
  const cancel = () => { if (timer.current) clearTimeout(timer.current); };
  const end = () => { cancel(); if (!longPressed.current) onTap(); };

  return (
    <button
      onPointerDown={start}
      onPointerUp={end}
      onPointerLeave={cancel}
      onContextMenu={(e) => e.preventDefault()}
      style={{ background: cat.tint, border: `1px solid ${cat.accent}33`, borderRadius: 14, padding: "12px 4px 10px", display: "flex", flexDirection: "column", alignItems: "center", gap: 5, cursor: "pointer", userSelect: "none" }}
    >
      <span style={{ fontSize: 21 }}>{product.icon}</span>
      <span style={{ fontSize: 10.5, fontWeight: 600, textAlign: "center", lineHeight: 1.2, color: "#F0EEE8" }}>{product.name}</span>
    </button>
  );
}

// --- Éditeur de recette ------------------------------------------------------

function RecipeEditor({ draft, onCancel, onSave, products }) {
  const [name, setName] = useState(draft?.name ?? "");
  const [ingredients, setIngredients] = useState(draft?.ingredients ?? []);
  const [steps, setSteps] = useState(draft?.steps ?? []);
  const [stepInput, setStepInput] = useState("");
  const [query, setQuery] = useState("");
  const [modalProduct, setModalProduct] = useState(null);
  const [editingIngId, setEditingIngId] = useState(null);

  const addStep = () => {
    if (!stepInput.trim()) return;
    setSteps((s) => [...s, stepInput.trim()]);
    setStepInput("");
  };
  const updateStep = (idx, val) => setSteps((s) => s.map((st, i) => (i === idx ? val : st)));
  const removeStep = (idx) => setSteps((s) => s.filter((_, i) => i !== idx));
  const moveStep = (idx, dir) => {
    setSteps((s) => {
      const arr = [...s];
      const target = dir === "up" ? idx - 1 : idx + 1;
      if (target < 0 || target >= arr.length) return arr;
      [arr[idx], arr[target]] = [arr[target], arr[idx]];
      return arr;
    });
  };

  const results = useMemo(() => {
    const q = normalize(query.trim());
    if (!q) return [];
    return products.filter((p) => normalize(p.name).includes(q)).slice(0, 7);
  }, [query, products]);

  const openAdd = (product) => { setModalProduct(product); setEditingIngId(null); setQuery(""); };
  const openEdit = (ingId) => {
    const entry = ingredients.find((i) => i.ingId === ingId);
    if (!entry) return;
    setModalProduct(products.find((p) => p.id === entry.productId));
    setEditingIngId(ingId);
  };
  const confirm = ({ qty, unit, note }) => {
    if (editingIngId) {
      setIngredients((l) => l.map((it) => (it.ingId === editingIngId ? { ...it, qty, unit, note } : it)));
    } else {
      setIngredients((l) => [...l, { ingId: `${modalProduct.id}-${Date.now()}`, productId: modalProduct.id, qty, unit, note }]);
    }
    setModalProduct(null);
    setEditingIngId(null);
  };
  const remove = () => {
    setIngredients((l) => l.filter((it) => it.ingId !== editingIngId));
    setModalProduct(null);
    setEditingIngId(null);
  };

  return (
    <div>
      <div style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 20 }}>
        <button onClick={onCancel} style={{ background: "#1E232B", border: "1px solid #2A303A", borderRadius: 10, width: 34, height: 34, display: "flex", alignItems: "center", justifyContent: "center", color: "#9CA3AF", cursor: "pointer" }}>
          <ChevronLeft size={18} />
        </button>
        <h1 style={{ fontFamily: "'Fraunces', serif", fontWeight: 600, fontSize: 22, margin: 0 }}>
          {draft?.id ? "Modifier la recette" : "Nouvelle recette"}
        </h1>
      </div>

      <label style={{ fontSize: 12.5, fontWeight: 600, color: "#8B93A1", textTransform: "uppercase", letterSpacing: "0.04em" }}>Nom de la recette</label>
      <input
        value={name}
        onChange={(e) => setName(e.target.value)}
        placeholder="ex : Ratatouille maison"
        style={{ width: "100%", marginTop: 8, marginBottom: 22, background: "#1E232B", border: "1px solid #2A303A", borderRadius: 12, color: "#F5F3EE", fontSize: 15, padding: "12px 14px", outline: "none", fontFamily: "inherit" }}
      />

      <label style={{ fontSize: 12.5, fontWeight: 600, color: "#8B93A1", textTransform: "uppercase", letterSpacing: "0.04em" }}>Ingrédients</label>
      <div style={{ position: "relative", margin: "8px 0 18px" }}>
        <div style={{ display: "flex", alignItems: "center", background: "#1E232B", border: "1px solid #2A303A", borderRadius: 14, padding: "12px 14px", gap: 10 }}>
          <Search size={18} color="#6B7280" strokeWidth={2.2} />
          <input
            value={query}
            onChange={(e) => setQuery(e.target.value)}
            placeholder="Chercher un ingrédient…"
            style={{ background: "transparent", border: "none", outline: "none", color: "#F5F3EE", fontSize: 15, width: "100%", fontFamily: "inherit" }}
            onKeyDown={(e) => { if (e.key === "Enter" && results.length > 0) openAdd(results[0]); }}
          />
        </div>
        {results.length > 0 && (
          <div style={{ position: "absolute", top: "calc(100% + 8px)", left: 0, right: 0, background: "#1E232B", border: "1px solid #2A303A", borderRadius: 14, overflow: "hidden", zIndex: 20, boxShadow: "0 12px 28px rgba(0,0,0,0.35)", maxHeight: 300, overflowY: "auto" }}>
            {results.map((p, i) => {
              const c = catInfo(p.cat);
              return (
                <button key={p.id} onClick={() => openAdd(p)} style={{ display: "flex", alignItems: "center", gap: 12, width: "100%", padding: "11px 14px", background: "transparent", border: "none", borderBottom: i < results.length - 1 ? "1px solid #262B34" : "none", cursor: "pointer", textAlign: "left", color: "#F5F3EE" }}>
                  <span style={{ width: 32, height: 32, borderRadius: 9, background: c.accent + "26", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 16, flexShrink: 0 }}>{p.icon}</span>
                  <span style={{ flex: 1, fontSize: 14, fontWeight: 500 }}>{p.name}</span>
                  <Plus size={16} color="#6B7280" />
                </button>
              );
            })}
          </div>
        )}
      </div>

      {ingredients.length === 0 ? (
        <p style={{ color: "#5B6270", fontSize: 13.5, textAlign: "center", padding: "20px 0" }}>
          Ajoutez des ingrédients avec la recherche ci-dessus.
        </p>
      ) : (
        <div style={{ display: "grid", gridTemplateColumns: "repeat(3, 1fr)", gap: 10, marginBottom: 28 }}>
          {ingredients.map((item) => {
            const product = products.find((p) => p.id === item.productId);
            if (!product) return null;
            return <ItemCard key={item.ingId} item={item} product={product} onEdit={() => openEdit(item.ingId)} />;
          })}
        </div>
      )}

      <label style={{ fontSize: 12.5, fontWeight: 600, color: "#8B93A1", textTransform: "uppercase", letterSpacing: "0.04em" }}>Étapes de réalisation</label>

      {steps.length === 0 ? (
        <p style={{ color: "#5B6270", fontSize: 13.5, padding: "10px 0 4px" }}>Aucune étape pour l'instant.</p>
      ) : (
        <div style={{ display: "flex", flexDirection: "column", gap: 8, margin: "10px 0 4px" }}>
          {steps.map((step, idx) => (
            <div key={idx} style={{ display: "flex", gap: 10, alignItems: "flex-start", background: "#1E232B", border: "1px solid #2A303A", borderRadius: 12, padding: "10px 12px" }}>
              <span style={{ width: 22, height: 22, borderRadius: "50%", background: "#2A303A", color: "#9CA3AF", fontSize: 11.5, fontWeight: 700, display: "flex", alignItems: "center", justifyContent: "center", flexShrink: 0, marginTop: 2 }}>
                {idx + 1}
              </span>
              <textarea
                value={step}
                onChange={(e) => updateStep(idx, e.target.value)}
                rows={2}
                style={{ flex: 1, background: "transparent", border: "none", outline: "none", color: "#F5F3EE", fontSize: 14, fontFamily: "inherit", resize: "vertical", lineHeight: 1.4 }}
              />
              <div style={{ display: "flex", flexDirection: "column", gap: 4, flexShrink: 0 }}>
                <button onClick={() => moveStep(idx, "up")} disabled={idx === 0} style={{ background: "none", border: "none", color: idx === 0 ? "#3A4150" : "#8B93A1", cursor: idx === 0 ? "default" : "pointer", fontSize: 12, padding: 2 }}>▲</button>
                <button onClick={() => moveStep(idx, "down")} disabled={idx === steps.length - 1} style={{ background: "none", border: "none", color: idx === steps.length - 1 ? "#3A4150" : "#8B93A1", cursor: idx === steps.length - 1 ? "default" : "pointer", fontSize: 12, padding: 2 }}>▼</button>
                <button onClick={() => removeStep(idx)} style={{ background: "none", border: "none", color: "#C4574A", cursor: "pointer", fontSize: 13, padding: 2 }}>
                  <X size={13} />
                </button>
              </div>
            </div>
          ))}
        </div>
      )}

      <div style={{ display: "flex", gap: 8, marginBottom: 28, marginTop: 4 }}>
        <textarea
          value={stepInput}
          onChange={(e) => setStepInput(e.target.value)}
          placeholder="Décrire l'étape suivante…"
          rows={2}
          style={{ flex: 1, background: "#1E232B", border: "1px solid #2A303A", borderRadius: 12, color: "#F5F3EE", fontSize: 14, padding: "10px 12px", outline: "none", fontFamily: "inherit", resize: "vertical" }}
          onKeyDown={(e) => { if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); addStep(); } }}
        />
        <button
          onClick={addStep}
          disabled={!stepInput.trim()}
          style={{ alignSelf: "flex-start", padding: "10px 14px", borderRadius: 10, border: "none", background: stepInput.trim() ? "#2A303A" : "#1E232B", color: stepInput.trim() ? "#F5F3EE" : "#5B6270", cursor: stepInput.trim() ? "pointer" : "default", display: "flex", alignItems: "center", gap: 4, fontSize: 13, fontWeight: 600 }}
        >
          <Plus size={14} /> Ajouter
        </button>
      </div>

      <button
        disabled={!name.trim() || ingredients.length === 0}
        onClick={() => onSave({ id: draft?.id ?? `recipe-${Date.now()}`, name: name.trim(), ingredients, steps })}
        style={{
          width: "100%",
          padding: "14px 18px",
          borderRadius: 12,
          border: "none",
          background: !name.trim() || ingredients.length === 0 ? "#2A303A" : "#F5F3EE",
          color: !name.trim() || ingredients.length === 0 ? "#5B6270" : "#14171C",
          fontWeight: 700,
          fontSize: 15,
          cursor: !name.trim() || ingredients.length === 0 ? "default" : "pointer",
        }}
      >
        Enregistrer la recette
      </button>

      {modalProduct && (
        <ItemModal
          product={modalProduct}
          initial={editingIngId ? ingredients.find((i) => i.ingId === editingIngId) : null}
          onClose={() => { setModalProduct(null); setEditingIngId(null); }}
          onConfirm={confirm}
          onDelete={editingIngId ? remove : null}
        />
      )}
    </div>
  );
}

function RecipeCard({ recipe, onOpen, onAddToList, products }) {
  const [added, setAdded] = useState(false);
  const preview = recipe.ingredients.slice(0, 5);

  return (
    <div style={{ background: "#1E232B", border: "1px solid #2A303A", borderRadius: 16, padding: 16, marginBottom: 14 }}>
      <div onClick={onOpen} style={{ cursor: "pointer" }}>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", marginBottom: 10 }}>
          <h3 style={{ fontSize: 16, fontWeight: 700, margin: 0 }}>{recipe.name}</h3>
          <span style={{ fontSize: 12, color: "#6B7280", fontWeight: 600, whiteSpace: "nowrap", marginLeft: 10 }}>
            {recipe.ingredients.length} ingrédient{recipe.ingredients.length > 1 ? "s" : ""}
            {recipe.steps?.length > 0 ? ` · ${recipe.steps.length} étape${recipe.steps.length > 1 ? "s" : ""}` : ""}
          </span>
        </div>
        <div style={{ display: "flex", gap: 6, flexWrap: "wrap" }}>
          {preview.map((item) => {
            const p = products.find((pr) => pr.id === item.productId);
            if (!p) return null;
            return (
              <span key={item.ingId} style={{ width: 30, height: 30, borderRadius: 8, background: catInfo(p.cat).accent + "26", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 15 }}>
                {p.icon}
              </span>
            );
          })}
          {recipe.ingredients.length > 5 && (
            <span style={{ width: 30, height: 30, borderRadius: 8, background: "#2A303A", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 11, color: "#8B93A1", fontWeight: 700 }}>
              +{recipe.ingredients.length - 5}
            </span>
          )}
        </div>
      </div>

      <button
        onClick={() => { onAddToList(recipe); setAdded(true); setTimeout(() => setAdded(false), 1400); }}
        style={{
          marginTop: 14,
          width: "100%",
          padding: "11px 14px",
          borderRadius: 10,
          border: "none",
          background: added ? "#6B9B5E" : "#2A303A",
          color: added ? "#14171C" : "#F5F3EE",
          fontWeight: 700,
          fontSize: 13.5,
          cursor: "pointer",
          display: "flex",
          alignItems: "center",
          justifyContent: "center",
          gap: 6,
          transition: "background 0.15s",
        }}
      >
        {added ? (<><Check size={15} /> Ajouté à la liste</>) : "Ajouter la recette à la liste"}
      </button>
    </div>
  );
}

// --- App -------------------------------------------------------------------

function App() {
  const [tab, setTab] = useState("liste");
  const [query, setQuery] = useState("");
  const [list, setList] = useState(() => {
    try { return JSON.parse(localStorage.getItem("courses_list") || "[]"); } catch (e) { return []; }
  });
  const [modalProduct, setModalProduct] = useState(null);
  const [editingListId, setEditingListId] = useState(null);
  const [recipes, setRecipes] = useState(() => {
    try { return JSON.parse(localStorage.getItem("courses_recipes") || "[]"); } catch (e) { return []; }
  });
  const [recipeEditing, setRecipeEditing] = useState(null); // null | {} | recipe object
  const [collapsedCats, setCollapsedCats] = useState(() => {
    const init = {};
    CATEGORIES.forEach((c) => { init[c.key] = true; }); // rayons repliés par défaut dans "Tous les produits"
    return init;
  });
  const [customProducts, setCustomProducts] = useState(() => {
    try { return JSON.parse(localStorage.getItem("courses_custom_products") || "[]"); } catch (e) { return []; }
  }); // articles créés par l'utilisateur
  const [productOverrides, setProductOverrides] = useState(() => {
    try { return JSON.parse(localStorage.getItem("courses_product_overrides") || "{}"); } catch (e) { return {}; }
  }); // { [id]: {name, icon, cat} } pour les articles de base modifiés
  const [deletedProductIds, setDeletedProductIds] = useState(() => {
    try { return JSON.parse(localStorage.getItem("courses_deleted_ids") || "[]"); } catch (e) { return []; }
  }); // ids d'articles (de base) supprimés
  const [productModal, setProductModal] = useState(null); // null | {mode:'create'} | {mode:'edit', product}
  const inputRef = useRef(null);

  useEffect(() => { try { localStorage.setItem("courses_list", JSON.stringify(list)); } catch (e) {} }, [list]);
  useEffect(() => { try { localStorage.setItem("courses_recipes", JSON.stringify(recipes)); } catch (e) {} }, [recipes]);
  useEffect(() => { try { localStorage.setItem("courses_custom_products", JSON.stringify(customProducts)); } catch (e) {} }, [customProducts]);
  useEffect(() => { try { localStorage.setItem("courses_product_overrides", JSON.stringify(productOverrides)); } catch (e) {} }, [productOverrides]);
  useEffect(() => { try { localStorage.setItem("courses_deleted_ids", JSON.stringify(deletedProductIds)); } catch (e) {} }, [deletedProductIds]);

  const toggleCatCollapsed = (key) => setCollapsedCats((c) => ({ ...c, [key]: !c[key] }));

  // Base + articles personnalisés, avec overrides et suppressions appliqués
  const products = useMemo(() => {
    const applyOverride = (p) => (productOverrides[p.id] ? { ...p, ...productOverrides[p.id] } : p);
    const base = PRODUCTS.filter((p) => !deletedProductIds.includes(p.id)).map(applyOverride);
    const customs = customProducts.filter((p) => !deletedProductIds.includes(p.id)).map(applyOverride);
    return [...base, ...customs];
  }, [customProducts, productOverrides, deletedProductIds]);

  const addCustomProduct = ({ name, icon, cat }) => {
    const p = { id: `custom-${Date.now()}`, name, icon, cat };
    setCustomProducts((l) => [...l, p]);
    return p;
  };
  const editProduct = (id, patch) => {
    if (id.startsWith("custom-")) {
      setCustomProducts((l) => l.map((p) => (p.id === id ? { ...p, ...patch } : p)));
    } else {
      setProductOverrides((o) => ({ ...o, [id]: { ...(o[id] || {}), ...patch } }));
    }
  };
  const deleteProduct = (id) => {
    if (id.startsWith("custom-")) {
      setCustomProducts((l) => l.filter((p) => p.id !== id));
    } else {
      setDeletedProductIds((ids) => [...ids, id]);
    }
  };

  const openNewProductModal = () => setProductModal({ mode: "create" });
  const openEditProductModal = (product) => setProductModal({ mode: "edit", product });
  const closeProductModal = () => setProductModal(null);
  const saveProductModal = ({ name, icon, cat }) => {
    if (productModal.mode === "create") addCustomProduct({ name, icon, cat });
    else editProduct(productModal.product.id, { name, icon, cat });
    closeProductModal();
  };
  const deleteFromProductModal = () => {
    deleteProduct(productModal.product.id);
    closeProductModal();
  };

  const results = useMemo(() => {
    const q = normalize(query.trim());
    if (!q) return [];
    return products.filter((p) => normalize(p.name).includes(q)).slice(0, 7);
  }, [query, products]);

  const addCustomFromSearch = () => {
    const trimmed = query.trim();
    if (!trimmed) return;
    const p = addCustomProduct({ name: trimmed, icon: "📦", cat: "autre" });
    openAddModal(p);
  };

  const grouped = useMemo(() => {
    const map = {};
    list.forEach((item) => {
      const p = products.find((pr) => pr.id === item.productId);
      if (!p) return;
      if (!map[p.cat]) map[p.cat] = [];
      map[p.cat].push({ item, product: p });
    });
    return CATEGORIES.filter((c) => map[c.key]).map((c) => ({ ...c, entries: map[c.key] }));
  }, [list, products]);

  const allGrouped = useMemo(() => CATEGORIES.map((c) => ({ ...c, products: products.filter((p) => p.cat === c.key) })), [products]);

  const openAddModal = (product) => { setModalProduct(product); setEditingListId(null); setQuery(""); };
  const openEditModal = (listId) => {
    const entry = list.find((l) => l.listId === listId);
    if (!entry) return;
    setModalProduct(products.find((p) => p.id === entry.productId));
    setEditingListId(listId);
  };
  const removeFromList = (listId) => setList((l) => l.filter((it) => it.listId !== listId));
  const confirmModal = ({ qty, unit, note }) => {
    if (editingListId) {
      setList((l) => l.map((it) => (it.listId === editingListId ? { ...it, qty, unit, note } : it)));
    } else {
      setList((l) => [...l, { listId: `${modalProduct.id}-${Date.now()}`, productId: modalProduct.id, qty, unit, note }]);
    }
    setModalProduct(null);
    setEditingListId(null);
    inputRef.current?.focus();
  };
  const deleteFromModal = () => {
    setList((l) => l.filter((it) => it.listId !== editingListId));
    setModalProduct(null);
    setEditingListId(null);
  };

  const addRecipeToList = (recipe) => {
    const now = Date.now();
    const newEntries = recipe.ingredients.map((ing, i) => ({
      listId: `${ing.productId}-${now}-${i}`,
      productId: ing.productId,
      qty: ing.qty,
      unit: ing.unit,
      note: ing.note,
    }));
    setList((l) => [...l, ...newEntries]);
  };

  const saveRecipe = (recipe) => {
    setRecipes((r) => {
      const exists = r.some((x) => x.id === recipe.id);
      return exists ? r.map((x) => (x.id === recipe.id ? recipe : x)) : [...r, recipe];
    });
    setRecipeEditing(null);
  };

  const totalCount = list.length;

  return (
    <div style={{ fontFamily: "'Inter', system-ui, sans-serif", background: "#14171C", minHeight: "100vh", color: "#F5F3EE", display: "flex", justifyContent: "center" }}>
      <style>{`
        @import url('https://fonts.googleapis.com/css2?family=Fraunces:wght@500;600;700&family=Inter:wght@400;500;600;700&display=swap');
        * { box-sizing: border-box; }
        input::placeholder { color: #6B7280; }
        input[type=number]::-webkit-inner-spin-button, input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
        .grow-in { animation: growIn 0.2s ease-out; }
        @keyframes growIn { from { opacity:0; transform: translateY(6px) } to { opacity:1; transform: translateY(0) } }
        @media (prefers-reduced-motion: reduce) { .grow-in { animation: none; } }
      `}</style>

      <div style={{ width: "100%", maxWidth: 480, padding: "26px 18px 100px" }}>
        {!(tab === "recettes" && recipeEditing) && (
          <header style={{ marginBottom: 18 }}>
            <div style={{ display: "flex", alignItems: "center", gap: 10, color: "#8B93A1", fontSize: 13, fontWeight: 600, letterSpacing: "0.06em", textTransform: "uppercase", marginBottom: 4 }}>
              <ShoppingBasket size={16} strokeWidth={2.2} />
              Maison
            </div>
            <h1 style={{ fontFamily: "'Fraunces', serif", fontWeight: 600, fontSize: 30, margin: 0, letterSpacing: "-0.01em" }}>
              {tab === "liste" ? "Ma liste" : tab === "tous" ? "Tous les produits" : "Recettes"}
            </h1>
            {tab === "liste" && (
              <p style={{ color: "#6B7280", fontSize: 14, margin: "4px 0 0" }}>
                {totalCount === 0 ? "Aucun article pour l'instant" : `${totalCount} article${totalCount > 1 ? "s" : ""} dans ${grouped.length} rayon${grouped.length > 1 ? "s" : ""}`}
              </p>
            )}
            {tab === "recettes" && (
              <p style={{ color: "#6B7280", fontSize: 14, margin: "4px 0 0" }}>
                {recipes.length === 0 ? "Aucune recette enregistrée" : `${recipes.length} recette${recipes.length > 1 ? "s" : ""}`}
              </p>
            )}
          </header>
        )}

        {!(tab === "recettes" && recipeEditing) && (
          <div style={{ display: "flex", gap: 6, background: "#1E232B", border: "1px solid #2A303A", borderRadius: 12, padding: 4, marginBottom: 22 }}>
            {[
              { key: "liste", label: "Ma liste", icon: ListChecks },
              { key: "tous", label: "Tous les produits", icon: Grid3x3 },
              { key: "recettes", label: "Recettes", icon: BookOpen },
            ].map((t) => (
              <button
                key={t.key}
                onClick={() => setTab(t.key)}
                style={{ flex: 1, display: "flex", alignItems: "center", justifyContent: "center", gap: 5, padding: "9px 6px", borderRadius: 9, border: "none", background: tab === t.key ? "#2A303A" : "transparent", color: tab === t.key ? "#F5F3EE" : "#6B7280", fontWeight: 600, fontSize: 12, cursor: "pointer" }}
              >
                <t.icon size={14} />
                {t.label}
              </button>
            ))}
          </div>
        )}

        {tab === "liste" && (
          <div style={{ position: "relative", marginBottom: 26 }}>
            <div style={{ display: "flex", alignItems: "center", background: "#1E232B", border: "1px solid #2A303A", borderRadius: 14, padding: "12px 14px", gap: 10 }}>
              <Search size={18} color="#6B7280" strokeWidth={2.2} />
              <input
                ref={inputRef}
                value={query}
                onChange={(e) => setQuery(e.target.value)}
                placeholder="Chercher un produit…"
                style={{ background: "transparent", border: "none", outline: "none", color: "#F5F3EE", fontSize: 15, width: "100%", fontFamily: "inherit" }}
                onKeyDown={(e) => { if (e.key === "Enter" && results.length > 0) openAddModal(results[0]); }}
              />
              {query && (
                <button onClick={() => setQuery("")} style={{ background: "none", border: "none", color: "#6B7280", cursor: "pointer", display: "flex", padding: 2 }} aria-label="Effacer">
                  <X size={16} />
                </button>
              )}
            </div>
            {results.length > 0 && (
              <div className="grow-in" style={{ position: "absolute", top: "calc(100% + 8px)", left: 0, right: 0, background: "#1E232B", border: "1px solid #2A303A", borderRadius: 14, overflow: "hidden", zIndex: 10, boxShadow: "0 12px 28px rgba(0,0,0,0.35)", maxHeight: 320, overflowY: "auto" }}>
                {results.map((p, i) => {
                  const c = catInfo(p.cat);
                  return (
                    <button key={p.id} onClick={() => openAddModal(p)} style={{ display: "flex", alignItems: "center", gap: 12, width: "100%", padding: "11px 14px", background: "transparent", border: "none", borderBottom: i < results.length - 1 ? "1px solid #262B34" : "none", cursor: "pointer", textAlign: "left", color: "#F5F3EE" }}>
                      <span style={{ width: 34, height: 34, borderRadius: 9, background: c.accent + "26", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 17, flexShrink: 0 }}>{p.icon}</span>
                      <span style={{ flex: 1, fontSize: 14.5, fontWeight: 500 }}>{p.name}</span>
                      <span style={{ fontSize: 11, color: c.accent, fontWeight: 600 }}>{c.label}</span>
                      <Plus size={16} color="#6B7280" />
                    </button>
                  );
                })}
              </div>
            )}
            {query && results.length === 0 && (
              <div className="grow-in" style={{ position: "absolute", top: "calc(100% + 8px)", left: 0, right: 0, background: "#1E232B", border: "1px solid #2A303A", borderRadius: 14, padding: "14px", zIndex: 10 }}>
                <p style={{ fontSize: 13.5, color: "#6B7280", margin: "0 0 10px" }}>Aucun produit trouvé pour « {query} »</p>
                <button
                  onClick={addCustomFromSearch}
                  style={{ width: "100%", display: "flex", alignItems: "center", justifyContent: "center", gap: 6, padding: "10px 12px", borderRadius: 10, border: "1px dashed #3A4150", background: "transparent", color: "#9CA3AF", fontWeight: 600, fontSize: 13, cursor: "pointer" }}
                >
                  <Plus size={14} /> Ajouter « {query} » comme article personnalisé
                </button>
              </div>
            )}
          </div>
        )}

        {tab === "liste" &&
          (grouped.length === 0 ? (
            <div style={{ textAlign: "center", padding: "48px 16px", color: "#4B5563" }}>
              <div style={{ fontSize: 38, marginBottom: 10 }}>🧺</div>
              <p style={{ fontSize: 14, margin: 0, lineHeight: 1.5 }}>Cherchez un produit ci-dessus pour<br />commencer votre liste.</p>
            </div>
          ) : (
            grouped.map((cat) => (
              <section key={cat.key} style={{ marginBottom: 26 }}>
                <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 12 }}>
                  <span style={{ width: 9, height: 9, borderRadius: "50%", background: cat.accent, flexShrink: 0 }} />
                  <h2 style={{ fontSize: 15, fontWeight: 700, margin: 0, color: "#E5E3DD" }}>{cat.label}</h2>
                  <span style={{ fontSize: 12, color: "#5B6270", fontWeight: 600 }}>{cat.entries.length}</span>
                </div>
                <div style={{ display: "grid", gridTemplateColumns: "repeat(3, 1fr)", gap: 10 }}>
                  {cat.entries.map(({ item, product }) => (
                    <ItemCard key={item.listId} item={item} product={product} onEdit={() => openEditModal(item.listId)} onQuickTap={() => removeFromList(item.listId)} />
                  ))}
                </div>
              </section>
            ))
          ))}

        {tab === "tous" && (
          <>
            <button
              onClick={openNewProductModal}
              style={{ width: "100%", padding: "13px 16px", borderRadius: 12, border: "1px dashed #3A4150", background: "transparent", color: "#9CA3AF", fontWeight: 600, fontSize: 14, cursor: "pointer", display: "flex", alignItems: "center", justifyContent: "center", gap: 8, marginBottom: 20 }}
            >
              <Plus size={16} /> Nouvel article
            </button>
            {allGrouped.map((cat) => {
              const isCollapsed = !!collapsedCats[cat.key];
              return (
                <section key={cat.key} style={{ marginBottom: 26 }}>
                  <div
                    onClick={() => toggleCatCollapsed(cat.key)}
                    style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: isCollapsed ? 0 : 12, cursor: "pointer", userSelect: "none" }}
                  >
                    <span style={{ width: 9, height: 9, borderRadius: "50%", background: cat.accent, flexShrink: 0 }} />
                    <h2 style={{ fontSize: 15, fontWeight: 700, margin: 0, color: "#E5E3DD" }}>{cat.label}</h2>
                    <span style={{ fontSize: 12, color: "#5B6270", fontWeight: 600 }}>{cat.products.length}</span>
                    <ChevronLeft
                      size={16}
                      color="#5B6270"
                      style={{ marginLeft: "auto", transform: isCollapsed ? "rotate(180deg)" : "rotate(-90deg)", transition: "transform 0.15s" }}
                    />
                  </div>
                  {!isCollapsed && (
                    <div style={{ display: "grid", gridTemplateColumns: "repeat(4, 1fr)", gap: 8 }}>
                      {cat.products.map((p) => (
                        <ProductTile key={p.id} product={p} cat={cat} onTap={() => openAddModal(p)} onLongPress={() => openEditProductModal(p)} />
                      ))}
                    </div>
                  )}
                </section>
              );
            })}
          </>
        )}

        {tab === "recettes" && (
          recipeEditing ? (
            <RecipeEditor draft={recipeEditing} onCancel={() => setRecipeEditing(null)} onSave={saveRecipe} products={products} />
          ) : (
            <>
              <button
                onClick={() => setRecipeEditing({})}
                style={{ width: "100%", padding: "13px 16px", borderRadius: 12, border: "1px dashed #3A4150", background: "transparent", color: "#9CA3AF", fontWeight: 600, fontSize: 14, cursor: "pointer", display: "flex", alignItems: "center", justifyContent: "center", gap: 8, marginBottom: 20 }}
              >
                <Plus size={16} /> Nouvelle recette
              </button>

              {recipes.length === 0 ? (
                <div style={{ textAlign: "center", padding: "40px 16px", color: "#4B5563" }}>
                  <div style={{ fontSize: 38, marginBottom: 10 }}>📖</div>
                  <p style={{ fontSize: 14, margin: 0, lineHeight: 1.5 }}>Créez votre première recette<br />avec ses ingrédients.</p>
                </div>
              ) : (
                recipes.map((r) => (
                  <RecipeCard key={r.id} recipe={r} onOpen={() => setRecipeEditing(r)} onAddToList={addRecipeToList} products={products} />
                ))
              )}
            </>
          )
        )}
      </div>

      {modalProduct && (
        <ItemModal
          product={modalProduct}
          initial={editingListId ? list.find((l) => l.listId === editingListId) : null}
          onClose={() => { setModalProduct(null); setEditingListId(null); }}
          onConfirm={confirmModal}
          onDelete={editingListId ? deleteFromModal : null}
        />
      )}

      {productModal && (
        <ProductEditModal
          mode={productModal.mode}
          product={productModal.product}
          onClose={closeProductModal}
          onSave={saveProductModal}
          onDelete={productModal.mode === "edit" ? deleteFromProductModal : null}
        />
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);

</script>
</body>
</html>
