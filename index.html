  return (
    <div onClick={onClose} style={{ position: "fixed", inset: 0, background: "rgba(10,12,15,0.6)", display: "flex", alignItems: "flex-end", justifyContent: "center", zIndex: 80 }}>
      <div onClick={(e) => e.stopPropagation()} style={{ width: "100%", maxWidth: 480, maxHeight: "85vh", overflowY: "auto", background: "#1E232B", borderTop: "1px solid #2A303A", borderRadius: "20px 20px 0 0", padding: "20px 20px 28px", color: "#F5F3EE" }}>
        <div style={{ display: "flex", alignItems: "center", gap: 12, marginBottom: 18 }}>
          <span style={{ fontSize: 17, fontWeight: 700 }}>🏠 Mon foyer</span>
          <button onClick={onClose} style={{ marginLeft: "auto", background: "#2A303A", border: "none", borderRadius: "50%", width: 30, height: 30, color: "#9CA3AF", cursor: "pointer", display: "flex", alignItems: "center", justifyContent: "center" }}>
            <X size={15} />
          </button>
        </div>

        <label style={labelStyle}>Nom du foyer actuel</label>
        <div style={{ display: "flex", gap: 8, marginTop: 8, marginBottom: 18 }}>
          <input style={fieldStyle} value={nameInput} onChange={(e) => setNameInput(e.target.value)} />
          <button style={smallBtn} onClick={async () => { const ok = await onRename(nameInput.trim()); setStatus(ok ? "✓ Renommé" : "❌ Erreur"); }}>OK</button>
        </div>

        <label style={labelStyle}>Membres</label>
        <div style={{ display: "flex", flexDirection: "column", gap: 8, margin: "8px 0 20px" }}>
          {profiles.length === 0 ? (
            <p style={{ color: "#5B6270", fontSize: 13.5, margin: 0 }}>Personne d'autre pour l'instant.</p>
          ) : profiles.map((p) => (
            <div key={p.id} style={{ display: "flex", alignItems: "center", gap: 10, background: "#14171C", border: "1px solid #2A303A", borderRadius: 12, padding: "10px 14px" }}>
              <span style={{ width: 30, height: 30, borderRadius: "50%", background: "#6B9B5E26", color: "#6B9B5E", display: "flex", alignItems: "center", justifyContent: "center", fontWeight: 700, fontSize: 13, flexShrink: 0 }}>
                {(p.pseudo || "?").slice(0, 1).toUpperCase()}
              </span>
              <span style={{ fontSize: 14, fontWeight: 600 }}>{p.pseudo || "Sans pseudo"}</span>
              {p.id === myId && <span style={{ marginLeft: "auto", fontSize: 11.5, color: "#6B9B5E", fontWeight: 600 }}>Toi</span>}
            </div>
          ))}
        </div>

        <label style={labelStyle}>Inviter quelqu'un</label>
        <p style={{ fontSize: 12.5, color: "#6B7280", margin: "6px 0 8px" }}>Ce lien connecte directement la personne à ce foyer (elle doit avoir un compte).</p>
        <button
          onClick={() => { navigator.clipboard?.writeText(inviteLink); setStatus("🔗 Lien copié !"); }}
          style={{ width: "100%", padding: "12px", borderRadius: 10, border: "1px solid #2A303A", background: "transparent", color: "#F5F3EE", fontWeight: 600, fontSize: 13.5, cursor: "pointer", marginBottom: 20 }}
        >
          📋 Copier le lien d'invitation
        </button>

        {myHouseholds.length > 1 && (
          <>
            <label style={labelStyle}>Passer à un autre foyer</label>
            <div style={{ display: "flex", flexDirection: "column", gap: 8, margin: "8px 0 20px" }}>
              {myHouseholds.map((h) => (
                <button
                  key={h.id}
                  onClick={() => onSwitch(h.id)}
                  disabled={h.id === currentHouseholdId}
                  style={{ textAlign: "left", padding: "11px 14px", borderRadius: 10, border: `1px solid ${h.id === currentHouseholdId ? "#6B9B5E" : "#2A303A"}`, background: h.id === currentHouseholdId ? "#6B9B5E26" : "transparent", color: h.id === currentHouseholdId ? "#6B9B5E" : "#F5F3EE", fontWeight: 600, fontSize: 13.5, cursor: h.id === currentHouseholdId ? "default" : "pointer" }}
                >
                  {h.name} {h.id === currentHouseholdId ? " · actif" : ""}
                </button>
              ))}
            </div>
          </>
        )}

        <hr style={{ border: "none", borderTop: "1px solid #2A303A", margin: "0 0 18px" }} />

        <label style={labelStyle}>Rejoindre un autre foyer</label>
        <div style={{ display: "flex", gap: 8, marginTop: 8, marginBottom: 20 }}>
          <input style={fieldStyle} value={joinCode} onChange={(e) => setJoinCode(e.target.value)} placeholder="Code du foyer" />
          <button style={smallBtn} onClick={async () => { const ok = await onJoin(joinCode.trim()); setStatus(ok ? "✓ Foyer rejoint" : "❌ Code invalide"); if (ok) setJoinCode(""); }}>Rejoindre</button>
        </div>

        <label style={labelStyle}>Créer un nouveau foyer indépendant</label>
        <div style={{ display: "flex", gap: 8, marginTop: 8 }}>
          <input style={fieldStyle} value={newName} onChange={(e) => setNewName(e.target.value)} placeholder="Nom du nouveau foyer" />
          <button style={smallBtn} onClick={async () => { const ok = await onCreate(newName.trim()); setStatus(ok ? "✓ Foyer créé" : "❌ Erreur"); if (ok) setNewName(""); }}>Créer</button>
        </div>

        {status && <p style={{ fontSize: 12.5, color: status.startsWith("✓") || status.startsWith("🔗") ? "#6B9B5E" : "#C4574A", marginTop: 16 }}>{status}</p>}

        <hr style={{ border: "none", borderTop: "1px solid #2A303A", margin: "22px 0 16px" }} />
        <label style={{ ...labelStyle, color: "#C4574A" }}>Zone dangereuse</label>
        {!confirmDelete ? (
          <button
            onClick={() => setConfirmDelete(true)}
            style={{ width: "100%", padding: "12px", borderRadius: 10, border: "1px solid #C4574A55", background: "transparent", color: "#C4574A", fontWeight: 600, fontSize: 13.5, cursor: "pointer", marginTop: 10 }}
          >
            🗑️ Supprimer ce foyer
          </button>
        ) : (
          <div style={{ marginTop: 10, background: "#2A1414", border: "1px solid #C4574A55", borderRadius: 10, padding: 14 }}>
            <p style={{ fontSize: 12.5, color: "#F5F3EE", margin: "0 0 12px", lineHeight: 1.5 }}>
              Supprimer "{householdName}" effacera la liste, les recettes et l'accès pour tous ses membres, définitivement. Continuer ?
            </p>
            <div style={{ display: "flex", gap: 8 }}>
              <button onClick={() => setConfirmDelete(false)} style={{ flex: 1, padding: "10px", borderRadius: 8, border: "1px solid #2A303A", background: "transparent", color: "#F5F3EE", fontWeight: 600, fontSize: 13, cursor: "pointer" }}>Annuler</button>
              <button
                onClick={async () => { const ok = await onDelete(); if (!ok) { setStatus("❌ Erreur"); setConfirmDelete(false); } }}
                style={{ flex: 1, padding: "10px", borderRadius: 8, border: "none", background: "#C4574A", color: "#14171C", fontWeight: 700, fontSize: 13, cursor: "pointer" }}
              >
                Oui, supprimer
              </button>
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

// --- Racine : gère l'auth, les foyers, le chargement et la synchro temps réel

function Root() {
  const [session, setSession] = useState(undefined); // undefined = vérification en cours, null = pas connecté
  const [loginLoading, setLoginLoading] = useState(false);
  const [loginError, setLoginError] = useState("");
  const [householdError, setHouseholdError] = useState("");
  const [pendingJoinCode, setPendingJoinCode] = useState(() => getJoinCodeFromUrl());
  const [myHouseholds, setMyHouseholds] = useState([]);
  const [currentHouseholdId, setCurrentHouseholdId] = useState(null);
  const [householdsReady, setHouseholdsReady] = useState(false);
  const [pseudo, setPseudo] = useState("");
  const [profiles, setProfiles] = useState([]);
  const [initialData, setInitialData] = useState(null);
  const [remoteData, setRemoteData] = useState(null);
  const [remoteVersion, setRemoteVersion] = useState(0);
  const [showAccount, setShowAccount] = useState(false);
  const [showFoyer, setShowFoyer] = useState(false);
  const [showOptions, setShowOptions] = useState(false);
  const saveTimer = useRef(null);

  useEffect(() => {
    sb.auth.getSession().then(({ data }) => setSession(data.session ?? null));
    const { data: sub } = sb.auth.onAuthStateChange((_event, s) => setSession(s));
    return () => sub.subscription.unsubscribe();
  }, []);

  const loadMyHouseholds = async (uid) => {
    const { data: memberships } = await sb.from("courses_household_members").select("household_id").eq("user_id", uid);
    const ids = (memberships || []).map((m) => m.household_id);
    if (!ids.length) { setMyHouseholds([]); return []; }
    const { data: households } = await sb.from("courses_households").select("id, name").in("id", ids);
    const list = (households || []).map((h) => ({ id: h.id, name: h.name || "Foyer" }));
    setMyHouseholds(list);
    return list;
  };

  const joinHousehold = async (uid, householdId) => {
    const { data: hh } = await sb.from("courses_households").select("id").eq("id", householdId).maybeSingle();
    if (!hh) return false;
    await sb.from("courses_household_members").insert({ household_id: householdId, user_id: uid });
    return true;
  };

  const refreshProfiles = async (householdId) => {
    if (!householdId) return;
    const { data: members } = await sb.from("courses_household_members").select("user_id").eq("household_id", householdId);
    const ids = (members || []).map((m) => m.user_id);
    if (!ids.length) { setProfiles([]); return; }
    const { data: rows } = await sb.from("courses_profiles").select("id, pseudo").in("id", ids).order("pseudo");
    setProfiles(rows || []);
  };

  // Détermine le foyer actif après connexion : lien d'invitation > foyer mémorisé > premier disponible
  useEffect(() => {
    if (!session) return;
    let cancelled = false;
    (async () => {
      const uid = session.user.id;
      let joinedId = null;
      let storedCode = null;
      try { storedCode = localStorage.getItem("courses_pending_code"); } catch (e) {}
      const codeToUse = pendingJoinCode || storedCode;
      if (codeToUse) {
        const ok = await joinHousehold(uid, codeToUse);
        if (ok) joinedId = codeToUse;
        history.replaceState(null, "", location.pathname);
        setPendingJoinCode("");
        try { localStorage.removeItem("courses_pending_code"); } catch (e) {}
      }
      const households = await loadMyHouseholds(uid);
      if (cancelled) return;
      if (!households.length) {
        setCurrentHouseholdId(null);
        setHouseholdsReady(true);
        return;
      }
      const stored = joinedId || getStoredHouseholdId();
      const match = households.find((h) => h.id === stored);
      const active = match ? match.id : households[0].id;
      setStoredHouseholdId(active);
      setCurrentHouseholdId(active);
      setHouseholdsReady(true);
    })();
    return () => { cancelled = true; };
  }, [session?.user?.id]);

  // Pseudo global de l'utilisateur (indépendant du foyer)
  useEffect(() => {
    if (!session) return;
    (async () => {
      const { data: profileRow } = await sb.from("courses_profiles").select("pseudo").eq("id", session.user.id).maybeSingle();
      let finalPseudo = profileRow?.pseudo;
      if (!finalPseudo) {
        let pending = null;
        try { pending = localStorage.getItem("courses_pending_pseudo"); } catch (e) {}
        finalPseudo = pending || session.user.email.split("@")[0];
        await sb.from("courses_profiles").upsert({ id: session.user.id, pseudo: finalPseudo, updated_at: new Date().toISOString() });
        // Première connexion (compte tout juste créé via le lien magique) : on fixe le mot de
        // passe interne générique, pour que les connexions suivantes n'aient plus besoin d'email.
        await sb.auth.updateUser({ password: GENERIC_PASSWORD });
      }
      try { localStorage.removeItem("courses_pending_pseudo"); } catch (e) {}
      setPseudo(finalPseudo);
    })();
  }, [session?.user?.id]);

  // Chargement des données du foyer actif (avec repli hors-ligne sur le cache local si Supabase est injoignable)
  const [offline, setOffline] = useState(false);
  useEffect(() => {
    if (!session || !currentHouseholdId) return;
    let cancelled = false;
    setInitialData(null);
    setOffline(false);
    (async () => {
      try {
        const { data: dataRow, error } = await sb.from("courses_data").select("*").eq("household_id", currentHouseholdId).maybeSingle();
        if (error) throw error;
        if (!dataRow) {
          await sb.from("courses_data").insert({ household_id: currentHouseholdId });
          if (!cancelled) setInitialData(emptyData);
        } else if (!cancelled) {
          setInitialData(rowToData(dataRow));
        }
        await refreshProfiles(currentHouseholdId);
      } catch (e) {
        // Pas de réseau / Supabase injoignable : on retombe sur la dernière copie connue en local (lecture seule)
        if (cancelled) return;
        try {
          const cached = JSON.parse(localStorage.getItem("courses_cache_" + currentHouseholdId) || "null");
          setInitialData(cached || emptyData);
        } catch (e2) { setInitialData(emptyData); }
        setOffline(true);
      }
    })();
    return () => { cancelled = true; };
  }, [session?.user?.id, currentHouseholdId]);

  // Abonnement temps réel scopé au foyer actif
  useEffect(() => {
    if (!session || !currentHouseholdId) return;
    const channel = sb
      .channel("courses_sync_" + currentHouseholdId)
      .on("postgres_changes", { event: "UPDATE", schema: "public", table: "courses_data", filter: `household_id=eq.${currentHouseholdId}` }, (payload) => {
        if (payload.new.updated_by === session.user.id) return;
        setRemoteData(rowToData(payload.new));
        setRemoteVersion((v) => v + 1);
      })
      .on("postgres_changes", { event: "*", schema: "public", table: "courses_household_members", filter: `household_id=eq.${currentHouseholdId}` }, () => {
        refreshProfiles(currentHouseholdId);
      })
      .on("postgres_changes", { event: "UPDATE", schema: "public", table: "courses_households", filter: `id=eq.${currentHouseholdId}` }, (payload) => {
        setMyHouseholds((hs) => hs.map((h) => (h.id === payload.new.id ? { ...h, name: payload.new.name } : h)));
      })
      .subscribe();
    return () => { sb.removeChannel(channel); };
  }, [session?.user?.id, currentHouseholdId]);

  const GENERIC_PASSWORD = "123456"; // mot de passe interne unique à tous les comptes — évite de renvoyer un email à chaque connexion

  const handleLoginNew = async ({ email, pseudo: typedPseudo, code }) => {
    setLoginLoading(true);
    setLoginError("");
    // Le pseudo et le code foyer sont tapés maintenant, mais ne serviront qu'après que
    // la personne ait cliqué le lien reçu par email (nouvelle page, nouvel état JS) —
    // on les garde donc de côté le temps de cet aller-retour.
    try {
      if (typedPseudo && typedPseudo.trim()) localStorage.setItem("courses_pending_pseudo", typedPseudo.trim());
      if (code && code.trim()) localStorage.setItem("courses_pending_code", code.trim());
    } catch (e) {}
    const { error } = await sb.auth.signInWithOtp({
      email,
      options: { emailRedirectTo: window.location.origin + window.location.pathname },
    });
    setLoginLoading(false);
    if (error) {
      setLoginError(error.message || "Impossible d'envoyer le lien de connexion.");
      return false;
    }
    return true;
  };

  const handleLoginExisting = async ({ email }) => {
    setLoginLoading(true);
    setLoginError("");
    const { error } = await sb.auth.signInWithPassword({ email, password: GENERIC_PASSWORD });
    setLoginLoading(false);
    if (error) {
      setLoginError("Compte introuvable. Si c'est ta première connexion, utilise \"Nouvel utilisateur ?\" ci-dessous.");
      return false;
    }
    return true;
  };

  const handleCreateHousehold = async (name) => {
    if (!session) return false;
    const { data: hh, error } = await sb.from("courses_households").insert({ name: name || "Nouveau foyer" }).select().single();
    if (error) { setHouseholdError(error.message); return false; }
    await sb.from("courses_household_members").insert({ household_id: hh.id, user_id: session.user.id });
    await loadMyHouseholds(session.user.id);
    setStoredHouseholdId(hh.id);
    setCurrentHouseholdId(hh.id);
    setShowFoyer(false);
    return true;
  };

  const handleJoinHousehold = async (code) => {
    if (!session || !code) return false;
    const ok = await joinHousehold(session.user.id, code);
    if (!ok) { setHouseholdError("Code introuvable."); return false; }
    await loadMyHouseholds(session.user.id);
    setStoredHouseholdId(code);
    setCurrentHouseholdId(code);
    setShowFoyer(false);
    return true;
  };

  const handleSwitchHousehold = (id) => {
    setStoredHouseholdId(id);
    setCurrentHouseholdId(id);
    setShowFoyer(false);
  };

  const handleRenameHousehold = async (name) => {
    if (!name || !currentHouseholdId) return false;
    const { error } = await sb.from("courses_households").update({ name }).eq("id", currentHouseholdId);
    if (!error) setMyHouseholds((hs) => hs.map((h) => (h.id === currentHouseholdId ? { ...h, name } : h)));
    return !error;
  };

  // Supprime définitivement le foyer actif (cascade : membres + données + le foyer lui-même).
  // Bascule automatiquement sur un autre foyer restant, ou vers l'écran "créer/rejoindre" s'il n'en reste aucun.
  const handleDeleteHousehold = async () => {
    if (!currentHouseholdId) return false;
    const { error } = await sb.from("courses_households").delete().eq("id", currentHouseholdId);
    if (error) return false;
    try { localStorage.removeItem("courses_cache_" + currentHouseholdId); } catch (e) {}
    const remaining = myHouseholds.filter((h) => h.id !== currentHouseholdId);
    setMyHouseholds(remaining);
    if (remaining.length) {
      setStoredHouseholdId(remaining[0].id);
      setCurrentHouseholdId(remaining[0].id);
    } else {
      try { localStorage.removeItem("courses_active_household_id"); } catch (e) {}
      setCurrentHouseholdId(null);
    }
    setShowFoyer(false);
    return true;
  };

  const handleSavePseudo = async (newPseudo) => {
    if (!newPseudo || !session) return false;
    const { error } = await sb.from("courses_profiles").upsert({ id: session.user.id, pseudo: newPseudo, updated_at: new Date().toISOString() });
    if (!error) { setPseudo(newPseudo); refreshProfiles(currentHouseholdId); }
    return !error;
  };

  const handleLogout = async () => {
    await sb.auth.signOut();
    setInitialData(null);
    setRemoteData(null);
    setCurrentHouseholdId(null);
    setHouseholdsReady(false);
    setShowAccount(false);
  };

  const lastLocalData = useRef(null);

  const pushToSupabase = async (householdId, data, userId) => {
    return sb.from("courses_data").upsert({
      household_id: householdId,
      list: data.list,
      recipes: data.recipes,
      custom_products: data.customProducts,
      product_overrides: data.productOverrides,
      deleted_product_ids: data.deletedProductIds,
      updated_at: new Date().toISOString(),
      updated_by: userId,
    }, { onConflict: "household_id" });
  };

  const handleDataChange = (data) => {
    if (!session || !currentHouseholdId) return;
    lastLocalData.current = data;
    // Cache local immédiat (lecture de secours hors-ligne) — indépendant de la synchro Supabase
    try { localStorage.setItem("courses_cache_" + currentHouseholdId, JSON.stringify(data)); } catch (e) {}
    if (saveTimer.current) clearTimeout(saveTimer.current);
    saveTimer.current = setTimeout(async () => {
      const { error } = await pushToSupabase(currentHouseholdId, data, session.user.id);
      setOffline(!!error);
    }, 350);
  };

  // Dès que la connexion revient, retente d'envoyer la dernière version locale connue
  useEffect(() => {
    const onOnline = async () => {
      if (!session || !currentHouseholdId || !lastLocalData.current) return;
      const { error } = await pushToSupabase(currentHouseholdId, lastLocalData.current, session.user.id);
      if (!error) setOffline(false);
    };
    window.addEventListener("online", onOnline);
    return () => window.removeEventListener("online", onOnline);
  }, [session?.user?.id, currentHouseholdId]);

  if (session === undefined) {
    return <div style={{ background: "#14171C", minHeight: "100vh" }} />;
  }
  if (session === null) {
    return <LoginScreen onLoginExisting={handleLoginExisting} onLoginNew={handleLoginNew} loading={loginLoading} error={loginError} initialCode={pendingJoinCode} />;
  }
  if (!householdsReady) {
    return <div style={{ background: "#14171C", minHeight: "100vh", color: "#6B7280", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 14 }}>Chargement…</div>;
  }
  if (!currentHouseholdId) {
    return <HouseholdScreen onCreate={handleCreateHousehold} onJoin={handleJoinHousehold} error={householdError} />;
  }
  if (!initialData) {
    return <div style={{ background: "#14171C", minHeight: "100vh", color: "#6B7280", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 14 }}>Chargement du foyer…</div>;
  }

  const currentHousehold = myHouseholds.find((h) => h.id === currentHouseholdId);
  const inviteLink = location.origin + location.pathname + "#foyer=" + currentHouseholdId;

  return (
    <div style={{ background: "#14171C", minHeight: "100vh", color: "#F5F3EE" }}>
      {offline && (
        <div style={{ background: "#3A2A10", color: "#F7C44F", fontSize: 12.5, fontWeight: 600, textAlign: "center", padding: "8px 12px" }}>
          ⚠️ Hors-ligne — tes changements sont gardés sur cet appareil et seront envoyés dès que la connexion revient
        </div>
      )}
      <div style={{ display: "flex", justifyContent: "space-between", gap: 6, padding: "10px 14px 0", maxWidth: 480, margin: "0 auto" }}>
        <button onClick={() => setShowOptions(true)} title="Options" style={{ background: "#1E232B", border: "1px solid #2A303A", borderRadius: 10, width: 34, height: 34, color: "#9CA3AF", cursor: "pointer", fontSize: 15 }}>🛠️</button>
        <div style={{ display: "flex", gap: 6 }}>
          <button onClick={() => setShowFoyer(true)} title="Mon foyer" style={{ background: "#1E232B", border: "1px solid #2A303A", borderRadius: 10, width: 34, height: 34, color: "#9CA3AF", cursor: "pointer", fontSize: 15 }}>🏠</button>
          <button onClick={() => setShowAccount(true)} title="Mon compte" style={{ background: "#1E232B", border: "1px solid #2A303A", borderRadius: 10, width: 34, height: 34, color: "#9CA3AF", cursor: "pointer", fontSize: 15 }}>👤</button>
        </div>
      </div>

      <App key={currentHouseholdId} initialData={initialData} remoteData={remoteData} remoteVersion={remoteVersion} onDataChange={handleDataChange} householdName={currentHousehold?.name} optionsOpen={showOptions} onCloseOptions={() => setShowOptions(false)} />

      {showAccount && (
        <AccountModal
          email={session.user.email}
          pseudo={pseudo}
          onClose={() => setShowAccount(false)}
          onSavePseudo={handleSavePseudo}
          onLogout={handleLogout}
        />
      )}
      {showFoyer && (
        <FoyerModal
          householdName={currentHousehold?.name}
          profiles={profiles}
          myId={session.user.id}
          myHouseholds={myHouseholds}
          currentHouseholdId={currentHouseholdId}
          inviteLink={inviteLink}
          onClose={() => setShowFoyer(false)}
          onRename={handleRenameHousehold}
          onSwitch={handleSwitchHousehold}
          onCreate={handleCreateHousehold}
          onJoin={handleJoinHousehold}
          onDelete={handleDeleteHousehold}
        />
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<Root />);

</script>
</body>
</html>
