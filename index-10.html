<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; background: #FBF7EA; }
  #root { min-height: 100vh; }
  #boot-error { display:none; color:#23262E; font-family:-apple-system,sans-serif; padding:24px; max-width:480px; margin:0 auto; }
</style>
<script>
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => navigator.serviceWorker.register('sw.js'));
}
window.addEventListener('error', function (e) {
  var el = document.getElementById('boot-error');
  var root = document.getElementById('root');
  if (root && !root.hasChildNodes() && el) {
    el.style.display = 'block';
    el.querySelector('#boot-error-msg').textContent = (e && e.message) || 'Erreur inconnue';
  }
});
</script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.3.1/umd/react.production.min.js" crossorigin></script>

<div id="root"></div>
<div id="boot-error">

  <p style="opacity:.6;font-size:.8em" id="boot-error-msg"></p>
</div>

// navigateur, pour pouvoir la déclencher plus tard depuis le bouton dans Options.
// Sur iOS, cet événement n'existe pas du tout (Apple ne l'expose pas) — géré séparément.
let deferredInstallPrompt = null;
window.addEventListener("beforeinstallprompt", (e) => {
  e.preventDefault();
  deferredInstallPrompt = e;
});

  return (
    <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color}
      strokeWidth={strokeWidth} strokeLinecap="round" strokeLinejoin="round" style={style}>
      {children}
    </svg>

}

// Affiche l'icône d'un produit : un emoji texte, ou une image importée localement (data URL).
function IconGlyph({ icon, size = 20, style }) {
  if (typeof icon === "string" && icon.startsWith("data:image")) {
    return <img src={icon} alt="" style={{ width: size, height: size, objectFit: "contain", borderRadius: 4, display: "inline-block", verticalAlign: "middle", ...style }} />;
  }
  return <span style={{ fontSize: size, lineHeight: 1, ...style }}>{icon}</span>;

// Normalise pour une recherche insensible aux accents / ligatures (ex: "boeuf" trouve "bœuf")
function normalize(str) {
  return String(str)
    .toLowerCase()
    .replace(/œ/g, "oe")
    .replace(/æ/g, "ae")
    .normalize("NFD")
    .replace(/[\u0300-\u036f]/g, "");
}

// Un produit correspond à la recherche si son nom OU l'un de ses sous-produits/variétés correspond
// (ex : taper "patates" trouve "Pomme de terre" si "Patates" est enregistré comme sous-produit).
function productMatchesQuery(product, normalizedQuery) {
  if (normalize(product.name).includes(normalizedQuery)) return true;
  return (product.variants || []).some((v) => normalize(v.name).includes(normalizedQuery));
}

const DEFAULT_PALETTE = { primary: "#FBF7EA", accent: "#4E9D5B" };

function hexToRgb(hex) {
  const h = hex.replace("#", "");
  const full = h.length === 3 ? h.split("").map((c) => c + c).join("") : h;
  const bigint = parseInt(full, 16) || 0;
  return [(bigint >> 16) & 255, (bigint >> 8) & 255, bigint & 255];
}
function rgbToHex([r, g, b]) {
  const clamp = (v) => Math.max(0, Math.min(255, Math.round(v)));
  return "#" + [r, g, b].map((v) => clamp(v).toString(16).padStart(2, "0")).join("");
}
function mixColor(hex, target, amount) {
  const [r, g, b] = hexToRgb(hex);
  const [tr, tg, tb] = target;
  return rgbToHex([r + (tr - r) * amount, g + (tg - g) * amount, b + (tb - b) * amount]);
}
const lightenColor = (hex, amount) => mixColor(hex, [255, 255, 255], amount);
const darkenColor = (hex, amount) => mixColor(hex, [0, 0, 0], amount);
function hexToRgba(hex, alpha) {
  const [r, g, b] = hexToRgb(hex);
  return `rgba(${r}, ${g}, ${b}, ${alpha})`;
}
function hexToHsv(hex) {
  const [r0, g0, b0] = hexToRgb(hex);
  const r = r0 / 255, g = g0 / 255, b = b0 / 255;
  const max = Math.max(r, g, b), min = Math.min(r, g, b);
  const d = max - min;
  let h = 0;
  if (d !== 0) {
    if (max === r) h = 60 * (((g - b) / d) % 6);
    else if (max === g) h = 60 * ((b - r) / d + 2);
    else h = 60 * ((r - g) / d + 4);
  }
  if (h < 0) h += 360;
  const s = max === 0 ? 0 : (d / max) * 100;
  const v = max * 100;
  return { h, s, v };
}
function hsvToHex(h, s, v) {
  const S = s / 100, V = v / 100;
  const c = V * S;
  const x = c * (1 - Math.abs(((h / 60) % 2) - 1));
  const m = V - c;
  let r, g, b;
  if (h < 60) [r, g, b] = [c, x, 0];
  else if (h < 120) [r, g, b] = [x, c, 0];
  else if (h < 180) [r, g, b] = [0, c, x];
  else if (h < 240) [r, g, b] = [0, x, c];
  else if (h < 300) [r, g, b] = [x, 0, c];
  else [r, g, b] = [c, 0, x];
  return rgbToHex([(r + m) * 255, (g + m) * 255, (b + m) * 255]);
}

// --- Prix -------------------------------------------------------------------

function formatEuro(n) {
  return `${n.toFixed(2).replace(".", ",")} €`;
}

// Libellé court affiché sur une tuile produit : "1,76 €/paquet" et/ou "4,99 €/kg"
function formatProductPrice(product) {
  const parts = [];
  if (product.priceUnit != null && product.priceUnit !== "") parts.push(`${formatEuro(Number(product.priceUnit))}/paquet`);
  if (product.priceKg != null && product.priceKg !== "") parts.push(`${formatEuro(Number(product.priceKg))}/kg`);
  return parts.length ? parts.join(" · ") : null;
}

// Estime le coût d'un article de la liste : prix au kg × qty si l'unité choisie est "kg",
// prix à l'unité × qty si l'unité choisie est "paquet". Renvoie null si le prix correspondant est inconnu.
function estimateItemPrice(item, product) {
  if (!product) return null;
  if (item.unit === "kg") {
    if (product.priceKg == null || product.priceKg === "") return null;
    const p = Number(product.priceKg);
    return Number.isNaN(p) ? null : item.qty * p;
  }
  if (item.unit === "paquet") {
    if (product.priceUnit != null && product.priceUnit !== "") {
      const p = Number(product.priceUnit);
      return Number.isNaN(p) ? null : item.qty * p;
    }
    // Pas de prix à l'unité connu : si un poids par article et un prix au kg sont renseignés,
    // on estime le prix à partir de ces deux valeurs (ex : tomate à 5 €/kg, article de 100 g → 0,50 €/article).
    if (product.priceKg != null && product.priceKg !== "" && product.weight != null && product.weight !== "") {
      const pk = Number(product.priceKg);
      const w = Number(product.weight);
      if (!Number.isNaN(pk) && !Number.isNaN(w) && w > 0) return item.qty * pk * (w / 1000);
    }
    return null;
  }
  return null;
}

// Estime le coût total d'une recette (somme des ingrédients dont le prix est connu et l'unité compatible)
function estimateRecipeTotal(ingredients, products) {
  let total = 0;
  let hasAny = false;
  (ingredients || []).forEach((item) => {
    const p = products.find((pr) => pr.id === item.productId);
    const est = estimateItemPrice(item, p);
    if (est != null) { total += est; hasAny = true; }
  });
  return hasAny ? total : null;
}

// scannable à partir des chiffres imprimés sous le code-barres.
const EAN_L = { "0": "0001101", "1": "0011001", "2": "0010011", "3": "0111101", "4": "0100011", "5": "0110001", "6": "0101111", "7": "0111011", "8": "0110111", "9": "0001011" };
const EAN_G = { "0": "0100111", "1": "0110011", "2": "0011011", "3": "0100001", "4": "0011101", "5": "0111001", "6": "0000101", "7": "0010001", "8": "0001001", "9": "0010111" };
const EAN_R = { "0": "1110010", "1": "1100110", "2": "1101100", "3": "1000010", "4": "1011100", "5": "1001110", "6": "1010000", "7": "1000100", "8": "1001000", "9": "1110100" };
const EAN_PARITY = { "0": "LLLLLL", "1": "LLGLGG", "2": "LLGGLG", "3": "LLGGGL", "4": "LGLLGG", "5": "LGGLLG", "6": "LGGGLL", "7": "LGLGLG", "8": "LGLGGL", "9": "LGGLGL" };

function ean13CheckDigit(d12) {
  let sum = 0;
  for (let i = 0; i < 12; i++) sum += (i % 2 === 0 ? 1 : 3) * Number(d12[i]);
  const mod = sum % 10;
  return mod === 0 ? 0 : 10 - mod;
}
function ean8CheckDigit(d7) {
  let sum = 0;
  for (let i = 0; i < 7; i++) sum += (i % 2 === 0 ? 3 : 1) * Number(d7[i]);
  const mod = sum % 10;
  return mod === 0 ? 0 : 10 - mod;
}
function encodeEAN13(digits13) {
  const parity = EAN_PARITY[digits13[0]];
  let bin = "101";
  for (let i = 1; i <= 6; i++) bin += (parity[i - 1] === "L" ? EAN_L : EAN_G)[digits13[i]];
  bin += "01010";
  for (let i = 7; i <= 12; i++) bin += EAN_R[digits13[i]];
  bin += "101";
  return bin;
}
function encodeEAN8(digits8) {
  let bin = "101";
  for (let i = 0; i < 4; i++) bin += EAN_L[digits8[i]];
  bin += "01010";
  for (let i = 4; i < 8; i++) bin += EAN_R[digits8[i]];
  bin += "101";
  return bin;
}

// Table standard Code 128 (norme ISO/IEC 15417) — utilisée pour les codes numériques de
// longueur non standard (ni 7/8, ni 12/13 chiffres), très courante sur les cartes de fidélité
// type Intermarché. Chaque valeur (0-106) correspond à un motif de largeurs de barres/blancs :
// lettre majuscule = barre, minuscule = blanc, la lettre indiquant la largeur (a=1..d=4 modules).
const C128_PATTERNS = {
  "0":"BaBbBb","1":"BbBaBb","2":"BbBbBa","3":"AbAbBc","4":"AbAcBb","5":"AcAbBb",
  "6":"AbBbAc","7":"AbBcAb","8":"AcBbAb","9":"BbAbAc","10":"BbAcAb","11":"BcAbAb",
  "12":"AaBbCb","13":"AbBaCb","14":"AbBbCa","15":"AaCbBb","16":"AbCaBb","17":"AbCbBa",
  "18":"BbCbAa","19":"BbAaCb","20":"BbAbCa","21":"BaCbAb","22":"BbCaAb","23":"CaBaCa",
  "24":"CaAbBb","25":"CbAaBb","26":"CbAbBa","27":"CaBbAb","28":"CbBaAb","29":"CbBbAa",
  "30":"BaBaBc","31":"BaBcBa","32":"BcBaBa","33":"AaAcBc","34":"AcAaBc","35":"AcAcBa",
  "36":"AaBcAc","37":"AcBaAc","38":"AcBcAa","39":"BaAcAc","40":"BcAaAc","41":"BcAcAa",
  "42":"AaBaCc","43":"AaBcCa","44":"AcBaCa","45":"AaCaBc","46":"AaCcBa","47":"AcCaBa",
  "48":"CaCaBa","49":"BaAcCa","50":"BcAaCa","51":"BaCaAc","52":"BaCcAa","53":"BaCaCa",
  "54":"CaAaBc","55":"CaAcBa","56":"CcAaBa","57":"CaBaAc","58":"CaBcAa","59":"CcBaAa",
  "60":"CaDaAa","61":"BbAdAa","62":"DcAaAa","63":"AaAbBd","64":"AaAdBb","65":"AbAaBd",
  "66":"AbAdBa","67":"AdAaBb","68":"AdAbBa","69":"AaBbAd","70":"AaBdAb","71":"AbBaAd",
  "72":"AbBdAa","73":"AdBaAb","74":"AdBbAa","75":"BdAbAa","76":"BbAaAd","77":"DaCaAa",
  "78":"BdAaAb","79":"AcDaAa","80":"AaAbDb","81":"AbAaDb","82":"AbAbDa","83":"AaDbAb",
  "84":"AbDaAb","85":"AbDbAa","86":"DaAbAb","87":"DbAaAb","88":"DbAbAa","89":"BaBaDa",
  "90":"BaDaBa","91":"DaBaBa","92":"AaAaDc","93":"AaAcDa","94":"AcAaDa","95":"AaDaAc",
  "96":"AaDcAa","97":"DaAaAc","98":"DaAcAa","99":"AaCaDa","100":"AaDaCa","101":"CaAaDa",
  "102":"DaAaCa","103":"BaAdAb","104":"BaAbAd","105":"BaAbCb","106":"BcCaAaB",
};
function c128Decompose(values) {
  return values.map((v) => {
    const pat = C128_PATTERNS[String(v)];
    let bin = "";
    for (const ch of pat) {
      const isBar = ch === ch.toUpperCase();
      const width = ch.toLowerCase().charCodeAt(0) - 96; // a=1, b=2, c=3, d=4 modules
      bin += (isBar ? "1" : "0").repeat(width);
    }
    return bin;
  }).join("");
}
// Encode une suite de chiffres en Code 128 Set C (2 chiffres par symbole, le plus compact —
// c'est le format qu'utilisent la plupart des cartes de fidélité à code numérique long). Si le
// nombre de chiffres est impair, les chiffres pleins passent en Set C et le dernier bascule en
// Set B, exactement comme le font les générateurs de codes-barres standards.
function encodeCode128Numeric(digitsStr) {
  const START_C = 105, TO_B = 100, STOP = 106;
  const symbols = [];
  if (digitsStr.length % 2 === 0) {
    for (let i = 0; i < digitsStr.length; i += 2) symbols.push(Number(digitsStr.slice(i, i + 2)));
  } else {
    const evenPart = digitsStr.slice(0, -1);
    const lastDigit = digitsStr.slice(-1);
    for (let i = 0; i < evenPart.length; i += 2) symbols.push(Number(evenPart.slice(i, i + 2)));
    symbols.push(TO_B);
    symbols.push(16 + Number(lastDigit)); // valeur Set B d'un chiffre '0'-'9' = 16 + chiffre
  }
  const values = [START_C, ...symbols];
  let checksum = values[0];
  for (let i = 1; i < values.length; i++) checksum += i * values[i];
  checksum = checksum % 103;
  return c128Decompose([...values, checksum, STOP]);
}

// Normalise n'importe quelle suite de chiffres entrée à la main en un code-barres affichable :
// EAN-8/EAN-13 pour les longueurs standard (avec calcul automatique de la clé de contrôle),
// et Code 128 pour toute autre longueur — sans jamais tronquer le code, quelle que soit sa taille.
function normalizeBarcode(raw) {
  let digits = String(raw || "").replace(/\D/g, "");
  if (!digits) return null;
  if (digits.length === 7) digits += String(ean8CheckDigit(digits));
  if (digits.length === 8) return { digits, bin: encodeEAN8(digits) };
  if (digits.length === 12) digits += String(ean13CheckDigit(digits));
  if (digits.length === 13) return { digits, bin: encodeEAN13(digits) };
  return { digits, bin: encodeCode128Numeric(digits) };
}

// Rendu SVG du code-barres à partir de la chaîne de modules binaires (barres = "1", blancs = "0")
function BarcodeSvg({ code, height = 100 }) {
  const encoded = useMemo(() => normalizeBarcode(code), [code]);
  if (!encoded) return null;
  const n = encoded.bin.length;
  return (
    <svg viewBox={`0 0 ${n} 100`} preserveAspectRatio="none" style={{ width: "100%", height, display: "block" }}>
      <rect x={0} y={0} width={n} height={100} fill="#FFFFFF" />
      {encoded.bin.split("").map((b, i) => (b === "1" ? <rect key={i} x={i} y={0} width={1} height={100} fill="#14171C" /> : null))}
    </svg>
  );
}

// --- Carte produit (avec appui long pour édition) ---------------------------

function ItemCard({ item, product, onEdit, onQuickTap, small }) {
  const timer = useRef(null);
  const longPressed = useRef(false);
  const c = catInfo(product.cat);
  const bought = !!item.bought;
  const startPress = () => {
    longPressed.current = false;
    timer.current = setTimeout(() => { longPressed.current = true; onEdit(); }, 480);
  };
  const clearPress = () => { if (timer.current) { clearTimeout(timer.current); timer.current = null; } };
  const handleClick = () => {
    if (longPressed.current) { longPressed.current = false; return; }
    if (onQuickTap) onQuickTap();
  };

  return (
    <div
      onPointerDown={startPress}
      onPointerUp={clearPress}
      onPointerLeave={clearPress}
      onPointerCancel={clearPress}
      onClick={handleClick}
      onContextMenu={(e) => e.preventDefault()}
      style={{ background: bought ? "#EFEDE2" : c.tint, border: `1px solid ${bought ? "var(--color-primary-border)" : c.accent + "33"}`, borderRadius: 16, padding: small ? "12px 6px 9px" : "16px 8px 12px", display: "flex", flexDirection: "column", alignItems: "center", gap: 6, minHeight: small ? 78 : 96, userSelect: "none", cursor: "pointer", opacity: bought ? 0.55 : 1 }}
    >
      {item.fromRecipe && (
        <span style={{ display: "flex", alignItems: "center", gap: 3, maxWidth: "100%", color: bought ? "#A8A695" : "var(--color-accent-dark)", marginBottom: -2 }}>
          <BookOpen size={9} strokeWidth={2.4} style={{ flexShrink: 0 }} />
          <span style={{ fontSize: 8.5, fontWeight: 700, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap", textTransform: "uppercase", letterSpacing: "0.02em" }}>{item.fromRecipe}</span>
        </span>
      )}
      <span style={{ fontSize: small ? 21 : 26, filter: bought ? "grayscale(1)" : "none" }}><IconGlyph icon={product.icon} size={small ? 21 : 26} /></span>
      <span style={{ fontSize: small ? 11 : 12.5, fontWeight: 600, textAlign: "center", lineHeight: 1.25, color: bought ? "#9A9887" : "#23262E", textDecoration: bought ? "line-through" : "none" }}>
        {product.name}
        {item.note && <span style={{ color: bought ? "#9A9887" : c.accent }}> · {item.note}</span>}
      </span>
      <span style={{ fontSize: 10.5, color: bought ? "#A8A695" : "var(--color-accent)", fontWeight: 700 }}>{item.qty} {item.unit}</span>
      {(() => {
        const est = estimateItemPrice(item, product);
        const priceText = est != null ? formatEuro(est) : formatProductPrice(product);
        return priceText ? <span style={{ fontSize: 10.5, color: bought ? "#A8A695" : "#23262E", fontWeight: 600 }}>{priceText}</span> : null;
      })()}
    </div>
  );
}
